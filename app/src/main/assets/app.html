function fallbackImage(n){const s=(((n&&n.title)||'')+' '+((n&&n.summary)||'')+' '+((n&&n.category)||'')).toLowerCase();if(s.includes('biển')||s.includes('dốc lết')||s.includes('du lịch'))return 'https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=900&q=72';if(s.includes('cảng')||s.includes('vân phong')||s.includes('logistics'))return 'https://images.unsplash.com/photo-1501785888041-af3ef285b470?auto=format&fit=crop&w=900&q=72';if(s.includes('cao tốc')||s.includes('đường')||s.includes('hạ tầng'))return 'https://images.unsplash.com/photo-1519003722824-194d4455a60c?auto=format&fit=crop&w=900&q=72';if(s.includes('pháp')||s.includes('công báo')||s.includes('quy hoạch'))return 'https://images.unsplash.com/photo-1450101499163-c8848c66ca85?auto=format&fit=crop&w=900&q=72';return 'https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?auto=format&fit=crop&w=900&q=72'}

async function hydrateNewsImages(){const pending=(state.news||[]).filter(n=>!isRealImage(n)&&n.url).slice(0,28);if(!pending.length)return;let changed=false;for(const n of pending){try{const html=await nativeFetch(n.url);const img=extractOgImage(html);if(img&&/^https?:\/\//.test(img)){n.image=img;n.imageSource='publisher';changed=true}}catch(e){}}if(changed){store('news',state.news);render()}}

function renderHome(){const news=getFilteredNews('Tất cả').slice(0,4);document.getElementById('home').innerHTML=`<div class="heroCompact"><div class="ctaGrid"><button class="cta" onclick="go('news')"><span>📰</span><b>Xem tin mới</b><small>Tin có ảnh báo chí và phân tích tác động.</small></button><button class="cta" onclick="go('check')"><span>🛡️</span><b>Kiểm tra đất</b><small>Lưu kết quả vào sổ tay cá nhân.</small></button><button class="cta" onclick="go('saved')"><span>⭐</span><b>Sổ tay</b><small>Theo dõi lô đất, tin và khu vực.</small></button></div></div><div class="card" style="background:linear-gradient(135deg,#fff,#f6fbfd)"><h2>Sổ tay đầu tư cá nhân</h2><p>Lưu lô đất đang xem, tin quan trọng, khu vực quan tâm và ghi chú pháp lý để theo dõi lâu dài.</p><div class="dashGrid"><div class="dashBox"><b>${state.deals.length}</b><span>Lô đất</span></div><div class="dashBox"><b>${state.saved.length}</b><span>Tin đã lưu</span></div><div class="dashBox"><b>${state.areasSaved.length}</b><span>Khu vực</span></div><div class="dashBox"><b>${state.notes.length}</b><span>Ghi chú</span></div></div><button class="primary gold" onclick="go('saved')">Mở sổ tay</button><div class="footerCredit">Tác giả sản phẩm: <b>Vũ Hoàng</b></div></div><div class="sectionTitle"><h2>Tin đáng chú ý</h2><span>${state.news.length||fallbackNews.length} tin đang theo dõi</span></div><div class="newsGrid">${news.map((n,i)=>newsCard(n,i)).join('')}</div><div class="sectionTitle"><h2>Khu vực nổi bật</h2><span>lọc tin theo vùng</span></div><div class="areaDeck">${areaProfiles.slice(0,3).map(areaCard).join('')}</div>`}
function getAllNews(){const by={};[...state.news,...fallbackNews].forEach(n=>{if(n&&n.title&&!by[n.title])by[n.title]=normalizeNews(n)});return Object.values(by)}
function normalizeNews(n){n.category=n.category||categoryOf(n.title+' '+n.summary);n.area=n.area||deriveAreas(n.title+' '+n.summary+' '+n.category);n.impactScore=n.impactScore||scoreImpact(n.title+' '+n.summary+' '+n.category);return n}
function getFilteredNews(filter=state.filter){let list=getAllNews();if(filter&&filter!=='Tất cả'){const f=filter.toLowerCase();list=list.filter(n=>(n.category||'').toLowerCase().includes(f)||(n.title||'').toLowerCase().includes(f)||(n.summary||'').toLowerCase().includes(f)||(n.area||[]).join(' ').toLowerCase().includes(f))}if(state.area&&state.area!=='Tất cả'){const a=areaProfiles.find(x=>x.name===state.area);if(a){list=list.filter(n=>matchesArea(n,a))}}return list.sort((a,b)=>(b.impactScore||0)-(a.impactScore||0))}
function matchesArea(n,a){const text=(n.title+' '+n.summary+' '+(n.area||[]).join(' ')).toLowerCase();return a.keys.some(k=>text.includes(k.toLowerCase()))}
function renderNews(){const cats=['Tất cả','Hạ tầng','Quy hoạch','Pháp lý','Vân Phong','Ninh Hòa','Dốc Lết'];const areas=['Tất cả',...areaProfiles.map(a=>a.name)];const list=getFilteredNews();const lead=list[0];document.getElementById('news').innerHTML=`<div class="chips">${cats.map(c=>`<button class="chip ${state.filter===c?'active':''}" onclick="state.filter='${c}';state.area='Tất cả';renderNews()">${c}</button>`).join('')}</div><div class="chips">${areas.map(a=>`<button class="chip ${state.area===a?'active':''}" onclick="state.area='${a}';renderNews()">${a}</button>`).join('')}</div>${lead?leadCard(lead):''}<div class="sectionTitle"><h2>${state.area==='Tất cả'?'Bảng tin đầu tư':'Tin quanh '+state.area}</h2><span>${list.length} kết quả</span></div><div class="newsGrid">${list.slice(1,80).map(newsCard).join('')}</div>`}
function leadCard(n){return `<article class="leadNews"><div class="leadImg" style="background-image:linear-gradient(180deg,rgba(6,27,44,.05),rgba(6,27,44,.28)),url('${imgFor(n)}')"><span class="sourceImgBadge ${imgBadgeClass(n)}">${imgBadge(n)}</span></div><div class="leadBody"><div class="tags"><span class="tag impact-high">Tác động ${n.impactScore}/100</span><span class="tag area">${esc((n.area||[])[0]||'Khánh Hòa')}</span><span class="tag verified">${esc(n.category||'Tin')}</span></div><h3>${esc(n.title)}</h3><p>${esc(n.summary)}</p><div class="actions"><button class="mini gold" onclick='briefNews(${JSON.stringify(n).replace(/'/g,"&#039;")})'>Phân tích</button><button class="mini" onclick='quickRead(${JSON.stringify(n).replace(/'/g,"&#039;")})'>Đọc nhanh</button><button class="mini" onclick="openUrl('${esc(n.url||'https://news.google.com/search?q=Ninh%20H%C3%B2a%20Kh%C3%A1nh%20H%C3%B2a&hl=vi&gl=VN&ceid=VN:vi')}')">Mở nguồn</button></div></div></article>`}
function newsCard(n){return `<article class="newsCard"><div class="thumb" style="background-image:url('${imgFor(n)}')"><span class="sourceImgBadge ${imgBadgeClass(n)}">${imgBadge(n)}</span></div><div class="newsBody"><div class="tags"><span class="tag ${n.impactScore>=80?'impact-high':n.impactScore>=65?'impact-mid':'hot'}">${n.impactScore}/100</span><span class="tag area">${esc((n.area||[])[0]||'Khánh Hòa')}</span><span class="tag">${esc(n.category||'Tin')}</span></div><h3>${esc(n.title)}</h3><p>${esc(n.summary||'Tin cần đọc kèm nguồn chính thức trước khi ra quyết định.')}</p><div class="actions"><button class="mini gold" onclick='briefNews(${JSON.stringify(n).replace(/'/g,"&#039;")})'>Phân tích</button><button class="mini" onclick='saveNews(${JSON.stringify(n).replace(/'/g,"&#039;")})'>Lưu</button></div></div></article>`}
function scoreImpact(t){t=(t||'').toLowerCase();let s=45;if(/cao tốc|quy hoạch|công báo|vân phong|khu kinh tế|phân khu|cảng|bảng giá đất/.test(t))s+=28;if(/ninh hòa|ninh diêm|dốc lết|ninh hải|ninh xuân|ninh an/.test(t))s+=14;if(/khởi công|phê duyệt|ban hành|nghiệm thu|đưa vào hoạt động/.test(t))s+=10;if(/tin đồn|đề xuất|dự kiến|nghe nói/.test(t))s-=8;return Math.max(30,Math.min(96,s))}
function categoryOf(t){t=(t||'').toLowerCase();if(/công báo|pháp|luật|sổ|giá đất|sử dụng đất/.test(t))return 'Pháp lý';if(/quy hoạch|phân khu|đô thị|chung 2040/.test(t))return 'Quy hoạch';if(/cao tốc|hạ tầng|đường|giao thông|khởi công|nghiệm thu/.test(t))return 'Hạ tầng';if(/vân phong|cảng|logistics|khu kinh tế|công nghiệp/.test(t))return 'Vân Phong';if(/biển|dốc lết|du lịch|nghỉ dưỡng/.test(t))return 'Khu vực';return 'Thị trường'}
function deriveAreas(t){t=(t||'').toLowerCase();const res=[];for(const a of areaProfiles){if(a.keys.some(k=>t.includes(k.toLowerCase())))res.push(a.name)}if(t.includes('ninh hòa')&&!res.includes('Ninh Hòa'))res.push('Ninh Hòa');if(t.includes('khánh hòa')&&!res.length)res.push('Khánh Hòa');return res.length?res:['Khánh Hòa']}
function analysisFor(n){const t=(n.title+' '+n.summary).toLowerCase();const score=n.impactScore||scoreImpact(t);let level=score>=82?'Rất cao':score>=70?'Cao':score>=55?'Trung bình':'Thấp';let action=score>=82?'Theo dõi sát, nhưng không xuống tiền nếu pháp lý chưa rõ.':score>=70?'Có thể nghiên cứu khu vực liên quan và so sánh giá.':'Chỉ nên xem như tín hiệu tham khảo.';let risk=[];if(/quy hoạch|pháp|công báo|sử dụng đất/.test(t))risk.push('Cần đối chiếu số tờ, số thửa và văn bản gốc.');if(/cao tốc|hạ tầng|vân phong|cảng/.test(t))risk.push('Không mua chỉ vì kỳ vọng hạ tầng; cần kiểm tra tiến độ thực tế.');if(/du lịch|biển|dốc lết/.test(t))risk.push('Cần kiểm tra hành lang biển, mục đích sử dụng đất và khả năng khai thác thật.');if(!risk.length)risk.push('Cần kiểm tra nguồn tin, giá khu vực và khả năng bán lại.');return {score,level,action,risk,areas:n.area||deriveAreas(t),category:n.category||categoryOf(t)}}
function briefNews(n){n=normalizeNews(n);const a=analysisFor(n);showSheet(`<h2>Phân tích tác động tin</h2><h3>${esc(n.title)}</h3><p>${esc(n.summary)}</p><div class="impactBox"><div class="impactScore"><div class="ring"><b>${a.score}</b></div><div><b>Mức tác động: ${a.level}</b><p>Nhóm tin: ${esc(a.category)}<br>Khu vực ảnh hưởng: ${esc(a.areas.join(', '))}</p></div></div></div><div class="card" style="box-shadow:none;background:#fff8eb"><h3>Góc nhìn đầu tư</h3><p>${esc(a.action)}</p></div><div class="card" style="box-shadow:none"><h3>Rủi ro cần kiểm tra</h3>${a.risk.map(x=>`<p>• ${esc(x)}</p>`).join('')}<p>• Luôn mở nguồn gốc, đối chiếu pháp lý và không đặt cọc chỉ dựa trên tin tức.</p></div><div class="actions"><button class="primary gold" onclick="openUrl('${esc(n.url)}')">Mở nguồn</button><button class="primary soft" onclick='saveNews(${JSON.stringify(n).replace(/'/g,"&#039;")})'>Lưu tin</button></div>`)}
function quickRead(n){showSheet(`<h2>Đọc nhanh</h2><h3>${esc(n.title)}</h3><p><b>Nguồn:</b> ${esc(n.source||'')}</p><p>${esc(n.summary||'Tin cần mở nguồn để đọc chi tiết.')}</p><button class="primary gold" onclick="openUrl('${esc(n.url)}')">Mở nguồn gốc</button>`)}
function renderAreas(){const selected=state.area==='Tất cả'?'Ninh Diêm':state.area;const prof=areaProfiles.find(a=>a.name===selected)||areaProfiles[0];const list=getAllNews().filter(n=>matchesArea(n,prof)).sort((a,b)=>(b.impactScore||0)-(a.impactScore||0)).slice(0,36);const top=list[0];document.getElementById('areas').innerHTML=`<div class="chips">${areaProfiles.map(a=>`<button class="chip ${prof.name===a.name?'active':''}" onclick="state.area='${a.name}';renderAreas()">${a.name}</button>`).join('')}</div><div class="areaHeroPro ${prof.img}"><div class="areaHeroTop"><span class="tag hot">Hồ sơ khu vực</span><span class="areaScore">${prof.score}/100</span></div><div class="areaHeroBody"><h2>${esc(prof.name)}</h2><p>${esc(prof.type)} · Tin tức, rủi ro và cơ hội được gom riêng cho khu vực này.</p><div class="areaStats"><span>${list.length} tin liên quan</span><span>${top?'Tác động cao nhất '+top.impactScore+'/100':'Đang chờ tin mới'}</span></div><div class="actions"><button class="mini gold" onclick="saveArea('${esc(prof.name)}')">Theo dõi khu vực</button><button class="mini" onclick="state.area='${esc(prof.name)}';go('news')">Mở bảng tin</button></div></div></div><div class="areaInsightGrid"><div class="areaInsight"><b>${list.length}</b><small>Tin liên quan trực tiếp/gián tiếp đến ${esc(prof.name)}</small></div><div class="areaInsight"><b>${top?top.impactScore:'--'}</b><small>Điểm tác động cao nhất trong nhóm tin khu vực</small></div></div><div class="areaNewsSection"><div class="sectionTitle"><h2>Tin riêng khu vực</h2><span>khác với bảng tin tổng</span></div>${list.length?list.map(areaNewsCard).join(''):'<div class="saveEmpty">Chưa có tin phù hợp, bấm làm mới để quét thêm.</div>'}</div>`}
function areaNewsCard(n){n=normalizeNews(n);const a=analysisFor(n);return `<article class="areaMiniNews"><div class="thumb" style="background-image:url('${imgFor(n)}')"><span class="sourceImgBadge ${imgBadgeClass(n)}">${imgBadge(n)}</span></div><div><div class="tags"><span class="tag ${n.impactScore>=80?'impact-high':n.impactScore>=65?'impact-mid':'hot'}">${n.impactScore}/100</span><span class="tag area">${esc((n.area||[])[0]||'Khánh Hòa')}</span></div><h3>${esc(n.title)}</h3><p>${esc(a.action)}</p><div class="actions"><button class="mini gold" onclick='briefNews(${JSON.stringify(n).replace(/'/g,"&#039;")})'>Phân tích</button><button class="mini" onclick='saveNews(${JSON.stringify(n).replace(/'/g,"&#039;")})'>Lưu</button></div></div></article>`}
function areaCard(a){return `<div class="areaCard ${a.img}"><span class="tag hot" style="width:max-content">${esc(a.type)}</span><h3>${esc(a.name)}</h3><p>Tin tức và rủi ro được khoanh vùng theo khu vực bạn chọn.</p><div class="areaStats"><span>Tiềm năng ${a.score}/100</span><span>lọc theo khu vực</span><span>đọc góc nhìn đầu tư</span></div><div class="actions"><button class="mini gold" onclick="saveArea('${esc(a.name)}')">Theo dõi khu vực</button><button class="mini" onclick="state.area='${esc(a.name)}';go('news')">Xem tin</button></div></div>`}
function renderCheck(){document.getElementById('check').innerHTML=`<div class="card"><h2>Kiểm tra một lô đất</h2><p>Nhập thông tin đang có. App sẽ cho kết luận dễ hiểu: nên xem tiếp, hỏi thêm hay tạm dừng.</p><div class="formGrid"><div class="field"><label>Khu vực</label><select id="c_area">${areaProfiles.map(a=>`<option>${a.name}</option>`).join('')}<option>Khác</option></select></div><div class="field"><label>Giai đoạn</label><select id="c_stage"><option>Mới xem cơ hội</option><option>Đang hỏi thêm</option><option>Đang chuẩn bị đi xem</option><option>Đang đàm phán</option></select></div><div class="field"><label>Diện tích (m²)</label><input id="c_size" class="input" inputmode="decimal" placeholder="120"></div><div class="field"><label>Giá bán (tỷ)</label><input id="c_price" class="input" inputmode="decimal" placeholder="1.8"></div><div class="field"><label>Giấy tờ</label><select id="c_doc"><option>Chưa rõ</option><option>Có sổ riêng</option><option>Sổ chung</option><option>Chưa có sổ</option><option>Giấy tay</option></select></div><div class="field"><label>Đường vào</label><select id="c_road"><option>Chưa rõ</option><option>Đường công rõ ràng</option><option>Đường bê tông nhỏ</option><option>Đường đất</option><option>Đi nhờ/lối đi chưa rõ</option></select></div></div><div class="field" style="margin-top:12px"><label>Ghi chú thêm</label><textarea id="c_note" placeholder="Gần cao tốc, gần biển, gần Vân Phong, nghe môi giới nói..."></textarea></div><button class="primary gold" style="width:100%;margin-top:12px" onclick="analyzeDeal()">Phân tích lô đất</button></div><div class="card result" id="dealResult"></div>`}
function analyzeDeal(){const area=document.getElementById('c_area').value, size=parseFloat(document.getElementById('c_size').value||0), price=parseFloat(document.getElementById('c_price').value||0), doc=document.getElementById('c_doc').value, road=document.getElementById('c_road').value, note=document.getElementById('c_note').value;let score=55;if(doc==='Có sổ riêng')score+=18;if(/Chưa|Giấy tay|Sổ chung/.test(doc))score-=18;if(/Đường công/.test(road))score+=10;if(/Đi nhờ|Đường đất|Chưa rõ/.test(road))score-=10;if(note.toLowerCase().includes('vân phong')||note.toLowerCase().includes('cao tốc')||note.toLowerCase().includes('biển'))score+=8;if(price&&size){let m2=price*1000/size;if(m2>30)score-=8;if(m2<8)score-=3}score=Math.max(15,Math.min(92,score));const decision=score>=75?'Có thể xem tiếp, chưa nên đặt cọc':score>=55?'Hỏi thêm trước khi đi xem':'Tạm dừng, thiếu dữ liệu quan trọng';window.__lastDeal={area,score,decision,date:new Date().toLocaleString('vi-VN')};document.getElementById('dealResult').style.display='block';document.getElementById('dealResult').innerHTML=`<h2>Kết quả kiểm tra</h2><div class="resultGrid"><div class="scoreBig"><b>${score}</b></div><div><h3>${decision}</h3><p>Mức điểm này chỉ dùng để sàng lọc ban đầu. Không thay thế kiểm tra pháp lý thực tế.</p></div></div><div class="impactBox"><b>Việc cần làm tiếp</b><p>1. Yêu cầu sổ, số tờ, số thửa.<br>2. Kiểm tra quy hoạch/lộ giới qua nguồn chính thức.<br>3. So sánh ít nhất 3 lô cùng khu.<br>4. Không đặt cọc nếu giấy tờ hoặc đường vào chưa rõ.</p></div><button class="primary gold" style="width:100%" onclick="saveDeal()">Lưu hồ sơ</button>`;document.getElementById('dealResult').scrollIntoView({behavior:'smooth'})}
function saveDeal(){if(!window.__lastDeal)return toast('Chưa có hồ sơ để lưu');const d=Object.assign({id:Date.now(),status:'Đang theo dõi',note:''},window.__lastDeal);state.deals.unshift(d);store('deals',state.deals);toast('Đã lưu vào Sổ tay');renderSaved()}
const legalAnswers={'Đất chưa có sổ có nên mua không?':'Rủi ro cao. Chỉ nên nghiên cứu nếu hiểu rõ nguồn gốc đất, điều kiện sang tên và rủi ro không hoàn tất pháp lý.','Trước khi đặt cọc cần kiểm tra gì?':'Cần kiểm tra sổ, chủ sở hữu, quy hoạch, lộ giới, tranh chấp, thế chấp, đường vào và điều khoản hoàn cọc.','Làm sao biết đất có vướng quy hoạch?':'Cần đối chiếu số tờ/số thửa tại nguồn chính thức và xác minh tại cơ quan có thẩm quyền. App chỉ hỗ trợ mở đúng nguồn.','Đường vào hợp pháp là gì?':'Đường vào nên là đường công hoặc có quyền sử dụng rõ ràng. Đường tự mở, đi nhờ hoặc hứa miệng đều cần kiểm tra kỹ.','Khi nào nên dừng thương vụ?':'Dừng nếu không cho xem sổ, giấy tờ mơ hồ, đường vào không rõ, dính quy hoạch xấu hoặc điều khoản cọc bất lợi.'};
function renderLegal(){const qs=Object.keys(legalAnswers);document.getElementById('legal').innerHTML=`<div class="card"><h2>Pháp lý dễ hiểu</h2><p>Tập trung vào câu hỏi thực tế trước khi xuống tiền. Mục này không dùng bản đồ và không cần quyền vị trí.</p><div class="locationNotice">App đã bỏ quyền truy cập vị trí. Nếu cần định vị lô đất, hãy dùng Google Maps hoặc nguồn chính thức bên ngoài.</div>${qs.map(q=>`<button class="question" onclick="showLegal('${esc(q)}')"><span>${esc(q)}</span><b>›</b></button>`).join('')}<div class="answerBox" id="legalAnswer"></div></div><div class="card"><h2>Checklist trước khi đặt cọc</h2>${['Có sổ hoặc giấy tờ rõ ràng','Đúng chủ sở hữu','Không tranh chấp/thế chấp bất thường','Đã kiểm tra quy hoạch/lộ giới','Đường vào hợp pháp','Giá đã so sánh khu vực','Điều khoản hoàn cọc rõ ràng'].map(x=>`<label class="checkItem"><input type="checkbox"><span>${x}</span></label>`).join('')}</div><div class="card"><h2>Nguồn chính thức</h2><div class="actions">${sources.map(s=>`<button class="primary soft" onclick="openUrl('${s.url}')">${s.name}</button>`).join('')}</div></div>`}
function showLegal(q){const box=document.getElementById('legalAnswer');box.style.display='block';box.innerHTML=`<b>${q}</b><br>${legalAnswers[q]}`;box.scrollIntoView({behavior:'smooth',block:'nearest'})}
function renderSaved(){const tabs=['Tổng quan','Lô đất','Tin đã lưu','Khu vực','Ghi chú'];const box=document.getElementById('saved');box.innerHTML=`<div class="sectionTitle"><h2>Sổ tay đầu tư cá nhân</h2><span>Tác giả sản phẩm: Vũ Hoàng</span></div><div class="notebookTabs">${tabs.map(t=>`<button class="${state.book===t?'active':''}" onclick="state.book='${t}';renderSaved()">${t}</button>`).join('')}</div><div id="notebookBody"></div>`;renderNotebookBody()}

function parseRss(xml,q){const doc=new DOMParser().parseFromString(xml,'text/xml');return [...doc.querySelectorAll('item')].slice(0,30).map(item=>{const title=item.querySelector('title')?.textContent||'';const link=item.querySelector('link')?.textContent||'';const desc=item.querySelector('description')?.textContent||'';const source=item.querySelector('source')?.textContent||'Google News';let image='';const media=item.getElementsByTagName('media:content')[0]||item.getElementsByTagName('media:thumbnail')[0];if(media)image=media.getAttribute('url')||'';const enc=item.querySelector('enclosure');if(!image&&enc)image=enc.getAttribute('url')||'';if(!image){const m=desc.match(/<img[^>]+src=["']([^"']+)["']/i);if(m)image=m[1].replace(/&amp;/g,'&')}const clean=desc.replace(/<[^>]*>/g,' ').replace(/&nbsp;/g,' ').replace(/\s+/g,' ').trim();return normalizeNews({title,source,url:link,image,summary:clean||'Tin liên quan cần mở nguồn để đọc chi tiết.',category:categoryOf(title+' '+q),area:deriveAreas(title+' '+clean+' '+q),impactScore:scoreImpact(title+' '+clean+' '+q)})}).filter(x=>x.title)}

function categoryIcon(n){
  const c=String((n&&n.category)||categoryOf((n&&n.title)||'')).toLowerCase();
  const t=String(((n&&n.title)||'')+' '+((n&&n.summary)||'')).toLowerCase();
  if(c.includes('hạ tầng')||/cao tốc|đường|giao thông|cầu/.test(t)) return '🛣️';
  if(c.includes('quy hoạch')||/quy hoạch|phân khu|đô thị/.test(t)) return '🗺️';
  if(c.includes('pháp')||/công báo|luật|sổ|giấy tờ/.test(t)) return '⚖️';
  if(c.includes('vân phong')||/cảng|logistics|vân phong|công nghiệp/.test(t)) return '⚓';
  if(/biển|dốc lết|du lịch|nghỉ dưỡng/.test(t)) return '🌊';
  return '📊';
}
function categoryClass(n){
  const c=String((n&&n.category)||'').toLowerCase();
  const t=String(((n&&n.title)||'')+' '+((n&&n.summary)||'')).toLowerCase();
  if(c.includes('hạ tầng')||/cao tốc|đường|giao thông/.test(t)) return 'infra';
  if(c.includes('quy hoạch')||/quy hoạch|phân khu|đô thị/.test(t)) return 'planning';
  if(c.includes('pháp')||/công báo|luật|sổ/.test(t)) return 'legal';
  if(c.includes('vân phong')||/cảng|logistics|vân phong|công nghiệp/.test(t)) return 'vanphong';
  return 'market';
}

function parseViNumber(v){
  if(!v) return 0;
  let x=String(v).replace(/\s/g,'').replace(/m2|m²/gi,'');
  if(x.includes(',')){ x=x.replace(/\./g,'').replace(',', '.'); }
  else { x=x.replace(/,/g,''); }
  const n=parseFloat(x); return isNaN(n)?0:n;
}
function fmtNum(n){ return Number(n||0).toLocaleString('vi-VN',{maximumFractionDigits:1}); }
function normalizeVN(s){return String(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/đ/g,'d').replace(/\s+/g,' ').trim();}
function extractBetween(raw, labels){
  const line=String(raw||'').split(/\n|\r/).map(x=>x.trim()).filter(Boolean);
  for(const l of line){ const n=normalizeVN(l); if(labels.some(k=>n.includes(k))) return l.replace(/^.*?:\s*/,'').trim(); }
  return '';
}
function extractCertificateFields(text){
  const raw=String(text||''); const one=raw.replace(/\s+/g,' '); const norm=normalizeVN(one);
  const out={};
  let m=one.match(/thửa\s*(?:đất)?\s*số\s*[:\.]?\s*([0-9A-Za-z\/-]+)/i) || one.match(/thửa\s*[:\.]?\s*([0-9A-Za-z\/-]+)/i);
  if(m) out.parcel=m[1];
  m=one.match(/tờ\s*bản\s*đồ\s*số\s*[:\.]?\s*([0-9A-Za-z\/-]+)/i) || one.match(/bản\s*đồ\s*số\s*[:\.]?\s*([0-9A-Za-z\/-]+)/i);
  if(m) out.mapSheet=m[1];
  m=one.match(/diện\s*tích\s*[:\.]?\s*([0-9\.\,]+)\s*m/i) || one.match(/([0-9\.\,]+)\s*m[²2]/i);
  if(m) out.area=parseViNumber(m[1]);
  const landLine=extractBetween(raw,['loai dat','muc dich su dung']);
  if(landLine) out.landType=landLine.replace(/^.*(Loại đất|Mục đích sử dụng)\s*[:\.]?/i,'').trim();
  m=one.match(/thời\s*hạn\s*sử\s*dụng\s*[:\.]?\s*([^\.\n]+)/i);
  if(m) out.expiry=m[1].trim();
  m=one.match(/địa\s*chỉ\s*[:\.]?\s*([^\.\n]+)/i);
  if(m) out.address=m[1].trim();
  if(norm.includes('quy hoach giao thong')) out.planningNote='Có ghi chú thuộc quy hoạch giao thông';
  m=one.match(/([0-9\.\,]+)\s*m[²2]?\s*(?:thuộc|thuoc)\s*(?:quy\s*hoạch|quy hoach)\s*giao\s*thông/i) || one.match(/quy\s*hoạch\s*giao\s*thông[^0-9]{0,30}([0-9\.\,]+)\s*m/i);
  if(m) out.planningArea=parseViNumber(m[1]);
  const coords=[];
  const coordRegex=/([0-9]{6,8}[\.,][0-9]+)\s*[,;\s]+([0-9]{5,8}[\.,][0-9]+)/g;
  let cm; while((cm=coordRegex.exec(one))){coords.push([cm[1],cm[2]]); if(coords.length>12)break;}
  if(coords.length) out.coords=coords;
  return out;
}
function fillCertFields(data){
  const set=(id,v)=>{const el=document.getElementById(id); if(el&&v!==undefined&&v!==null&&v!=='') el.value=v;};
  set('cert_parcel',data.parcel); set('cert_sheet',data.mapSheet); set('cert_area',data.area?fmtNum(data.area):''); set('cert_landtype',data.landType); set('cert_expiry',data.expiry); set('cert_address',data.address); set('cert_planning',data.planningNote); set('cert_planarea',data.planningArea?fmtNum(data.planningArea):'');
  if(data.coords&&data.coords.length){ set('cert_note','Đã phát hiện bảng tọa độ ranh: '+data.coords.length+' điểm. Cần đối chiếu lại bằng bản trích lục/Google Maps.'); }
}
function startCertificateOcr(){
  document.getElementById('cert_images')?.click();
  toast('Đã mở chọn ảnh. Sau khi xem ảnh, hãy nhập/dán thông tin sổ vào ô chữ để app bóc thông tin.');

window.__certificateOcrDone=function(text){
  if(text==='__CANCELLED__') return toast('Đã hủy chọn ảnh');
  if(String(text||'').startsWith('__ERROR__')){ toast('Chưa đọc được ảnh. Hãy nhập tay thông tin chính.'); return; }
  const box=document.getElementById('cert_ocr'); if(box) box.value=((box.value?box.value+'\n\n':'')+text).trim();
  const data=extractCertificateFields(text); fillCertFields(data); toast('Đã đọc chữ và điền thông tin chính');
}
function previewCertImages(ev){
  const files=[...(ev.target.files||[])]; const grid=document.getElementById('cert_previews'); if(!grid)return; grid.innerHTML='';
  files.slice(0,4).forEach(f=>{ const img=document.createElement('img'); img.src=URL.createObjectURL(f); grid.appendChild(img); });
}
function parseMapsLink(){
  const link=(document.getElementById('cert_maps')?.value||'').trim();
  if(!link) return '';
  let m=link.match(/@(-?\d+\.\d+),\s*(-?\d+\.\d+)/)||link.match(/[?&]q=(-?\d+\.\d+),\s*(-?\d+\.\d+)/);
  if(m) return m[1]+', '+m[2];
  return 'Đã lưu link Google Maps; cần mở nguồn để xác định tọa độ chính xác.';
}
function analyzeCertificateDeal(){
  const data={
    parcel:document.getElementById('cert_parcel')?.value.trim(),
    mapSheet:document.getElementById('cert_sheet')?.value.trim(),
    area:parseViNumber(document.getElementById('cert_area')?.value),
    landType:document.getElementById('cert_landtype')?.value.trim(),
    expiry:document.getElementById('cert_expiry')?.value.trim(),
    address:document.getElementById('cert_address')?.value.trim(),
    planningNote:document.getElementById('cert_planning')?.value.trim(),
    planningArea:parseViNumber(document.getElementById('cert_planarea')?.value),
    price:parseViNumber(document.getElementById('cert_price')?.value),
    maps:document.getElementById('cert_maps')?.value.trim(),
    note:document.getElementById('cert_note')?.value.trim(),
    ocrText:document.getElementById('cert_ocr')?.value.trim()
  };
  const all=normalizeVN([data.landType,data.planningNote,data.note,data.ocrText].join(' '));
  let legal=60, planning=65, position=55, liquidity=55, investment=55; const warns=[]; const strengths=[];
  if(data.parcel&&data.mapSheet){legal+=12;strengths.push('Có số thửa/tờ bản đồ để đối chiếu tại nguồn chính thức.');}
  if(data.area){legal+=5;strengths.push('Có diện tích rõ: '+fmtNum(data.area)+' m².');}
  if(data.landType){legal+=5;} else warns.push('Chưa nhập/đọc được loại đất, cần xem kỹ mục đích sử dụng đất trên sổ.');
  if(/dat o|o do thi|o nong thon|odt|ont|đất ở/i.test(all)){investment+=12;liquidity+=10;}
  if(/lua|trong lua|nong nghiep|cln|hnk/i.test(all)){legal-=18;investment-=14;liquidity-=8;warns.push('Loại đất có dấu hiệu là đất nông nghiệp/đất trồng lúa, không phải đất ở. Cần kiểm tra khả năng chuyển mục đích.');}
  if(/quy hoach giao thong|giao thong|lo gioi/i.test(all)){planning-=28;investment-=18;warns.push('Có dấu hiệu/ghi chú liên quan quy hoạch giao thông hoặc lộ giới. Cần xác minh trước khi đặt cọc.');}
  let affectedPct=0; if(data.area&&data.planningArea){affectedPct=data.planningArea/data.area*100; planning-=affectedPct>=20?16:9; warns.push('Khoảng '+fmtNum(affectedPct)+'% diện tích có thể bị ảnh hưởng theo ghi chú quy hoạch.');}
  if(data.maps){position+=10; strengths.push('Có link Google Maps để lưu và kiểm tra thực địa.');}
  if(data.price&&data.area){ const trm2=data.price*1000/data.area; data.pricePerM2=trm2; if(trm2>25){investment-=8;warns.push('Giá/m² khá cao, cần so sánh với ít nhất 3 lô cùng khu.');} if(trm2<5){investment-=4;warns.push('Giá/m² thấp bất thường, cần kiểm tra kỹ pháp lý và khả năng sử dụng.');} }
  legal=Math.max(15,Math.min(95,legal)); planning=Math.max(10,Math.min(95,planning)); position=Math.max(20,Math.min(90,position)); liquidity=Math.max(15,Math.min(90,liquidity)); investment=Math.max(15,Math.min(92,investment));
  const total=Math.round(legal*.26+planning*.28+position*.16+liquidity*.14+investment*.16);
  const verdict= total>=75?'Có thể nghiên cứu sâu, vẫn phải kiểm tra pháp lý':total>=58?'Có thể xem tiếp nhưng chưa nên đặt cọc':total>=42?'Rủi ro cao, chỉ hỏi thêm nếu giá rất tốt':'Nên tạm dừng, chưa đủ an toàn';
  const report={id:Date.now(),area:data.address||'Lô đất từ sổ',score:total,decision:verdict,date:new Date().toLocaleString('vi-VN'),status:'Cần hỏi thêm',source:'AI Đọc sổ',data,scores:{legal,planning,position,liquidity,investment,total},warnings:warns,strengths};
  window.__lastCertReport=report; renderCertReport(report);
}
function renderCertReport(r){
  const d=r.data, s=r.scores; const box=document.getElementById('certResult'); if(!box)return; box.style.display='block';
  const rows=[['Pháp lý',s.legal],['Quy hoạch',s.planning],['Vị trí',s.position],['Thanh khoản',s.liquidity],['Đầu tư',s.investment]];
  const pct=d.area&&d.planningArea?fmtNum(d.planningArea/d.area*100)+'%':'--';
  box.innerHTML=`<div class="reportTitle"><div><h2>Báo cáo lô đất</h2><p class="smallMuted">Kết quả sàng lọc từ ảnh sổ/thông tin người dùng nhập. Không thay thế xác minh pháp lý.</p></div><span class="reportBadge">${r.score}/100</span></div><div class="resultGrid"><div class="scoreBig"><b>${r.score}</b></div><div><h3>${esc(r.decision)}</h3><p>${r.score>=58?'Có thể xem tiếp theo quy trình kiểm chứng.':'Chưa nên đi sâu nếu thiếu giấy tờ hoặc quy hoạch rõ ràng.'}</p></div></div><div class="extractedBox"><h3>Tóm tắt đọc được</h3><p><b>Số thửa:</b> ${esc(d.parcel||'--')} · <b>Tờ bản đồ:</b> ${esc(d.mapSheet||'--')}<br><b>Diện tích:</b> ${d.area?fmtNum(d.area)+' m²':'--'} · <b>Loại đất:</b> ${esc(d.landType||'--')}<br><b>Thời hạn:</b> ${esc(d.expiry||'--')}<br><b>Vị trí:</b> ${esc(d.address||parseMapsLink()||'--')}</p>${d.planningArea?`<p><b>Diện tích liên quan quy hoạch:</b> ${fmtNum(d.planningArea)} m² · khoảng ${pct}</p>`:''}</div>${r.warnings.length?`<div class="dangerCard"><h3>Cảnh báo cần chú ý</h3><ul class="questionList">${r.warnings.map(w=>`<li>${esc(w)}</li>`).join('')}</ul></div>`:''}<div class="scoreRows">${rows.map(([k,v])=>`<div class="scoreRow"><span>${k}</span><div class="bar"><i style="width:${v}%"></i></div><b>${v}</b></div>`).join('')}</div><div class="warningCard" style="margin-top:14px"><h3>Câu hỏi nên hỏi chủ đất/môi giới</h3><ol class="questionList"><li>Phần đất vướng quy hoạch/lộ giới nằm ở đâu trên thực địa?</li><li>Loại đất hiện tại có chuyển mục đích được không, điều kiện và chi phí ra sao?</li><li>Đường vào là đường công hay đường tự mở/đi nhờ?</li><li>Giá bán đã trừ rủi ro quy hoạch và loại đất chưa?</li><li>Nếu đặt cọc, điều khoản hoàn cọc khi pháp lý/quy hoạch không đúng là gì?</li></ol></div><div class="actions"><button class="primary gold" onclick="saveCertificateReport()">Lưu vào Sổ tay</button>${d.maps?`<button class="primary soft" onclick="openUrl('${esc(d.maps)}')">Mở Google Maps</button>`:''}</div>`;
  box.scrollIntoView({behavior:'smooth'});
}
function saveCertificateReport(){
  const r=window.__lastCertReport; if(!r)return toast('Chưa có báo cáo để lưu');
  state.certReports.unshift(r); store('certReports',state.certReports);
  state.deals.unshift({id:r.id,area:r.area,score:r.score,decision:r.decision,date:r.date,status:r.status,note:'Tạo từ AI Đọc sổ'}); store('deals',state.deals);
  toast('Đã lưu báo cáo vào Sổ tay');
}

  document.getElementById('check').innerHTML=`<div class="certHero"><h2>Đọc sổ & chấm điểm lô đất</h2><p>Chọn ảnh sổ để xem trước, nhập hoặc dán thông tin trên sổ, dán link Google Maps và nhập giá nếu có. App sẽ bóc thông tin quan trọng, cảnh báo rủi ro và tạo báo cáo sàng lọc.</p><div class="certSteps"><div class="certStep"><span>📄</span>1. Chọn ảnh sổ</div><div class="certStep"><span>📍</span>2. Dán vị trí</div><div class="certStep"><span>📊</span>3. Tạo báo cáo</div></div><div class="privacyNote">Bảo mật: app không yêu cầu quyền vị trí, không bắt nhập API. Ảnh chỉ dùng để bạn xem trước; dữ liệu phân tích lấy từ nội dung bạn nhập/dán.</div></div><div class="card"><h2>1. Ảnh sổ đỏ/sổ hồng</h2><p>Ưu tiên ảnh rõ mặt thông tin thửa đất và mặt sơ đồ/tọa độ. Bản ổn định này không dùng OCR native để tránh lỗi build; hãy nhập hoặc dán các dòng quan trọng từ sổ.</p><div class="docUpload"><button class="goldBtn" onclick="startCertificateOcr()">Chọn ảnh sổ để xem trước</button><label>Chọn ảnh để xem trước<input id="cert_images" type="file" accept="image/*" multiple onchange="previewCertImages(event)" style="display:none"></label></div><div id="cert_previews" class="docPreviewGrid"></div><div class="field"><label>Nội dung sổ / dán thông tin sổ</label><textarea id="cert_ocr" placeholder="Nhập/dán các dòng như: số thửa, tờ bản đồ, diện tích, loại đất, thời hạn, ghi chú quy hoạch..."></textarea><button class="mini" style="margin-top:8px" onclick="fillCertFields(extractCertificateFields(document.getElementById('cert_ocr').value));toast('Đã bóc thông tin từ ô chữ')">Bóc thông tin từ ô chữ</button></div></div><div class="card"><h2>2. Thông tin lô đất</h2><div class="formGrid"><div class="field"><label>Số thửa</label><input class="input" id="cert_parcel" placeholder="54"></div><div class="field"><label>Tờ bản đồ</label><input class="input" id="cert_sheet" placeholder="14"></div><div class="field"><label>Diện tích (m²)</label><input class="input" id="cert_area" inputmode="decimal" placeholder="1519,5"></div><div class="field"><label>Loại đất</label><input class="input" id="cert_landtype" placeholder="Đất chuyên trồng lúa / đất ở..."></div><div class="field"><label>Thời hạn sử dụng</label><input class="input" id="cert_expiry" placeholder="22/12/2068"></div><div class="field"><label>Diện tích vướng quy hoạch (m²)</label><input class="input" id="cert_planarea" inputmode="decimal" placeholder="313,6"></div></div><div class="field" style="margin-top:12px"><label>Địa chỉ / khu vực</label><input class="input" id="cert_address" placeholder="Tổ dân phố, phường/xã, Ninh Hòa..."></div><div class="field" style="margin-top:12px"><label>Ghi chú quy hoạch trên sổ</label><input class="input" id="cert_planning" placeholder="Ví dụ: thửa đất có ... m² thuộc quy hoạch giao thông"></div></div><div class="card"><h2>3. Vị trí & giá bán</h2><div class="mapsInput"><input class="input" id="cert_maps" placeholder="Dán link Google Maps nếu có"><button class="mini gold" onclick="openUrl(document.getElementById('cert_maps').value||'https://maps.google.com')">Mở</button></div><div class="formGrid" style="margin-top:12px"><div class="field"><label>Giá bán (tỷ đồng, nếu có)</label><input class="input" id="cert_price" inputmode="decimal" placeholder="1.8"></div><div class="field"><label>Ghi chú thêm</label><input class="input" id="cert_note" placeholder="Đường vào, dân cư, môi giới nói gì..."></div></div><button class="primary gold" style="width:100%;margin-top:14px" onclick="analyzeCertificateDeal()">Tạo báo cáo lô đất</button></div><div class="card result" id="certResult"></div><div class="card"><h2>Kiểm tra nhanh kiểu cũ</h2><p>Không có ảnh sổ? Bạn vẫn có thể nhập thông tin cơ bản để sàng lọc.</p><div class="actions"><button class="primary soft" onclick="renderBasicDealForm()">Mở form kiểm tra cơ bản</button></div></div><div id="basicDealSlot"></div>`;
}

render();if(!state.news.length)state.news=fallbackNews.map(normalizeNews);setTimeout(()=>{if((state.news||[]).length<150)refreshNews();else hydrateNewsImages()},700);
