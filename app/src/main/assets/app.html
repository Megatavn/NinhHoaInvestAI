function imgFor(n){const s=(n.title+' '+n.summary+' '+(n.category||'')).toLowerCase();if(s.includes('biển')||s.includes('dốc lết')||s.includes('du lịch'))return 'https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=700&q=70';if(s.includes('cảng')||s.includes('vân phong')||s.includes('logistics'))return 'https://images.unsplash.com/photo-1501785888041-af3ef285b470?auto=format&fit=crop&w=700&q=70';if(s.includes('cao tốc')||s.includes('đường')||s.includes('hạ tầng'))return 'https://images.unsplash.com/photo-1519003722824-194d4455a60c?auto=format&fit=crop&w=700&q=70';if(s.includes('pháp')||s.includes('công báo')||s.includes('quy hoạch'))return 'https://images.unsplash.com/photo-1450101499163-c8848c66ca85?auto=format&fit=crop&w=700&q=70';return 'https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?auto=format&fit=crop&w=700&q=70'}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1900)}
function openUrl(u){if(window.Android&&Android.openExternal)Android.openExternal(u);else location.href=u}
function go(tab){state.tab=tab;document.querySelectorAll('.page').forEach(p=>p.classList.toggle('active',p.id===tab));document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));renderTab(tab);scrollTo({top:0,behavior:'smooth'})}
function render(){document.getElementById('nav').innerHTML=navs.map(n=>`<button data-tab="${n[0]}" class="${state.tab===n[0]?'active':''}" onclick="go('${n[0]}')"><span>${n[1]}</span>${n[2]}</button>`).join('');document.getElementById('quickFilters').innerHTML=quick.map(q=>`<button class="qf ${state.filter===q?'active':''}" onclick="state.filter='${q}';go('news')">${q}</button>`).join('');document.getElementById('countTop').textContent=(state.news.length||fallbackNews.length)+' tin';renderTab(state.tab)}
function renderTab(t){if(t==='home')renderHome();if(t==='news')renderNews();if(t==='check')renderCheck();if(t==='areas')renderAreas();if(t==='legal')renderLegal();if(t==='saved')renderSaved();document.getElementById('countTop').textContent=(state.news.length||fallbackNews.length)+' tin'}
function renderHome(){const news=getFilteredNews('Tất cả').slice(0,4);document.getElementById('home').innerHTML=`<div class="heroCompact"><div class="ctaGrid"><button class="cta" onclick="go('news')"><span>📰</span><b>Xem tin mới</b><small>Tin đáng chú ý theo khu vực.</small></button><button class="cta" onclick="go('check')"><span>🛡️</span><b>Kiểm tra đất</b><small>Phân tích rủi ro trước khi mua.</small></button><button class="cta" onclick="go('legal')"><span>⚖️</span><b>Pháp lý</b><small>Checklist, nguồn chính thức.</small></button></div></div><div class="sectionTitle"><h2>Tin đáng chú ý</h2><span>${state.news.length||fallbackNews.length} tin đang theo dõi</span></div><div class="newsGrid">${news.map((n,i)=>newsCard(n,i)).join('')}</div><div class="sectionTitle"><h2>Khu vực nổi bật</h2><span>lọc tin theo vùng</span></div><div class="areaDeck">${areaProfiles.slice(0,3).map(areaCard).join('')}</div>`}
function getAllNews(){const by={};[...state.news,...fallbackNews].forEach(n=>{if(n&&n.title&&!by[n.title])by[n.title]=normalizeNews(n)});return Object.values(by)}
function normalizeNews(n){n.category=n.category||categoryOf(n.title+' '+n.summary);n.area=n.area||deriveAreas(n.title+' '+n.summary+' '+n.category);n.impactScore=n.impactScore||scoreImpact(n.title+' '+n.summary+' '+n.category);return n}
function getFilteredNews(filter=state.filter){let list=getAllNews();if(filter&&filter!=='Tất cả'){const f=filter.toLowerCase();list=list.filter(n=>(n.category||'').toLowerCase().includes(f)||(n.title||'').toLowerCase().includes(f)||(n.summary||'').toLowerCase().includes(f)||(n.area||[]).join(' ').toLowerCase().includes(f))}if(state.area&&state.area!=='Tất cả'){const a=areaProfiles.find(x=>x.name===state.area);if(a){list=list.filter(n=>matchesArea(n,a))}}return list.sort((a,b)=>(b.impactScore||0)-(a.impactScore||0))}
function matchesArea(n,a){const text=(n.title+' '+n.summary+' '+(n.area||[]).join(' ')).toLowerCase();return a.keys.some(k=>text.includes(k.toLowerCase()))}
function renderNews(){const cats=['Tất cả','Hạ tầng','Quy hoạch','Pháp lý','Vân Phong','Ninh Hòa','Dốc Lết'];const areas=['Tất cả',...areaProfiles.map(a=>a.name)];const list=getFilteredNews();const lead=list[0];document.getElementById('news').innerHTML=`<div class="chips">${cats.map(c=>`<button class="chip ${state.filter===c?'active':''}" onclick="state.filter='${c}';state.area='Tất cả';renderNews()">${c}</button>`).join('')}</div><div class="chips">${areas.map(a=>`<button class="chip ${state.area===a?'active':''}" onclick="state.area='${a}';renderNews()">${a}</button>`).join('')}</div>${lead?leadCard(lead):''}<div class="sectionTitle"><h2>${state.area==='Tất cả'?'Bảng tin đầu tư':'Tin quanh '+state.area}</h2><span>${list.length} kết quả</span></div><div class="newsGrid">${list.slice(1,80).map(newsCard).join('')}</div>`}
function leadCard(n){return `<article class="leadNews"><div class="leadImg" style="background-image:linear-gradient(180deg,rgba(6,27,44,.05),rgba(6,27,44,.28)),url('${imgFor(n)}')"></div><div class="leadBody"><div class="tags"><span class="tag impact-high">Tác động ${n.impactScore}/100</span><span class="tag area">${esc((n.area||[])[0]||'Khánh Hòa')}</span><span class="tag verified">${esc(n.category||'Tin')}</span></div><h3>${esc(n.title)}</h3><p>${esc(n.summary)}</p><div class="actions"><button class="mini gold" onclick='briefNews(${JSON.stringify(n).replace(/'/g,"&#039;")})'>Phân tích</button><button class="mini" onclick='quickRead(${JSON.stringify(n).replace(/'/g,"&#039;")})'>Đọc nhanh</button><button class="mini" onclick="openUrl('${esc(n.url||'https://news.google.com/search?q=Ninh%20H%C3%B2a%20Kh%C3%A1nh%20H%C3%B2a&hl=vi&gl=VN&ceid=VN:vi')}')">Mở nguồn</button></div></div></article>`}
function newsCard(n){return `<article class="newsCard"><div class="thumb" style="background-image:url('${imgFor(n)}')"></div><div class="newsBody"><div class="tags"><span class="tag ${n.impactScore>=80?'impact-high':n.impactScore>=65?'impact-mid':'hot'}">${n.impactScore}/100</span><span class="tag area">${esc((n.area||[])[0]||'Khánh Hòa')}</span><span class="tag">${esc(n.category||'Tin')}</span></div><h3>${esc(n.title)}</h3><p>${esc(n.summary||'Tin cần đọc kèm nguồn chính thức trước khi ra quyết định.')}</p><div class="actions"><button class="mini gold" onclick='briefNews(${JSON.stringify(n).replace(/'/g,"&#039;")})'>Phân tích</button><button class="mini" onclick='saveNews(${JSON.stringify(n).replace(/'/g,"&#039;")})'>Lưu</button></div></div></article>`}
function scoreImpact(t){t=(t||'').toLowerCase();let s=45;if(/cao tốc|quy hoạch|công báo|vân phong|khu kinh tế|phân khu|cảng|bảng giá đất/.test(t))s+=28;if(/ninh hòa|ninh diêm|dốc lết|ninh hải|ninh xuân|ninh an/.test(t))s+=14;if(/khởi công|phê duyệt|ban hành|nghiệm thu|đưa vào hoạt động/.test(t))s+=10;if(/tin đồn|đề xuất|dự kiến|nghe nói/.test(t))s-=8;return Math.max(30,Math.min(96,s))}
function categoryOf(t){t=(t||'').toLowerCase();if(/công báo|pháp|luật|sổ|giá đất|sử dụng đất/.test(t))return 'Pháp lý';if(/quy hoạch|phân khu|đô thị|chung 2040/.test(t))return 'Quy hoạch';if(/cao tốc|hạ tầng|đường|giao thông|khởi công|nghiệm thu/.test(t))return 'Hạ tầng';if(/vân phong|cảng|logistics|khu kinh tế|công nghiệp/.test(t))return 'Vân Phong';if(/biển|dốc lết|du lịch|nghỉ dưỡng/.test(t))return 'Khu vực';return 'Thị trường'}
function deriveAreas(t){t=(t||'').toLowerCase();const res=[];for(const a of areaProfiles){if(a.keys.some(k=>t.includes(k.toLowerCase())))res.push(a.name)}if(t.includes('ninh hòa')&&!res.includes('Ninh Hòa'))res.push('Ninh Hòa');if(t.includes('khánh hòa')&&!res.length)res.push('Khánh Hòa');return res.length?res:['Khánh Hòa']}
function analysisFor(n){const t=(n.title+' '+n.summary).toLowerCase();const score=n.impactScore||scoreImpact(t);let level=score>=82?'Rất cao':score>=70?'Cao':score>=55?'Trung bình':'Thấp';let action=score>=82?'Theo dõi sát, nhưng không xuống tiền nếu pháp lý chưa rõ.':score>=70?'Có thể nghiên cứu khu vực liên quan và so sánh giá.':'Chỉ nên xem như tín hiệu tham khảo.';let risk=[];if(/quy hoạch|pháp|công báo|sử dụng đất/.test(t))risk.push('Cần đối chiếu số tờ, số thửa và văn bản gốc.');if(/cao tốc|hạ tầng|vân phong|cảng/.test(t))risk.push('Không mua chỉ vì kỳ vọng hạ tầng; cần kiểm tra tiến độ thực tế.');if(/du lịch|biển|dốc lết/.test(t))risk.push('Cần kiểm tra hành lang biển, mục đích sử dụng đất và khả năng khai thác thật.');if(!risk.length)risk.push('Cần kiểm tra nguồn tin, giá khu vực và khả năng bán lại.');return {score,level,action,risk,areas:n.area||deriveAreas(t),category:n.category||categoryOf(t)}}
function briefNews(n){n=normalizeNews(n);const a=analysisFor(n);showSheet(`<h2>Phân tích tác động tin</h2><h3>${esc(n.title)}</h3><p>${esc(n.summary)}</p><div class="impactBox"><div class="impactScore"><div class="ring"><b>${a.score}</b></div><div><b>Mức tác động: ${a.level}</b><p>Nhóm tin: ${esc(a.category)}<br>Khu vực ảnh hưởng: ${esc(a.areas.join(', '))}</p></div></div></div><div class="card" style="box-shadow:none;background:#fff8eb"><h3>Góc nhìn đầu tư</h3><p>${esc(a.action)}</p></div><div class="card" style="box-shadow:none"><h3>Rủi ro cần kiểm tra</h3>${a.risk.map(x=>`<p>• ${esc(x)}</p>`).join('')}<p>• Luôn mở nguồn gốc, đối chiếu pháp lý và không đặt cọc chỉ dựa trên tin tức.</p></div><div class="actions"><button class="primary gold" onclick="openUrl('${esc(n.url)}')">Mở nguồn</button><button class="primary soft" onclick='saveNews(${JSON.stringify(n).replace(/'/g,"&#039;")})'>Lưu tin</button></div>`)}
function quickRead(n){showSheet(`<h2>Đọc nhanh</h2><h3>${esc(n.title)}</h3><p><b>Nguồn:</b> ${esc(n.source||'')}</p><p>${esc(n.summary||'Tin cần mở nguồn để đọc chi tiết.')}</p><button class="primary gold" onclick="openUrl('${esc(n.url)}')">Mở nguồn gốc</button>`)}
function renderAreas(){const selected=state.area==='Tất cả'?'Ninh Diêm':state.area;const prof=areaProfiles.find(a=>a.name===selected)||areaProfiles[0];const list=getAllNews().filter(n=>matchesArea(n,prof)).slice(0,30);document.getElementById('areas').innerHTML=`<div class="chips">${areaProfiles.map(a=>`<button class="chip ${prof.name===a.name?'active':''}" onclick="state.area='${a.name}';renderAreas()">${a.name}</button>`).join('')}</div>${areaCard(prof)}<div class="sectionTitle"><h2>Tin khoanh vùng</h2><span>${list.length} tin liên quan</span></div><div class="newsGrid">${list.map(newsCard).join('')||'<div class="saveEmpty">Chưa có tin phù hợp, bấm làm mới để quét thêm.</div>'}</div>`}
function areaCard(a){return `<div class="areaCard ${a.img}"><span class="tag hot" style="width:max-content">${esc(a.type)}</span><h3>${esc(a.name)}</h3><p>Tin tức và rủi ro được khoanh vùng theo khu vực bạn chọn.</p><div class="areaStats"><span>Tiềm năng ${a.score}/100</span><span>lọc theo khu vực</span><span>đọc góc nhìn đầu tư</span></div></div>`}
function renderCheck(){document.getElementById('check').innerHTML=`<div class="card"><h2>Kiểm tra một lô đất</h2><p>Nhập thông tin đang có. App sẽ cho kết luận dễ hiểu: nên xem tiếp, hỏi thêm hay tạm dừng.</p><div class="formGrid"><div class="field"><label>Khu vực</label><select id="c_area">${areaProfiles.map(a=>`<option>${a.name}</option>`).join('')}<option>Khác</option></select></div><div class="field"><label>Giai đoạn</label><select id="c_stage"><option>Mới xem cơ hội</option><option>Đang hỏi thêm</option><option>Đang chuẩn bị đi xem</option><option>Đang đàm phán</option></select></div><div class="field"><label>Diện tích (m²)</label><input id="c_size" class="input" inputmode="decimal" placeholder="120"></div><div class="field"><label>Giá bán (tỷ)</label><input id="c_price" class="input" inputmode="decimal" placeholder="1.8"></div><div class="field"><label>Giấy tờ</label><select id="c_doc"><option>Chưa rõ</option><option>Có sổ riêng</option><option>Sổ chung</option><option>Chưa có sổ</option><option>Giấy tay</option></select></div><div class="field"><label>Đường vào</label><select id="c_road"><option>Chưa rõ</option><option>Đường công rõ ràng</option><option>Đường bê tông nhỏ</option><option>Đường đất</option><option>Đi nhờ/lối đi chưa rõ</option></select></div></div><div class="field" style="margin-top:12px"><label>Ghi chú thêm</label><textarea id="c_note" placeholder="Gần cao tốc, gần biển, gần Vân Phong, nghe môi giới nói..."></textarea></div><button class="primary gold" style="width:100%;margin-top:12px" onclick="analyzeDeal()">Phân tích lô đất</button></div><div class="card result" id="dealResult"></div>`}
function analyzeDeal(){const area=document.getElementById('c_area').value, size=parseFloat(document.getElementById('c_size').value||0), price=parseFloat(document.getElementById('c_price').value||0), doc=document.getElementById('c_doc').value, road=document.getElementById('c_road').value, note=document.getElementById('c_note').value;let score=55;if(doc==='Có sổ riêng')score+=18;if(/Chưa|Giấy tay|Sổ chung/.test(doc))score-=18;if(/Đường công/.test(road))score+=10;if(/Đi nhờ|Đường đất|Chưa rõ/.test(road))score-=10;if(note.toLowerCase().includes('vân phong')||note.toLowerCase().includes('cao tốc')||note.toLowerCase().includes('biển'))score+=8;if(price&&size){let m2=price*1000/size;if(m2>30)score-=8;if(m2<8)score-=3}score=Math.max(15,Math.min(92,score));const decision=score>=75?'Có thể xem tiếp, chưa nên đặt cọc':score>=55?'Hỏi thêm trước khi đi xem':'Tạm dừng, thiếu dữ liệu quan trọng';window.__lastDeal={area,score,decision,date:new Date().toLocaleString('vi-VN')};document.getElementById('dealResult').style.display='block';document.getElementById('dealResult').innerHTML=`<h2>Kết quả kiểm tra</h2><div class="resultGrid"><div class="scoreBig"><b>${score}</b></div><div><h3>${decision}</h3><p>Mức điểm này chỉ dùng để sàng lọc ban đầu. Không thay thế kiểm tra pháp lý thực tế.</p></div></div><div class="impactBox"><b>Việc cần làm tiếp</b><p>1. Yêu cầu sổ, số tờ, số thửa.<br>2. Kiểm tra quy hoạch/lộ giới qua nguồn chính thức.<br>3. So sánh ít nhất 3 lô cùng khu.<br>4. Không đặt cọc nếu giấy tờ hoặc đường vào chưa rõ.</p></div><button class="primary gold" style="width:100%" onclick="saveDeal()">Lưu hồ sơ</button>`;document.getElementById('dealResult').scrollIntoView({behavior:'smooth'})}
function saveDeal(){if(!window.__lastDeal)return toast('Chưa có hồ sơ để lưu');state.deals.unshift(window.__lastDeal);store('deals',state.deals);toast('Đã lưu hồ sơ');renderSaved()}
const legalAnswers={'Đất chưa có sổ có nên mua không?':'Rủi ro cao. Chỉ nên nghiên cứu nếu hiểu rõ nguồn gốc đất, điều kiện sang tên và rủi ro không hoàn tất pháp lý.','Trước khi đặt cọc cần kiểm tra gì?':'Cần kiểm tra sổ, chủ sở hữu, quy hoạch, lộ giới, tranh chấp, thế chấp, đường vào và điều khoản hoàn cọc.','Làm sao biết đất có vướng quy hoạch?':'Cần đối chiếu số tờ/số thửa tại nguồn chính thức và xác minh tại cơ quan có thẩm quyền. App chỉ hỗ trợ mở đúng nguồn.','Đường vào hợp pháp là gì?':'Đường vào nên là đường công hoặc có quyền sử dụng rõ ràng. Đường tự mở, đi nhờ hoặc hứa miệng đều cần kiểm tra kỹ.','Khi nào nên dừng thương vụ?':'Dừng nếu không cho xem sổ, giấy tờ mơ hồ, đường vào không rõ, dính quy hoạch xấu hoặc điều khoản cọc bất lợi.'};
function renderLegal(){const qs=Object.keys(legalAnswers);document.getElementById('legal').innerHTML=`<div class="card"><h2>Pháp lý dễ hiểu</h2><p>Tập trung vào câu hỏi thực tế trước khi xuống tiền.</p>${qs.map(q=>`<button class="question" onclick="showLegal('${esc(q)}')"><span>${esc(q)}</span><b>›</b></button>`).join('')}<div class="answerBox" id="legalAnswer"></div></div><div class="card"><h2>Checklist trước khi đặt cọc</h2>${['Có sổ hoặc giấy tờ rõ ràng','Đúng chủ sở hữu','Không tranh chấp/thế chấp bất thường','Đã kiểm tra quy hoạch/lộ giới','Đường vào hợp pháp','Giá đã so sánh khu vực','Điều khoản hoàn cọc rõ ràng'].map(x=>`<label class="checkItem"><input type="checkbox"><span>${x}</span></label>`).join('')}</div><div class="card"><h2>Nguồn chính thức</h2><div class="actions">${sources.map(s=>`<button class="primary soft" onclick="openUrl('${s.url}')">${s.name}</button>`).join('')}</div></div>`}
function showLegal(q){const box=document.getElementById('legalAnswer');box.style.display='block';box.innerHTML=`<b>${q}</b><br>${legalAnswers[q]}`;box.scrollIntoView({behavior:'smooth',block:'nearest'})}
function renderSaved(){document.getElementById('saved').innerHTML=`<div class="card"><h2>Hồ sơ đã lưu</h2>${state.deals.length?state.deals.map(d=>`<div class="checkItem"><div><b>${esc(d.area)} • ${d.score}/100</b><br><span>${esc(d.decision)} • ${esc(d.date)}</span></div></div>`).join(''):'<div class="saveEmpty">Chưa có hồ sơ lô đất nào.</div>'}</div><div class="card"><h2>Tin đã lưu</h2><div class="newsGrid">${state.saved.length?state.saved.map(newsCard).join(''):'<div class="saveEmpty">Chưa lưu tin nào.</div>'}</div></div>`}
function saveNews(n){n=normalizeNews(n);if(!state.saved.find(x=>x.title===n.title))state.saved.unshift(n);store('saved',state.saved);toast('Đã lưu tin')}
function showGuide(){showSheet(`<h2>Hướng dẫn sử dụng</h2><div class="card" style="box-shadow:none"><h3>1. Xem tin theo khu vực</h3><p>Vào Tin tức hoặc Khu vực, chọn vùng bạn quan tâm như Ninh Diêm, Dốc Lết, Vân Phong.</p></div><div class="card" style="box-shadow:none"><h3>2. Đọc phân tích tác động</h3><p>Bấm Phân tích trên mỗi tin để xem mức tác động, khu vực ảnh hưởng, rủi ro và việc nên làm tiếp.</p></div><div class="card" style="box-shadow:none"><h3>3. Kiểm tra lô đất</h3><p>Nhập khu vực, diện tích, giá, giấy tờ, đường vào. App cho kết luận sàng lọc ban đầu.</p></div><div class="card" style="box-shadow:none;background:#fff8eb"><h3>Lưu ý pháp lý</h3><p>App không thay thế cơ quan nhà nước, luật sư hoặc văn bản pháp lý gốc. Trước khi đặt cọc cần kiểm tra sổ, quy hoạch, lộ giới và tranh chấp.</p></div>`)}
function showSheet(html){document.getElementById('sheet').innerHTML=html+'<button class="primary soft" style="width:100%;margin-top:8px" onclick="hideSheet()">Đóng</button>';document.getElementById('modal').classList.add('show')}
function hideSheet(){document.getElementById('modal').classList.remove('show')}
function closeModal(e){if(e.target.id==='modal')hideSheet()}
function globalSearch(q){q=(q||'').trim();if(!q)return;const area=areaProfiles.find(a=>a.name.toLowerCase().includes(q.toLowerCase()));if(area){state.area=area.name;go('areas');return}if(q.toLowerCase().includes('pháp')||q.toLowerCase().includes('sổ')||q.toLowerCase().includes('cọc'))go('legal');else{state.filter=q;go('news')}}
function toggleDark(){document.body.classList.toggle('dark');localStorage.setItem('v21_dark',document.body.classList.contains('dark')?'1':'0')}
if(localStorage.getItem('v21_dark')==='1')document.body.classList.add('dark');
function nativeFetch(url){return new Promise((resolve,reject)=>{const id='r'+Math.random().toString(36).slice(2);window.__nativeFetchDone=(rid,payload)=>{if(rid!==id)return;if(String(payload).startsWith('__ERROR__'))reject(new Error(payload));else resolve(payload)};if(window.Android&&Android.fetchUrl){Android.fetchUrl(id,url)}else{fetch(url).then(r=>r.text()).then(resolve).catch(reject)}})}
async function refreshNews(){toast('Đang quét thêm tin...');let found=[];for(const q of queries){const url='https://news.google.com/rss/search?q='+encodeURIComponent(q)+'&hl=vi&gl=VN&ceid=VN:vi';try{const xml=await nativeFetch(url);found=found.concat(parseRss(xml,q))}catch(e){}}
 const by={};found.concat(fallbackNews).forEach(n=>{if(n.title&&!by[n.title])by[n.title]=normalizeNews(n)});state.news=Object.values(by).slice(0,180);store('news',state.news);state.filter='Tất cả';state.area='Tất cả';render();toast('Đã cập nhật '+state.news.length+' tin')}
function parseRss(xml,q){const doc=new DOMParser().parseFromString(xml,'text/xml');return [...doc.querySelectorAll('item')].slice(0,24).map(item=>{const title=item.querySelector('title')?.textContent||'';const link=item.querySelector('link')?.textContent||'';const desc=item.querySelector('description')?.textContent||'';const source=item.querySelector('source')?.textContent||'Google News';const clean=desc.replace(/<[^>]*>/g,' ').replace(/&nbsp;/g,' ').replace(/\s+/g,' ').trim();return normalizeNews({title,source,url:link,summary:clean||'Tin liên quan cần mở nguồn để đọc chi tiết.',category:categoryOf(title+' '+q),area:deriveAreas(title+' '+clean+' '+q),impactScore:scoreImpact(title+' '+clean+' '+q)})}).filter(x=>x.title)}
window.__appBack=function(){if(document.getElementById('modal').classList.contains('show')){hideSheet();return}if(state.tab!=='home')go('home')};
render();if(!state.news.length)state.news=fallbackNews.map(normalizeNews);setTimeout(()=>{if((state.news||[]).length<120)refreshNews()},700);
</script>
