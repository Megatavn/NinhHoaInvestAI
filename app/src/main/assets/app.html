function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(window.__toast);window.__toast=setTimeout(()=>el.classList.remove('show'),2400);if(window.Android&&Android.toast)try{Android.toast(msg)}catch(e){}}
function esc(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function openUrl(u){if(window.Android&&Android.openExternal){Android.openExternal(u)}else{window.open(u,'_blank')}}
function go(tab){state.tab=tab;document.querySelectorAll('.page').forEach(p=>p.classList.toggle('active',p.id===tab));document.querySelectorAll('.navBtn').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));const titles={home:['Đầu tư rõ ràng hơn, ít rủi ro hơn','Tin chọn lọc, kiểm tra lô đất, khu vực trọng điểm và pháp lý được trình bày ngắn gọn, dễ hiểu.'],news:['Tin đáng chú ý cho nhà đầu tư','Lọc tin hạ tầng, quy hoạch, pháp lý và Vân Phong theo góc nhìn đầu tư.'],check:['Kiểm tra lô đất trước khi xuống tiền','Nhập thông tin bạn biết. App sẽ gợi ý mức an toàn, rủi ro và việc cần làm tiếp.'],areas:['Khu vực đầu tư nổi bật','Xem từng khu vực bằng hình ảnh, động lực tăng trưởng và rủi ro cần kiểm tra.'],legal:['Pháp lý rõ ràng, dễ hiểu','Hỏi nhanh, xem checklist và mở đúng nguồn chính thức trước khi đặt cọc.'],saved:['Sổ tay đầu tư của bạn','Lưu tin, khu vực và hồ sơ lô đất để theo dõi lâu dài.']};document.getElementById('heroTitle').textContent=titles[tab][0];document.getElementById('heroDesc').textContent=titles[tab][1];window.scrollTo({top:0,behavior:'smooth'});render();}
function render(){document.getElementById('newsCount').textContent=(state.news.length||0)+' tin';renderHome();renderNews();renderCheck();renderAreas();renderLegal();renderSaved();}
function renderHome(){const hot=state.news.slice(0,3);document.getElementById('home').innerHTML=`
  <div class="grid3">
    <button class="actionCard" onclick="go('news')"><span class="ico">📰</span><b>Xem tin mới</b><small>Tin đáng chú ý về hạ tầng, pháp lý và khu vực.</small></button>
    <button class="actionCard" onclick="go('check')"><span class="ico">🛡️</span><b>Kiểm tra lô đất</b><small>Chấm điểm, rủi ro, biên an toàn và việc cần hỏi thêm.</small></button>
    <button class="actionCard" onclick="go('legal')"><span class="ico">⚖️</span><b>Tra pháp lý</b><small>Checklist, câu hỏi thường gặp và nguồn chính thức.</small></button>
  </div>
  <div class="sectionTitle"><h2>Tin đáng chú ý</h2><span onclick="go('news')">Xem tất cả</span></div>
  <div class="list">${hot.map(newsCard).join('')}</div>
  <div class="sectionTitle"><h2>Khu vực nổi bật</h2><span onclick="go('areas')">Mở hồ sơ</span></div>
  ${areaHero(areaData[1])}
  <div class="card"><h2>Điều cần nhớ trước khi đặt cọc</h2><div class="steps">
    <div class="step"><div class="num">1</div><div><b>Không mua chỉ vì tin đồn</b><span>Hạ tầng và quy hoạch phải được kiểm chứng bằng nguồn chính thức.</span></div></div>
    <div class="step"><div class="num">2</div><div><b>Kiểm tra giấy tờ trước</b><span>Sổ, chủ sở hữu, tranh chấp, thế chấp, lộ giới và đường vào.</span></div></div>
    <div class="step"><div class="num">3</div><div><b>Luôn có đường lui</b><span>Hỏi: nếu 12 tháng chưa bán được, mình có chịu được không?</span></div></div>
  </div></div>`}
function newsCard(n,i=0){const impact=n.impact||calcImpact(n.title+n.summary);const visual=n.visual||pickVisual(n);return `<article class="newsCard"><div class="thumb ${visual}"></div><div class="newsBody"><h3>${esc(n.title)}</h3><p>${esc(n.summary||'Tin cần đọc kèm nguồn chính thức và kiểm chứng trước khi ra quyết định.')}</p><div class="tags"><span class="tag hot">${esc(impact)}</span><span class="tag">${esc(n.category||'Tin')}</span><span class="tag legal">${esc(n.source||'Nguồn')}</span></div><div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap"><button class="primary soft" onclick='quickRead(${JSON.stringify(n).replace(/'/g,"&apos;")})'>Đọc nhanh</button><button class="primary gold" onclick="openUrl('${esc(n.url)}')">Mở nguồn</button><button class="primary soft" onclick='saveNews(${JSON.stringify(n).replace(/'/g,"&apos;")})'>Lưu</button></div></div></article>`}
function pickVisual(n){const t=(n.title+' '+(n.summary||'')+' '+(n.category||'')).toLowerCase();if(t.includes('biển')||t.includes('dốc lết')||t.includes('du lịch'))return 'beach';if(t.includes('cao tốc')||t.includes('đường')||t.includes('hạ tầng'))return 'road';if(t.includes('pháp')||t.includes('công báo')||t.includes('quy hoạch'))return 'docs';return 'city'}
function calcImpact(t){t=(t||'').toLowerCase();let s=0;['quy hoạch','công báo','cao tốc','vân phong','ninh hòa','pháp lý','sử dụng đất','khu kinh tế'].forEach(k=>{if(t.includes(k))s++});return s>=3?'Tác động cao':s>=1?'Cần theo dõi':'Tham khảo'}
function renderNews(){const cats=['Tất cả','Hạ tầng','Quy hoạch','Pháp lý','Vân Phong','Khu vực'];let list=state.news;if(state.filter!=='Tất cả')list=list.filter(n=>(n.category||'').toLowerCase().includes(state.filter.toLowerCase())||(n.title||'').toLowerCase().includes(state.filter.toLowerCase()));document.getElementById('news').innerHTML=`<div class="chips">${cats.map(c=>`<button class="chip ${state.filter===c?'active':''}" onclick="state.filter='${c}';renderNews()">${c}</button>`).join('')}</div><div class="list">${list.map(newsCard).join('')||'<div class="card"><h2>Chưa có tin phù hợp</h2><p>Bấm làm mới hoặc đổi bộ lọc.</p></div>'}</div>`}
function renderCheck(){document.getElementById('check').innerHTML=`<div class="card"><h2>Kiểm tra lô đất</h2><p>Nhập những gì bạn biết. Không cần đầy đủ, app sẽ chỉ ra phần còn thiếu.</p><div class="formGrid">
  <div class="field"><label>Khu vực</label><select id="dealArea">${areaData.map(a=>`<option>${a.name}</option>`).join('')}<option>Khác</option></select></div>
  <div class="field"><label>Giai đoạn</label><select id="dealStage"><option>Mới xem sơ bộ</option><option>Đang hỏi thêm</option><option>Chuẩn bị đi xem</option><option>Đang đàm phán</option></select></div>
  <div class="field"><label>Diện tích (m²)</label><input class="input" id="dealSize" type="number" placeholder="Ví dụ: 120"></div>
  <div class="field"><label>Giá bán (tỷ đồng)</label><input class="input" id="dealPrice" type="number" step="0.01" placeholder="Ví dụ: 1.8"></div>
  <div class="field"><label>Loại đất</label><select id="dealType"><option>Chưa rõ</option><option>Đất ở</option><option>Đất nông nghiệp</option><option>Đất thương mại dịch vụ</option><option>Đất khác</option></select></div>
  <div class="field"><label>Giấy tờ</label><select id="dealLegal"><option>Chưa kiểm tra</option><option>Có sổ riêng</option><option>Sổ chung</option><option>Chưa có sổ</option><option>Giấy tay</option></select></div>
  <div class="field"><label>Đường vào</label><select id="dealRoad"><option>Chưa rõ</option><option>Đường bê tông/nhựa</option><option>Đường đất</option><option>Đường lớn</option><option>Đường tự mở</option></select></div>
  <div class="field"><label>Mục tiêu</label><select id="dealGoal"><option>Giữ 1-3 năm</option><option>Lướt sóng</option><option>Giữ dài hạn</option><option>Mua để ở/khai thác</option></select></div>
  <div class="field" style="grid-column:1/-1"><label>Ghi chú thêm</label><textarea id="dealNote" placeholder="Ví dụ: gần Vân Phong, gần biển, nghe nói mở đường..."></textarea></div>
</div><button class="primary gold" style="width:100%;margin-top:16px" onclick="analyzeDeal()">Phân tích lô đất này</button></div><div id="dealResult" class="card result"></div>`}
function analyzeDeal(){const area=val('dealArea'),size=+val('dealSize'),price=+val('dealPrice'),type=val('dealType'),legal=val('dealLegal'),road=val('dealRoad'),goal=val('dealGoal'),note=val('dealNote');let score=58,warnings=[],good=[];if(legal==='Có sổ riêng'){score+=18;good.push('Giấy tờ có vẻ rõ hơn, nhưng vẫn cần đối chiếu chủ sở hữu và quy hoạch.')}else if(['Chưa có sổ','Giấy tay'].includes(legal)){score-=22;warnings.push('Giấy tờ rủi ro cao, chưa nên đặt cọc nếu chưa xác minh.')}else{score-=8;warnings.push('Chưa kiểm tra giấy tờ là điểm thiếu quan trọng.')}if(type==='Đất ở')score+=10; if(type==='Chưa rõ'){score-=8;warnings.push('Chưa rõ loại đất, cần hỏi mục đích sử dụng trên sổ.')}if(road.includes('bê tông')||road==='Đường lớn'){score+=8;good.push('Đường vào có vẻ thuận lợi hơn cho thanh khoản.')}if(road==='Đường tự mở'){score-=15;warnings.push('Đường tự mở cần kiểm tra quyền sử dụng đường và lối đi hợp pháp.')}if(note.toLowerCase().includes('nghe nói')||note.toLowerCase().includes('sắp')){score-=8;warnings.push('Có dấu hiệu mua theo kỳ vọng/tin đồn, cần nguồn chính thức.')}let areaInfo=areaData.find(a=>a.name===area);if(areaInfo&&areaInfo.score>80)score+=6;if(goal==='Lướt sóng')warnings.push('Lướt sóng cần thanh khoản thật; không phù hợp nếu khu vực khó bán lại nhanh.');score=Math.max(15,Math.min(92,score));let ppm=(size&&price)?((price*1000)/size).toFixed(1):'--';let decision=score>=78?'Có thể nghiên cứu sâu':score>=62?'Có thể xem tiếp, chưa nên đặt cọc':score>=45?'Hỏi thêm trước khi đi xem':'Nên tạm dừng';let result={area,size,price,type,legal,road,goal,note,score,decision,ppm,date:new Date().toLocaleString('vi-VN'),warnings,good};document.getElementById('dealResult').style.display='block';document.getElementById('dealResult').innerHTML=resultHtml(result);document.getElementById('dealResult').scrollIntoView({behavior:'smooth',block:'start'});window.__lastDeal=result;}
function val(id){return document.getElementById(id).value.trim()}
function resultHtml(r){return `<h2>Kết luận nhanh</h2><div class="resultGrid"><div class="scoreRing" style="background:conic-gradient(${r.score>=70?'var(--green)':r.score>=50?'var(--orange)':'var(--red)'} 0 ${r.score*3.6}deg,#e7eef3 ${r.score*3.6}deg)"><b>${r.score}/100</b></div><div><h3>${esc(r.decision)}</h3><p>Giá/m² ước tính: <b>${esc(r.ppm)} triệu/m²</b>. Đây là điểm sàng lọc ban đầu, không thay thế thẩm định pháp lý.</p></div></div><div class="grid2" style="margin-top:16px"><div class="card" style="box-shadow:none;margin:0;background:#f4fbf6"><h3>Điểm tốt</h3><p>${(r.good.length?r.good:['Có thể theo dõi nếu giá hợp lý và kiểm tra pháp lý đầy đủ.']).map(esc).join('<br>')}</p></div><div class="card" style="box-shadow:none;margin:0;background:#fff6ef"><h3>Điểm cần hỏi thêm</h3><p>${(r.warnings.length?r.warnings:['Cần kiểm tra quy hoạch, lộ giới, thế chấp, tranh chấp và giá khu vực.']).map(esc).join('<br>')}</p></div></div><div class="card" style="box-shadow:none;margin-top:14px;background:#f5f9fc"><h3>Việc nên làm tiếp</h3><div class="steps"><div class="step"><div class="num">1</div><div><b>Yêu cầu giấy tờ</b><span>Sổ, số tờ, số thửa, chủ sở hữu, tình trạng thế chấp.</span></div></div><div class="step"><div class="num">2</div><div><b>Kiểm tra quy hoạch</b><span>Mở nguồn chính thức Ninh Hòa/Công báo và xác minh tại cơ quan có thẩm quyền.</span></div></div><div class="step"><div class="num">3</div><div><b>So sánh giá</b><span>So sánh ít nhất 3 lô gần đó trước khi đàm phán hoặc đặt cọc.</span></div></div></div></div><button class="primary gold" style="width:100%" onclick="saveDeal()">Lưu hồ sơ này</button>`}
function saveDeal(){if(!window.__lastDeal)return toast('Chưa có hồ sơ để lưu');state.deals.unshift(window.__lastDeal);save('deals',state.deals);toast('Đã lưu hồ sơ thương vụ');renderSaved()}
function renderAreas(){document.getElementById('areas').innerHTML=`<div class="list">${areaData.map(a=>areaHero(a)+`<div style="display:flex;gap:10px;margin:-4px 0 16px"><button class="primary gold" onclick="areaDetail('${a.id}')">Xem chi tiết</button><button class="primary soft" onclick="saveArea('${a.id}')">Lưu khu vực</button></div>`).join('')}</div>`}
function areaHero(a){return `<div class="areaHero ${a.img}"><span class="tag hot" style="width:max-content">${esc(a.type)}</span><h3>${esc(a.name)}</h3><p>${esc(a.desc)}</p><div class="areaStats"><div class="stat"><b>${a.score}</b><small>Tiềm năng</small></div><div class="stat"><b>${esc(a.risk)}</b><small>Rủi ro</small></div><div class="stat"><b>3 bước</b><small>Kiểm tra</small></div></div></div>`}
function areaDetail(id){const a=areaData.find(x=>x.id===id);if(!a)return;showSheet(`<h2>${esc(a.name)}</h2>${areaHero(a)}<div class="card" style="box-shadow:none"><h3>Nhà đầu tư nên chú ý</h3><p>${esc(a.desc)}</p><ul><li>Kiểm tra quy hoạch và giấy tờ trước.</li><li>Không mua theo tin đồn tăng giá.</li><li>So sánh giá với lô gần đó.</li><li>Chuẩn bị kế hoạch bán ra nếu phải giữ 1–3 năm.</li></ul></div><button class="primary gold" style="width:100%" onclick="saveArea('${a.id}');hideSheet()">Lưu khu vực này</button>`)}
function saveArea(id){const a=areaData.find(x=>x.id===id);if(!a)return;if(!state.areasSaved.find(x=>x.id===id))state.areasSaved.unshift(a);save('areasSaved',state.areasSaved);toast('Đã lưu khu vực')}
const legalAnswers={
  'Đất chưa có sổ có nên mua không?':'Rủi ro cao. Người mua nên yêu cầu hồ sơ pháp lý rõ ràng, kiểm tra nguồn gốc đất và không đặt cọc nếu chưa hiểu điều kiện sang tên.',
  'Trước khi đặt cọc cần kiểm tra gì?':'Cần kiểm tra sổ, chủ sở hữu, quy hoạch, lộ giới, tranh chấp, thế chấp, đường vào và điều kiện hoàn cọc nếu thông tin không đúng.',
  'Làm sao biết đất có vướng quy hoạch?':'Hãy đối chiếu số tờ, số thửa tại nguồn chính thức của địa phương, cổng quy hoạch/công báo và xác minh tại cơ quan có thẩm quyền.',
  'Đường vào hợp pháp là gì?':'Đường vào nên là đường công hoặc có quyền sử dụng/lối đi được thể hiện rõ. Đường tự mở hoặc đi nhờ cần kiểm tra kỹ.',
  'Đất thương mại dịch vụ có phải đất ở không?':'Không. Đất thương mại dịch vụ có mục đích sử dụng khác đất ở. Không nên mua để ở nếu chưa hiểu rõ pháp lý và khả năng chuyển mục đích.',
  'Khi nào nên dừng thương vụ?':'Nên dừng nếu không cho xem sổ, giấy tờ mơ hồ, đường vào không rõ, dính quy hoạch xấu, giá bị đẩy theo tin đồn hoặc điều khoản cọc bất lợi.'
};
function renderLegal(){const qs=Object.keys(legalAnswers);document.getElementById('legal').innerHTML=`<div class="card"><h2>Hỏi nhanh pháp lý</h2><p>Chọn câu hỏi. App trả lời ngắn gọn, dễ hiểu.</p><div class="list">${qs.map(q=>`<button class="legalQuestion" onclick="showLegal('${esc(q)}')"><span>${esc(q)}</span><span>›</span></button>`).join('')}</div><div id="legalAnswer" class="answerBox"></div></div><div class="card"><h2>Checklist trước khi đặt cọc</h2>${['Có sổ đỏ/sổ hồng hoặc giấy tờ rõ ràng','Đúng chủ sở hữu/người được ủy quyền hợp lệ','Không tranh chấp, không thế chấp bất thường','Đã kiểm tra quy hoạch/lộ giới','Đường vào hợp pháp','Giá đã so sánh với khu vực','Điều khoản cọc có hoàn cọc nếu pháp lý sai'].map((x,i)=>`<label class="checkItem"><input type="checkbox" onchange="updateLegalScore()"><span>${x}</span></label>`).join('')}<button class="primary gold" style="width:100%" onclick="updateLegalScore(true)">Tính mức an toàn</button><p id="legalScore"></p></div><div class="card"><h2>Nguồn chính thức</h2><p>Mở đúng nguồn để đối chiếu. Kết quả cuối cần xác minh theo số tờ, số thửa và cơ quan có thẩm quyền.</p><div class="sourceGrid">${sources.map(s=>`<button class="primary soft" onclick="openUrl('${s.url}')">${esc(s.name)}</button>`).join('')}</div></div>`}
function showLegal(q){const box=document.getElementById('legalAnswer');box.style.display='block';box.innerHTML=`<b>${q}</b><br>${legalAnswers[q]||''}`;box.scrollIntoView({behavior:'smooth',block:'nearest'})}
function updateLegalScore(show){const checks=[...document.querySelectorAll('#legal .checkItem input')];const done=checks.filter(x=>x.checked).length;const score=Math.round(done/checks.length*100);document.getElementById('legalScore').innerHTML=`Mức hoàn thành kiểm tra: <b>${score}/100</b>. ${score<70?'Chưa nên đặt cọc nếu còn thiếu mục quan trọng.':'Có thể nghiên cứu tiếp, vẫn cần xác minh nguồn chính thức.'}`;if(show)toast('Đã tính mức an toàn pháp lý')}
function renderSaved(){document.getElementById('saved').innerHTML=`<div class="card"><h2>Hồ sơ đã lưu</h2>${state.deals.length?state.deals.map(d=>`<div class="checkItem"><div><b>${esc(d.area)} • ${d.score}/100</b><br><span>${esc(d.decision)} • ${esc(d.date)}</span></div></div>`).join(''):'<div class="saveEmpty">Chưa có hồ sơ lô đất nào.</div>'}</div><div class="card"><h2>Khu vực đã lưu</h2>${state.areasSaved.length?state.areasSaved.map(a=>`<div class="checkItem"><div><b>${esc(a.name)}</b><br><span>${esc(a.type)} • Tiềm năng ${a.score}/100</span></div></div>`).join(''):'<div class="saveEmpty">Chưa lưu khu vực nào.</div>'}</div><div class="card"><h2>Tin đã lưu</h2>${state.saved.length?state.saved.map(newsCard).join(''):'<div class="saveEmpty">Chưa lưu tin nào.</div>'}</div>`}
function saveNews(n){if(!state.saved.find(x=>x.title===n.title))state.saved.unshift(n);save('saved',state.saved);toast('Đã lưu tin')}
function quickRead(n){showSheet(`<h2>${esc(n.title)}</h2><p><b>Nguồn:</b> ${esc(n.source||'')}</p><p><b>Tác động:</b> ${esc(n.impact||calcImpact(n.title+n.summary))}</p><p>${esc(n.summary||'Tin này cần đọc kèm nguồn chính thức trước khi ra quyết định đầu tư.')}</p><div class="card" style="box-shadow:none;background:#fff8eb"><h3>Góc nhìn đầu tư</h3><p>Không nên xuống tiền chỉ vì một tin tức. Hãy kiểm tra pháp lý, quy hoạch, giá khu vực và khả năng bán lại.</p></div><button class="primary gold" onclick="openUrl('${esc(n.url)}')">Mở nguồn gốc</button>`)}
function showSheet(html){document.getElementById('sheet').innerHTML=html+'<div style="height:16px"></div><button class="primary soft" style="width:100%" onclick="hideSheet()">Đóng</button>';document.getElementById('modal').classList.add('show')}
function hideSheet(){document.getElementById('modal').classList.remove('show')}
function closeModal(e){if(e.target.id==='modal')hideSheet()}
function globalSearch(q){q=q.trim().toLowerCase();if(!q)return;const area=areaData.find(a=>a.name.toLowerCase().includes(q));if(area){go('areas');setTimeout(()=>areaDetail(area.id),250);return}if(q.includes('pháp')||q.includes('sổ')||q.includes('cọc'))go('legal');else go('news')}
function toggleDark(){document.body.classList.toggle('dark');localStorage.setItem('v20_dark',document.body.classList.contains('dark')?'1':'0')}
if(localStorage.getItem('v20_dark')==='1')document.body.classList.add('dark');
function nativeFetch(url){return new Promise((resolve,reject)=>{const id='r'+Math.random().toString(36).slice(2);window.__nativeFetchDone=(rid,payload)=>{if(rid!==id)return;if(String(payload).startsWith('__ERROR__'))reject(new Error(payload));else resolve(payload)};if(window.Android&&Android.fetchUrl){Android.fetchUrl(id,url)}else{fetch(url).then(r=>r.text()).then(resolve).catch(reject)}})}
async function refreshNews(){toast('Đang làm mới tin...');let found=[];for(const q of qs){const url='https://news.google.com/rss/search?q='+encodeURIComponent(q)+'&hl=vi&gl=VN&ceid=VN:vi';try{const xml=await nativeFetch(url);found=found.concat(parseRss(xml,q));}catch(e){}}
 const by={};found.concat(fallbackNews).forEach(n=>{if(n.title&&!by[n.title])by[n.title]=n});state.news=Object.values(by).slice(0,80);save('news',state.news);render();toast('Đã cập nhật tin')}
function parseRss(xml,q){const doc=new DOMParser().parseFromString(xml,'text/xml');return [...doc.querySelectorAll('item')].slice(0,18).map(item=>{let title=item.querySelector('title')?.textContent||'';let link=item.querySelector('link')?.textContent||'';let desc=item.querySelector('description')?.textContent||'';let source=item.querySelector('source')?.textContent||'Google News';let clean=desc.replace(/<[^>]*>/g,' ').replace(/&nbsp;/g,' ').replace(/\s+/g,' ').trim();return {title,source,url:link,summary:clean||'Tin liên quan cần mở nguồn để đọc chi tiết.',category:categoryOf(title+' '+q),impact:calcImpact(title+' '+clean+' '+q),visual:pickVisual({title,summary:clean,category:q})}}).filter(x=>x.title)}
function categoryOf(t){t=t.toLowerCase();if(t.includes('công báo')||t.includes('pháp')||t.includes('quy hoạch')||t.includes('sử dụng đất'))return 'Pháp lý';if(t.includes('cao tốc')||t.includes('hạ tầng')||t.includes('đường'))return 'Hạ tầng';if(t.includes('vân phong')||t.includes('cảng'))return 'Vân Phong';if(t.includes('biển')||t.includes('du lịch'))return 'Khu vực';return 'Tin'}
window.__appBack=function(){if(document.getElementById('modal').classList.contains('show')){hideSheet();return}if(state.tab!=='home')go('home');}
render();setTimeout(()=>{if(!state.news||state.news.length<=fallbackNews.length)refreshNews()},800);
</script>
