      url:'https://nguoiquansat.vn/viet-nam-du-kien-co-them-trung-tam-logistics-va-trung-chuyen-quoc-te-tai-tinh-co-bo-bien-dai-nhat-ca-nuoc-292879.html',
      summary:'Tin logistics cần theo dõi nếu liên quan Khánh Hòa/Vân Phong. Nhóm cảng, logistics, trung chuyển quốc tế có thể tác động đến kỳ vọng khu vực Vân Phong và các vùng liên quan Ninh Hòa.',
      category:'Vân Phong', area:['Vân Phong','Ninh Hòa','Khánh Hòa'], impactScore:92, qualityScore:94, qualityLevel:'Tin cần lưu ý', pinned:true, pubDate:'2026-05-27', ts:new Date('2026-05-27T08:00:00+07:00').getTime()
    }
  ];
  function v294Text(n){return normalizeVN((((n&&n.title)||'')+' '+((n&&n.summary)||'')+' '+((n&&n.source)||'')+' '+((n&&n.category)||'')+' '+((n&&n.area)||[]).join(' ')).toLowerCase())}
  function v294IsImportantInfrastructure(n){
    const t=v294Text(n);
    return /cao toc khanh hoa buon ma thuot|cao toc van phong nha trang|logistics|trung chuyen quoc te|trung tam logistics|cang|van phong/.test(t) && /khanh hoa|ninh hoa|van phong|nam van phong|bac hon heo|ninh xuan/.test(t);
  }
  function v294Normalize(n){
    n=normalizeNews(n);

      n.qualityLevel=n.pinned?'Tin cần lưu ý':'Hạ tầng/logistics cần lưu ý';

    }

  }
  const oldStrictRelevant=window.strictRelevant;
  // Nếu file cũ không expose strictRelevant thì mở rộng tại lớp merge riêng phía dưới.
  function v294Relevant(n){

    if(n.pinned || v294IsImportantInfrastructure(n)) return true;
    if(typeof oldStrictRelevant==='function') return oldStrictRelevant(n);
    if(typeof v29IsRelevant==='function') return v29IsRelevant(n);
    const t=v294Text(n);
    return /ninh hoa|ninh diem|ninh hai|doc let|ninh xuan|ninh an|van phong|khanh hoa/.test(t);
  }
  function v294Key(n){

    t=t.replace(/toan van|quyet dinh|ubnd|bao dien tu|google tin tuc|tin moi/g,'').replace(/[^a-z0-9\s]/g,' ').replace(/\s+/g,' ').trim();
    if(/cao toc khanh hoa buon ma thuot/.test(t)) return 'cao-toc-khanh-hoa-buon-ma-thuot-'+(n.source||'').toLowerCase().slice(0,12);

  function nrm(s){return typeof normalizeVN==='function'?normalizeVN(String(s||'')):String(s||'').toLowerCase()}

  function applyTimeFilter(list){const tf=state.timeRange||'Tất cả'; if(tf==='Tất cả')return list; if(tf==='24h')return list.filter(n=>ageInfo(n).bucket==='24h'); if(tf==='7 ngày')return list.filter(n=>['24h','7 ngày'].includes(ageInfo(n).bucket)); if(tf==='30 ngày')return list.filter(n=>['24h','7 ngày','30 ngày'].includes(ageInfo(n).bucket)); if(tf==='Cũ hơn')return list.filter(n=>ageInfo(n).bucket==='Cũ hơn'); return list;}

  window.parseRss=function(xml,q){const doc=new DOMParser().parseFromString(xml,'text/xml'); return [...doc.querySelectorAll('item')].slice(0,28).map(item=>{const title=item.querySelector('title')?.textContent||''; const link=item.querySelector('link')?.textContent||''; const desc=item.querySelector('description')?.textContent||''; const source=item.querySelector('source')?.textContent||'Google Tin tức'; const pubDate=item.querySelector('pubDate')?.textContent||''; let image=''; const media=item.getElementsByTagName('media:content')[0]||item.getElementsByTagName('media:thumbnail')[0]; if(media)image=media.getAttribute('url')||''; const enc=item.querySelector('enclosure'); if(!image&&enc)image=enc.getAttribute('url')||''; if(!image){const m=desc.match(/<img[^>]+src=["']([^"']+)["']/i); if(m)image=m[1].replace(/&amp;/g,'&')} const clean=desc.replace(/<[^>]*>/g,' ').replace(/&nbsp;/g,' ').replace(/&amp;/g,'&').replace(/\s+/g,' ').trim(); return normalizeV30({title,source,url:link,image,summary:clean||'Tin liên quan cần mở nguồn để đọc chi tiết.',pubDate,ts:Date.parse(pubDate)||0});}).filter(n=>n.title&&!/youtube|tiktok|facebook/i.test(n.title)&&isRelevant(n));};
  window.refreshIfStale=function(){const last=Date.parse(load('newsLastRefresh','')||'')||0; const enough=(state.news||[]).length>=30; if(enough && (!last || Date.now()-last<V30_REFRESH_HOURS*60*60*1000))return; if(!enough || (last && Date.now()-last>=V30_REFRESH_HOURS*60*60*1000))refreshNews('quick')};

  window.refreshNews=async function(mode='quick'){if(typeof toast==='function')toast(mode==='deep'?'Đang quét nhiều nguồn...':'Đang cập nhật tin mới...'); const qs=v27BuildQueries(mode); let found=[],ok=0,fail=0; try{for(let i=0;i<qs.length;i++){try{const url='https://news.google.com/rss/search?q='+encodeURIComponent(qs[i])+'&hl=vi&gl=VN&ceid=VN:vi'; const xml=await nativeFetch(url); found=found.concat(parseRss(xml,qs[i])); ok++;}catch(e){fail++;}} state.news=merge([...found,...(state.news||[]),...fallbackNews]); const stamp=new Date().toLocaleString('vi-VN'); store('news',state.news); store('newsLastRefresh',stamp); store('newsStatus',{updated:stamp,ok,fail,found:found.length}); render(); if(typeof toast==='function')toast('Đã cập nhật bảng tin');}catch(e){console.warn('V30 refresh error',e); if(typeof toast==='function')toast('Không cập nhật được, đang dùng tin đã lưu')}};
  function timelineStats(){const all=getAllNews(); return {h24:all.filter(n=>ageInfo(n).bucket==='24h').length,d7:all.filter(n=>['24h','7 ngày'].includes(ageInfo(n).bucket)).length,d30:all.filter(n=>['24h','7 ngày','30 ngày'].includes(ageInfo(n).bucket)).length,old:all.filter(n=>ageInfo(n).bucket==='Cũ hơn').length,high:all.filter(n=>(n.impactScore||0)>=82).length,important:all.filter(n=>n.pinned||isImportant(n)).length};}

  window.newsCard=function(n){n=normalizeV30(n); const ai=ageInfo(n); const srcs=(n._sources||[sourceName(n)]).slice(0,3).join(', '); return `<article class="newsCard noPhoto v30NewsCard"><div class="newsSignal"><b>${Math.round(n.impactScore||0)}</b><span>tác động</span></div><div><div class="newsMetricRow"><span class="impactPill ${ai.bucket==='24h'?'freshNow':ai.bucket==='Cũ hơn'?'oldNews':''}">${ai.label}</span><span class="impactPill ${n.pinned?'pinned':''}">${esc(n.qualityLevel||'Đáng đọc')}</span><span class="impactPill">${esc((n.area||[])[0]||'Ninh Hòa')}</span><span class="impactPill">${esc(n.category||'Tin')}</span></div><h3>${esc(n.title)}</h3><p>${esc((n.summary||'').slice(0,190)||'Tin cần đọc kèm nguồn chính thức trước khi ra quyết định.')}</p><div class="sourceCompact"><b>${esc(sourceName(n))}</b><span>${(n._sources||[]).length>1?' · '+(n._sources||[]).length+' nguồn cùng chủ đề':''}</span></div><div class="sourceCompact mutedLine">${esc(reason(n))}</div><div class="actions compact"><button class="mini gold" onclick='briefNews(${JSON.stringify(n).replace(/'/g,"&#039;")})'>Phân tích</button><button class="mini" onclick='saveNews(${JSON.stringify(n).replace(/'/g,"&#039;")})'>Lưu</button><button class="mini" onclick="openUrl('${esc(n.url||'https://news.google.com')}')">Mở nguồn</button></div></div></article>`};
  window.briefNews=function(n){n=normalizeV30(n); const a=typeof analysisFor==='function'?analysisFor(n):{action:'Tin cần theo dõi trong bối cảnh đầu tư Ninh Hòa.',risk:'Cần kiểm chứng nguồn và tác động thực tế.',next:'Chỉ dùng tin như tín hiệu tham khảo.'}; const ai=ageInfo(n); const sources=(n._sources||[sourceName(n)]); const oldWarn=ai.bucket==='Cũ hơn'?'<div class="warnBox"><b>Lưu ý:</b> Tin này đã cũ hơn 30 ngày. Chỉ nên dùng để hiểu bối cảnh, không xem là tín hiệu mới.</div>':''; showSheet(`<h2>Phân tích tin theo dòng thời gian</h2><h3>${esc(n.title)}</h3><div class="impactBox"><p><b>Độ mới:</b> ${esc(ai.label)}<br><b>Tác động:</b> ${n.impactScore}/100 · ${impactText(n.impactScore)}<br><b>Chất lượng:</b> ${n.qualityScore}/100 · ${esc(n.qualityLevel)}<br><b>Khu vực:</b> ${esc((n.area||[]).join(', ')||'Ninh Hòa')}<br><b>Nguồn chính:</b> ${esc(sourceName(n))}</p></div>${oldWarn}<div class="card" style="box-shadow:none"><h3>Góc nhìn nhiều nguồn</h3><p>${sources.length>1?'Cùng chủ đề có '+sources.length+' nguồn được ghi nhận: '+esc(sources.slice(0,5).join(', '))+'. Khi nhiều nguồn cùng nhắc tới một chủ đề, độ tin cậy tín hiệu cao hơn, nhưng vẫn cần mở nguồn chính thức để kiểm chứng.':'Hiện chỉ ghi nhận một nguồn chính. Nên đọc nguồn gốc và đối chiếu thêm nếu liên quan tới quyết định mua đất.'}</p></div><div class="card" style="box-shadow:none;background:#f4f9fc"><h3>Góc nhìn đầu tư</h3><p>${esc(a.action)} ${esc(reason(n))}.</p></div><div class="card" style="box-shadow:none;background:#fff8e8"><h3>Rủi ro cần kiểm chứng</h3><p>${esc(a.risk)} Không nên xem tin hạ tầng/quy hoạch là lý do đặt cọc nếu chưa kiểm tra pháp lý lô đất.</p></div><div class="card" style="box-shadow:none;background:#eefbf4"><h3>Hành động đề xuất</h3><p>${esc(a.next)} Ưu tiên tin 24h/7 ngày cho quyết định theo dõi, còn tin cũ dùng để hiểu bối cảnh.</p></div><div class="actions"><button class="primary gold" onclick='saveNews(${JSON.stringify(n).replace(/'/g,"&#039;")})'>Lưu vào Sổ tay</button><button class="primary soft" onclick="openUrl('${esc(n.url||'https://news.google.com/search?q=Ninh%20H%C3%B2a%20Kh%C3%A1nh%20H%C3%B2a&hl=vi&gl=VN&ceid=VN:vi')}')">Mở nguồn</button></div>`)};
  window.renderNews=function(){const list=getFilteredNews(); const stats=timelineStats(); const all=getAllNews(); document.getElementById('quickFilters').innerHTML=V30_FILTERS.map(q=>`<button class="qf ${state.filter===q?'active':''}" onclick="state.filter='${q}';state.area='Tất cả';go('news')">${q}</button>`).join(''); document.getElementById('news').innerHTML=`<div class="v30Panel"><div><b>Bảng tin Ninh Hòa theo thời gian</b><span>${stats.h24?stats.h24+' tin mới trong 24h': 'Chưa có tin mới trong 24h'} · ${stats.important} tin cần lưu ý · ${stats.high} tin tác động cao</span></div><button class="mini gold" onclick="refreshNews('quick')">Cập nhật</button></div><div class="v30Brief"><b>Bản tin nhanh</b><p>${stats.h24?'Có '+stats.h24+' tin mới cần xem ngay.':'Không có tin mới trong 24h; nên xem nhóm 7 ngày gần đây.'} Khu vực nổi bật: ${esc(topAreas(all))}. Tin cũ hơn 30 ngày sẽ được xem là bối cảnh, không phải tín hiệu mới.</p></div><div class="chips">${V30_FILTERS.map(c=>`<button class="chip ${state.filter===c?'active':''}" onclick="state.filter='${c}';state.area='Tất cả';renderNews()">${c}</button>`).join('')}</div><div class="chips timeChips">${V30_TIME_FILTERS.map(t=>`<button class="chip ${state.timeRange===t?'active':''}" onclick="state.timeRange='${t}';renderNews()">${t}</button>`).join('')}</div><div class="timelineBoxes"><div><b>${stats.h24}</b><span>24h</span></div><div><b>${stats.d7}</b><span>7 ngày</span></div><div><b>${stats.d30}</b><span>30 ngày</span></div><div><b>${stats.old}</b><span>cũ hơn</span></div></div><div class="sectionTitle"><h2>${state.timeRange==='Tất cả'?'Tin đáng đọc':('Tin '+state.timeRange)}</h2><span>${list.length} kết quả</span></div><div class="newsGrid">${list.map(newsCard).join('')||'<div class="saveEmpty">Chưa có tin phù hợp bộ lọc này. Hãy chuyển sang 7 ngày hoặc bấm Cập nhật.</div>'}</div>`};
  window.render=function(){document.getElementById('nav').innerHTML=navs.map(n=>`<button data-tab="${n[0]}" class="${state.tab===n[0]?'active':''}" onclick="go('${n[0]}')"><span>${n[1]}</span>${n[2]}</button>`).join('');document.getElementById('quickFilters').innerHTML=V30_FILTERS.map(q=>`<button class="qf ${state.filter===q?'active':''}" onclick="state.filter='${q}';go('news')">${q}</button>`).join('');document.getElementById('countTop').textContent=getAllNews().length+' tin';renderTab(state.tab)};
  const css=document.createElement('style'); css.textContent=`
    .v295Panel,.v294Note,.strictNotice,.liveNewsPanel,.qualityPanel{display:none!important}
    .v30Panel{display:flex;align-items:center;justify-content:space-between;gap:12px;background:linear-gradient(135deg,#082e49,#07577a);color:#fff;border-radius:22px;padding:14px;margin:0 0 10px;box-shadow:0 12px 30px rgba(6,27,44,.14)}

    .v30NewsCard{grid-template-columns:76px 1fr!important}.newsSignal{border-radius:20px;background:linear-gradient(145deg,#fff8df,#e8f4fa);border:1px solid #e2edf2;display:grid;place-items:center;height:84px;color:#082e49}.newsSignal b{font-size:24px}.newsSignal span{font-size:10px;font-weight:950;color:#6d7e88;margin-top:-18px}.impactPill.freshNow{background:#eaf8f1!important;color:#09653e!important}.impactPill.oldNews{background:#edf1f4!important;color:#6a7a84!important}.sourceCompact{font-size:12px;color:#607481;margin-top:6px;font-weight:800}.sourceCompact b{color:#15364b}.mutedLine{font-weight:750;color:#7b8c96}.warnBox{background:#fff0d3;color:#734b03;border:1px solid #edd08d;border-radius:18px;padding:12px;margin:10px 0;line-height:1.4}
  `; document.head.appendChild(css);
  setTimeout(()=>{try{state.news=merge([...(state.news||[]),...fallbackNews]); store('news',state.news); render();}catch(e){console.warn('V30 init',e)}},520);

<script>
// ===== V30.1 Strict Visible News Fix =====
// Sửa lỗi tin tỉnh khác (ví dụ Ninh Bình/Hà Nội...) lọt vào vì cache cũ đã gắn nhầm tag khu vực.
// Từ bản này, quyết định giữ/bỏ tin chỉ dựa trên nội dung nhìn thấy của bài: tiêu đề, mô tả, nguồn và URL; không tin vào tag area/category đã cache trước đó.
(function(){
  const V301_MAX_NEWS = 150;
  const V301_DISPLAY_MAX = 80;
  const V301_FILTERS = ['Mới nhất','Tác động cao','Cần lưu ý','Ninh Hòa','Vân Phong','Hạ tầng','Pháp lý'];
  const V301_TIME_FILTERS = ['24h','7 ngày','30 ngày','Cũ hơn','Tất cả'];
  function vn(s){
    try{return normalizeVN(String(s||''));}
    catch(e){return String(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/đ/g,'d');}
  }
  function visibleRaw(n){return [n?.title,n?.summary,n?.source,n?.url].filter(Boolean).join(' ')}
  function visible(n){return vn(visibleRaw(n))}
  function ntime(n){return typeof newsTs==='function'?(newsTs(n)||0):(Number(n?.ts||0)||Date.parse(n?.pubDate||'')||0)}
  const BAD_PLACE=/ha noi|thu do|ninh binh|bac ninh|tay ninh|ninh thuan|quang ninh|hoa binh|binh dinh|binh duong|binh phuoc|long an|dong nai|lam dong|nghe an|thanh hoa|quang ngai|quang nam|da nang|hai phong|can tho/;
  const DIRECT=/ninh hoa|thi xa ninh hoa|phuong ninh hoa|ninh diem|ninh hai|doc let|ninh xuan|ninh an|ninh tho|ninh thuy|ninh phung|ninh phuoc|ninh ich|ninh sim|tan dinh|bac hon heo|dong bac ninh hoa/;
  const KH=/khanh hoa|van phong|nha trang|ninh hoa/;
  const STRATEGIC=/van phong|nam van phong|bac van phong|khu kinh te van phong|bac hon heo|dong bac ninh hoa|phan khu 16|phan khu 17|phan khu 19|cao toc khanh hoa buon ma thuot|cao toc van phong|logistics|trung tam logistics|trung chuyen quoc te|cang/;
  const TOPIC=/quy hoach|su dung dat|cong bao|phap ly|bang gia dat|cao toc|ha tang|do thi|cang|logistics|khu cong nghiep|du lich|du an|thu hoi dat|giai phong mat bang/;
  function isForeignBad(n){
    const t=visible(n);
    if(!BAD_PLACE.test(t)) return false;
    // Nếu chính tiêu đề/mô tả nói rõ Khánh Hòa/Ninh Hòa/Vân Phong thì giữ; nếu chỉ có tag cache thì không tính.
    return !(DIRECT.test(t) || (KH.test(t) && STRATEGIC.test(t)) || /khanh hoa/.test(t));
  }
  function isRelevantV301(n){
    const t=visible(n);
    if(!n || !n.title) return false;
    if(isForeignBad(n)) return false;
    if(DIRECT.test(t)) return true;
    if(STRATEGIC.test(t) && KH.test(t)) return true;
    // Vân Phong/Bắc Hòn Hèo/Nam Vân Phong là khu chiến lược liên quan Ninh Hòa, vẫn giữ nếu xuất hiện trong chính bài.
    if(/van phong|bac hon heo|nam van phong|dong bac ninh hoa|phan khu 16|phan khu 17|phan khu 19/.test(t)) return true;
    return false;
  }
  function sourceNameV301(n){return (typeof cleanSourceName==='function'?cleanSourceName(n?.source||''):String(n?.source||'')).trim()||'Nguồn tin'}
  function sourceScoreV301(n){
    const s=vn((n?.source||'')+' '+(n?.url||''));
    if(/ninhhoa\.khanhhoa|congbao\.khanhhoa|khanhhoa\.gov|bao khanh hoa|baokhanhhoa|chinhphu|baochinhphu/.test(s)) return 24;
    if(/ipa\.khanhhoa/.test(s)) return 22;
    if(/tuoitre|vnexpress|plo\.vn|vov|nhandan|vietnamnet|dantri|thanhnien/.test(s)) return 17;
    if(/cafeland|cafef|nguoi quan sat|tapchicongthuong/.test(s)) return 10;
    return 5;
  }
  function areaFromVisible(n){
    const t=visible(n); const a=[];
    if(/ninh hoa|thi xa ninh hoa|phuong ninh hoa/.test(t)) a.push('Ninh Hòa');
    if(/ninh diem/.test(t)) a.push('Ninh Diêm');
    if(/doc let|ninh hai/.test(t)) a.push('Dốc Lết / Ninh Hải');
    if(/ninh xuan/.test(t)) a.push('Ninh Xuân');
    if(/ninh an/.test(t)) a.push('Ninh An');
    if(/tan dinh/.test(t)) a.push('Tân Định');
    if(/van phong|bac hon heo|nam van phong|dong bac ninh hoa|phan khu 16|phan khu 17|phan khu 19|cang|logistics/.test(t)) a.push('Vân Phong');
    if(!a.length && (STRATEGIC.test(t)&&KH.test(t))) a.push('Ninh Hòa');
    return [...new Set(a)].slice(0,3);
  }
  function categoryFromVisible(n){return typeof categoryOf==='function'?categoryOf(visibleRaw(n)):'Tin'}
  function qualityV301(n){
    const t=visible(n); let s=0;
    if(/ninh hoa|thi xa ninh hoa|phuong ninh hoa/.test(t)) s+=34;
    if(/ninh diem|ninh hai|doc let|ninh xuan|ninh an|tan dinh/.test(t)) s+=30;
    if(/van phong|bac hon heo|nam van phong|phan khu 16|phan khu 17|phan khu 19|logistics|cang/.test(t)) s+=24;
    if(/cao toc khanh hoa buon ma thuot/.test(t)) s+=23;
    if(TOPIC.test(t)) s+=18;
    s+=sourceScoreV301(n);
    const impact=Number(n?.impactScore||0)||Number(typeof scoreImpact==='function'?scoreImpact(visibleRaw(n)):0)||0;
    s+=Math.min(20,Math.round(impact*0.2));
    const ts=ntime(n); if(ts){const h=(Date.now()-ts)/36e5; if(h<24)s+=22; else if(h<168)s+=17; else if(h<720)s+=8;}
    if(n?.pinned || /cao toc khanh hoa buon ma thuot|trung tam logistics|trung chuyen quoc te/.test(t)) s=Math.max(s,92);
    return Math.max(0,Math.min(100,Math.round(s)));
  }
  function reasonV301(n){
    const t=visible(n), r=[];
    const ai=typeof ageInfo==='function'?ageInfo(n):null;
    if(ai && ai.bucket==='24h') r.push('mới trong 24h'); else if(ai && ai.bucket==='7 ngày') r.push('trong 7 ngày');
    if(/ninh hoa|thi xa ninh hoa|phuong ninh hoa/.test(t)) r.push('trực tiếp Ninh Hòa');
    if(/ninh diem|ninh hai|doc let|ninh xuan|ninh an|tan dinh/.test(t)) r.push('đúng khu vực con');
    if(/van phong|logistics|cang|bac hon heo|nam van phong/.test(t)) r.push('liên quan Vân Phong/logistics');
    if(/cao toc khanh hoa buon ma thuot/.test(t)) r.push('hạ tầng vùng ảnh hưởng Ninh Hòa');
    if(/quy hoach|phap ly|cong bao|su dung dat|phe duyet/.test(t)) r.push('có yếu tố quy hoạch/pháp lý');
    return r.slice(0,3).join(' · ') || 'liên quan rõ đến trọng tâm Ninh Hòa';
  }
  function normalizeV301(n){
    n=normalizeNews(Object.assign({},n||{}));
    n.category=categoryFromVisible(n);
    n.area=areaFromVisible(n);
    if(!n.area.length) n.area=['Ninh Hòa'];
    n.impactScore=Math.max(Number(n.impactScore||0), Number(typeof scoreImpact==='function'?scoreImpact(visibleRaw(n)+' '+n.category):0)||0);
    if(n.pinned || /cao toc khanh hoa buon ma thuot|trung tam logistics|trung chuyen quoc te/.test(visible(n))) n.impactScore=Math.max(n.impactScore,88);
    n.qualityScore=qualityV301(n);
    n.qualityLevel=n.pinned?'Tin cần lưu ý':n.qualityScore>=86?'Trọng tâm rất cao':n.qualityScore>=74?'Đáng đọc':n.qualityScore>=62?'Theo dõi':'Tham khảo';
    n.qualityReason=reasonV301(n);
    return n;
  }
  function keyV301(n){
    let t=vn(n?.title||'');
    t=t.replace(/toan van|quyet dinh|ubnd|google tin tuc|bao dien tu|tap chi|tin moi|moi nhat/g,'').replace(/[^a-z0-9\s]/g,' ').replace(/\s+/g,' ').trim();
    if(/cao toc khanh hoa buon ma thuot/.test(t)) return 'cao-toc-khanh-hoa-buon-ma-thuot';
    if(/trung tam logistics|trung chuyen quoc te|logistics/.test(t) && /khanh hoa|van phong/.test(t)) return 'logistics-khanh-hoa-van-phong';
    return t.split(' ').filter(w=>w.length>2&&!/^(tin|moi|nhat|khanh|hoa|ninh|duoc|phe|quy|hoach)$/.test(w)).slice(0,12).join('-')||t.slice(0,80);
  }
  function mergeV301(items){
    const by={};
    (items||[]).forEach(x=>{
      const n=normalizeV301(x);
      if(!isRelevantV301(n)) return;
      if(n.qualityScore<58 && !n.pinned) return;
      const k=keyV301(n); const old=by[k];
      if(!old || n.qualityScore>old.qualityScore || (n.qualityScore===old.qualityScore && (ntime(n)||0)>(ntime(old)||0))){
        n._sources=[...new Set([...(old?old._sources||[]:[]), sourceNameV301(n)].filter(Boolean))];
        by[k]=n;
      } else if(old){
        old._sources=[...new Set([...(old._sources||[]), sourceNameV301(n)].filter(Boolean))];
      }
    });
    return Object.values(by).sort((a,b)=>(ntime(b)||0)-(ntime(a)||0) || (b.qualityScore||0)-(a.qualityScore||0) || (b.impactScore||0)-(a.impactScore||0)).slice(0,V301_MAX_NEWS);
  }
  window.mergeNewsItems=function(items){return mergeV301(items)};
  window.getAllNews=function(){return mergeV301([...(state.news||[]),...fallbackNews])};
  function passTime(n){
    const tr=state.timeRange||'Tất cả';
    if(tr==='Tất cả') return true;
    const ai=typeof ageInfo==='function'?ageInfo(n):{bucket:'Cũ hơn'};
    if(tr==='24h') return ai.bucket==='24h';
    if(tr==='7 ngày') return ['24h','7 ngày'].includes(ai.bucket);
    if(tr==='30 ngày') return ['24h','7 ngày','30 ngày'].includes(ai.bucket);
    if(tr==='Cũ hơn') return ai.bucket==='Cũ hơn';

  }
  window.getFilteredNews=function(filter=state.filter){

    else if(f==='Cần lưu ý') list=list.filter(n=>n.pinned || /cao toc khanh hoa buon ma thuot|logistics|trung chuyen quoc te|cong bao|quy hoach|phap ly/.test(visible(n)) || (n.impactScore||0)>=88);

    else if(['Hạ tầng','Quy hoạch','Pháp lý'].includes(f)) list=list.filter(n=>visible(n).includes(ff) || vn(n.category||'').includes(ff));
    return list.sort((a,b)=> (f==='Tác động cao'?((b.impactScore||0)-(a.impactScore||0)):((ntime(b)||0)-(ntime(a)||0))) || ((b.qualityScore||0)-(a.qualityScore||0))).slice(0,V301_DISPLAY_MAX);
  };
  window.parseRss=function(xml,q){
    const doc=new DOMParser().parseFromString(xml,'text/xml');
    return [...doc.querySelectorAll('item')].slice(0,24).map(item=>{
      const title=item.querySelector('title')?.textContent||'';
      const link=item.querySelector('link')?.textContent||'';

      const enc=item.querySelector('enclosure'); if(!image&&enc)image=enc.getAttribute('url')||'';

      const clean=desc.replace(/<[^>]*>/g,' ').replace(/&nbsp;/g,' ').replace(/&amp;/g,'&').replace(/\s+/g,' ').trim();
      return normalizeV301({title,source,url:link,image,summary:clean||'Tin liên quan cần mở nguồn để đọc chi tiết.',pubDate,ts:Date.parse(pubDate)||0});
    }).filter(n=>n.title && isRelevantV301(n) && !/youtube|tiktok|facebook/i.test(n.title));
  };

// V30.2 – Critical Highway Seed Fix
// Giữ các tin hạ tầng cực quan trọng ngay cả khi Google News/RSS không trả về trong lần quét.
(function(){
  const CRITICAL_V302 = [
    {
      title:'Thông xe 22 km đầu cao tốc Khánh Hòa - Buôn Ma Thuột',
      source:'VnExpress',
      url:'https://vnexpress.net/thong-xe-22-km-dau-cao-toc-khanh-hoa-buon-ma-thuot-5078951.html',
      summary:'Tin hạ tầng cực quan trọng: đoạn đầu cao tốc Khánh Hòa - Buôn Ma Thuột được thông xe, tác động đến kết nối vùng, logistics, dòng di chuyển và kỳ vọng đầu tư quanh Ninh Hòa - Khánh Hòa.',

      impactScore:99,
      qualityScore:99,
      qualityLevel:'Tin cực quan trọng',
      pinned:true,
      pubDate:'2026-05-28',
      ts:new Date('2026-05-28T09:00:00+07:00').getTime()
    }
  ];
  try{
    if(Array.isArray(fallbackNews)){
      CRITICAL_V302.forEach(n=>{
        const exists=fallbackNews.some(x=>String(x.url||'')===n.url || String(x.title||'').toLowerCase()===n.title.toLowerCase());
        if(!exists) fallbackNews.unshift(n);
      });
    }
    if(Array.isArray(queries)){
      [
        'VnExpress thông xe 22 km đầu cao tốc Khánh Hòa Buôn Ma Thuột',
        'thông xe 22 km đầu cao tốc Khánh Hòa Buôn Ma Thuột',
        'thông xe cao tốc Khánh Hòa Buôn Ma Thuột VnExpress',
        'cao tốc Khánh Hòa Buôn Ma Thuột thông xe 22 km Ninh Hòa'
      ].forEach(q=>{if(!queries.includes(q)) queries.unshift(q)});
    }
    // Xóa cache tin đã lọc quá cũ nếu thiếu tin cao tốc quan trọng.
    const old=load('news',[]);
    const hasHighway=Array.isArray(old) && old.some(n=>/thong xe|thông xe|22 km|20 km/i.test(String(n.title||n.summary||'')) && /khánh hòa|khanh hoa/i.test(String(n.title||n.summary||'')) && /buôn ma thuột|buon ma thuot/i.test(String(n.title||n.summary||'')));
    if(!hasHighway){
      state.news=[...CRITICAL_V302,...(state.news||[])];
      store('news',state.news);
    }
    const prevRenderNews=window.renderNews;
    if(typeof prevRenderNews==='function'){
      window.renderNews=function(){
        prevRenderNews();
        // Đảm bảo tin cực quan trọng không bị rơi khỏi bộ lọc Cần lưu ý/Tác động cao do cache cũ.
        const all=(typeof getAllNews==='function'?getAllNews():[]);
        const missing=!all.some(n=>String(n.url||'')===CRITICAL_V302[0].url);
        if(missing && Array.isArray(fallbackNews)) fallbackNews.unshift(CRITICAL_V302[0]);
      };
    }
    setTimeout(()=>{try{render()}catch(e){}},350);
  }catch(e){console.warn('V30.2 critical news seed',e)}
})();
</script>

  function clean(s){return String(s||'').replace(/<[^>]*>/g,' ').replace(/&nbsp;/g,' ').replace(/&amp;/g,'&').replace(/\s+/g,' ').trim()}
  function kTypeOf(title,summary){const t=((title||'')+' '+(summary||'')).toLowerCase();if(/video|youtube|clip/.test(t))return 'video';return 'article'}
  function kCatOf(title,summary){const t=((title||'')+' '+(summary||'')).toLowerCase();if(/pháp|luật|sổ|quy hoạch|lộ giới|đặt cọc/.test(t))return 'Pháp lý';if(/đàm phán|môi giới|giá|trả giá/.test(t))return 'Đàm phán';if(/vốn|vay|tài chính|lãi suất|dòng tiền/.test(t))return 'Tài chính';if(/kinh doanh|doanh nghiệp|thương mại|dịch vụ/.test(t))return 'Kinh doanh';return 'Bất động sản'}
  function kItemCard(it,idx){const type=it.type||'article';return `<article class="knowledgeCard ${type==='video'?'video':''}"><div class="knowledgeMeta"><span class="kTag ${type}">${type==='video'?'Video':'Bài đọc'}</span><span class="kTag">${esc(it.cat||'Bất động sản')}</span><span class="kTag">${esc(it.source||'Nguồn mở')}</span></div><h3>${esc(it.title)}</h3><p>${esc(it.summary||'Nội dung giúp mở rộng góc nhìn kinh doanh và đầu tư bất động sản.')}</p><div class="actions"><button class="mini gold" onclick="openUrl('${esc(it.url||'https://news.google.com/search?q=kinh%20doanh%20b%E1%BA%A5t%20%C4%91%E1%BB%99ng%20s%E1%BA%A3n&hl=vi&gl=VN&ceid=VN:vi')}')">${type==='video'?'Xem video':'Mở đọc'}</button><button class="mini" onclick="saveKnowledge(JSON.parse(decodeURIComponent('${kArg(it)}')))">Lưu</button>${it.user?`<button class="mini" onclick="removeUserKnowledge(${idx})">Xóa</button>`:''}</div></article>`}
  window.saveKnowledge=function(it){const list=uLoad();list.unshift(Object.assign({},it,{savedAt:Date.now(),user:false}));uSave(list.slice(0,120));toast('Đã lưu vào Tri thức')};
  window.removeUserKnowledge=function(i){const list=uLoad();list.splice(i,1);uSave(list);renderKnowledge()};
  window.addUserKnowledge=function(){const title=document.getElementById('kTitle')?.value?.trim();const url=document.getElementById('kUrl')?.value?.trim();const type=document.getElementById('kType')?.value||'article';const cat=document.getElementById('kCat')?.value||'Bất động sản';const summary=document.getElementById('kNote')?.value?.trim();if(!title||!url){toast('Nhập tiêu đề và liên kết trước');return}const list=uLoad();list.unshift({title,url,type,cat,summary,source:'Tôi thêm',user:true,ts:Date.now()});uSave(list.slice(0,120));['kTitle','kUrl','kNote'].forEach(id=>{const el=document.getElementById(id);if(el)el.value=''});toast('Đã thêm vào Tri thức');renderKnowledge()};
  window.refreshKnowledge=async function(){toast('Đang cập nhật Tri thức...');let found=[];for(const q of K_QUERIES){try{const url='https://news.google.com/rss/search?q='+encodeURIComponent(q)+'&hl=vi&gl=VN&ceid=VN:vi';const xml=await nativeFetch(url);const doc=new DOMParser().parseFromString(xml,'text/xml');[...doc.querySelectorAll('item')].slice(0,10).forEach(item=>{const title=item.querySelector('title')?.textContent||'';const link=item.querySelector('link')?.textContent||'';const desc=clean(item.querySelector('description')?.textContent||'');const source=item.querySelector('source')?.textContent||'Google Tin tức';if(title&&link)found.push({title,url:link,summary:desc||'Bài đọc liên quan kinh doanh và bất động sản.',source,type:kTypeOf(title,desc),cat:kCatOf(title,desc),ts:Date.parse(item.querySelector('pubDate')?.textContent||'')||Date.now()})})}catch(e){}}
    const by={};[...found,...kLoad(),...K_SEEDS].forEach(it=>{const key=(it.title||'').toLowerCase().replace(/\W+/g,' ').trim().slice(0,80);if(key&&!by[key])by[key]=it});const out=Object.values(by).slice(0,90);kSave(out);toast('Đã cập nhật '+out.length+' mục Tri thức');renderKnowledge()};
  function filteredKnowledge(){let list=[...K_SEEDS,...kLoad(),...uLoad()];const by={};list.forEach((it,i)=>{const k=(it.url||it.title||'').toLowerCase();if(k&&!by[k])by[k]=Object.assign({},it,{_idx:i})});list=Object.values(by);const f=state.knowledgeFilter||'Tất cả';if(f==='Tất cả')return list;if(f==='Video')return list.filter(x=>x.type==='video');return list.filter(x=>(x.cat||'').includes(f)||String(x.title||'').includes(f)||String(x.summary||'').includes(f))}
  window.renderKnowledge=function(){const list=filteredKnowledge();const saved=uLoad();document.getElementById('knowledge').innerHTML=`<div class="v31Hero"><h2>Tri thức đầu tư & kinh doanh</h2><p>Không chỉ đọc tin Ninh Hòa: mục này giúp gia đình lưu bài báo, video và ý tưởng kinh doanh/BĐS để học và ra quyết định chắc hơn.</p><div class="v31Dashboard"><div class="v31Metric"><b>${list.length}</b><span>bài/video đang có</span></div><div class="v31Metric"><b>${saved.length}</b><span>mục đã lưu/thêm</span></div></div><div class="actions"><button class="mini gold" onclick="refreshKnowledge()">Cập nhật bài đọc</button><button class="mini" onclick="openUrl('https://www.youtube.com/results?search_query=%C4%91%E1%BA%A7u+t%C6%B0+b%E1%BA%A5t+%C4%91%E1%BB%99ng+s%E1%BA%A3n+ph%C3%A1p+l%C3%BD+%C4%91%E1%BA%A5t+n%E1%BB%81n')">Tìm video</button></div></div><div class="knowledgeTabs">${K_FILTERS.map(f=>`<button class="${state.knowledgeFilter===f?'active':''}" onclick="state.knowledgeFilter='${f}';renderKnowledge()">${f}</button>`).join('')}</div><div class="card"><h2>Thêm bài báo hoặc video</h2><p>Dán liên kết từ báo, YouTube, Facebook, Zalo… để lưu vào thư viện riêng của gia đình.</p><div class="knowledgeForm"><input id="kTitle" placeholder="Tiêu đề ngắn"><input id="kUrl" placeholder="Dán liên kết bài báo/video"><select id="kType"><option value="article">Bài báo/bài viết</option><option value="video">Video</option></select><select id="kCat"><option>Bất động sản</option><option>Kinh doanh</option><option>Pháp lý</option><option>Đàm phán</option><option>Tài chính</option></select><textarea id="kNote" placeholder="Ghi chú: vì sao bài/video này đáng lưu?"></textarea><button class="primary gold" onclick="addUserKnowledge()">Lưu vào Tri thức</button></div></div><div class="sectionTitle"><h2>Bài/video nên xem</h2><span>${list.length} mục</span></div><div class="knowledgeGrid">${list.map((it,i)=>kItemCard(it,i)).join('')||'<div class="saveEmpty">Chưa có mục phù hợp.</div>'}</div><div class="sectionTitle"><h2>Ý tưởng nâng cấp tiếp</h2><span>góc nhìn nhà đầu tư</span></div><div class="ideaRail">${K_IDEAS.map(x=>`<div class="ideaCard"><b>${esc(x[0])}</b><span>${esc(x[1])}</span></div>`).join('')}</div>`};
  const prevRenderTab=renderTab;
  renderTab=function(t){ if(t==='knowledge') return renderKnowledge(); return prevRenderTab(t); };
  const prevRender=render;
  render=function(){prevRender(); if(state.tab==='knowledge') renderKnowledge();};
  const prevHome=renderHome;
  renderHome=function(){prevHome();const home=document.getElementById('home');if(home&&!home.querySelector('.v31KnowledgeHome')){home.insertAdjacentHTML('afterbegin',`<div class="v31Hero v31KnowledgeHome"><h2>Thiết kế mới theo Taste Skill</h2><p>App được tinh gọn theo hướng mobile-native: ít nhiễu, rõ quyết định, có nhịp chuyển cảnh và thêm thư viện bài báo/video kinh doanh – bất động sản.</p><div class="actions"><button class="mini gold" onclick="go('knowledge')">Mở Tri thức</button><button class="mini" onclick="go('news')">Bảng tin Ninh Hòa</button></div></div>`)}};
  // Mở rộng từ khóa tin tức/tri thức nhưng không làm bẩn bảng tin Ninh Hòa.
  if(Array.isArray(queries)){
    ['kinh doanh bất động sản Ninh Hòa','đầu tư bất động sản Khánh Hòa kinh doanh địa phương','bài học đầu tư đất nền pháp lý quy hoạch','video đầu tư bất động sản pháp lý đất nền'].forEach(q=>{if(!queries.includes(q))queries.push(q)})
  }
  setTimeout(()=>{try{render()}catch(e){console.warn('V31 init',e)}},480);
})();
</script>
