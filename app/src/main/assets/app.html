function fallbackImage(n){const s=(((n&&n.title)||'')+' '+((n&&n.summary)||'')+' '+((n&&n.category)||'')).toLowerCase();if(s.includes('biển')||s.includes('dốc lết')||s.includes('du lịch'))return 'https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=900&q=72';if(s.includes('cảng')||s.includes('vân phong')||s.includes('logistics'))return 'https://images.unsplash.com/photo-1501785888041-af3ef285b470?auto=format&fit=crop&w=900&q=72';if(s.includes('cao tốc')||s.includes('đường')||s.includes('hạ tầng'))return 'https://images.unsplash.com/photo-1519003722824-194d4455a60c?auto=format&fit=crop&w=900&q=72';if(s.includes('pháp')||s.includes('công báo')||s.includes('quy hoạch'))return 'https://images.unsplash.com/photo-1450101499163-c8848c66ca85?auto=format&fit=crop&w=900&q=72';return 'https://images.unsplash.com/photo-1486406146926-c627a92ad1ab?auto=format&fit=crop&w=900&q=72'}
function isRealImage(n){return !!(n&&n.image&&String(n.image).startsWith('http')&&!String(n.image).includes('images.unsplash.com'))}
function imgFor(n){return isRealImage(n)?n.image:fallbackImage(n)}
function imgBadge(n){return isRealImage(n)?'Ảnh từ bài báo':'Ảnh minh họa theo chủ đề'}
function imgBadgeClass(n){return isRealImage(n)?'real':'fallback'}
function extractOgImage(html){if(!html)return'';let m=html.match(/<meta[^>]+property=["']og:image["'][^>]+content=["']([^"']+)["']/i)||html.match(/<meta[^>]+content=["']([^"']+)["'][^>]+property=["']og:image["']/i)||html.match(/<meta[^>]+name=["']twitter:image["'][^>]+content=["']([^"']+)["']/i)||html.match(/<meta[^>]+content=["']([^"']+)["'][^>]+name=["']twitter:image["']/i);return m?m[1].replace(/&amp;/g,'&'):''}
async function hydrateNewsImages(){const pending=(state.news||[]).filter(n=>!isRealImage(n)&&n.url).slice(0,28);if(!pending.length)return;let changed=false;for(const n of pending){try{const html=await nativeFetch(n.url);const img=extractOgImage(html);if(img&&/^https?:\/\//.test(img)){n.image=img;n.imageSource='publisher';changed=true}}catch(e){}}if(changed){store('news',state.news);render()}}
function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1900)}
function openUrl(u){if(window.Android&&Android.openExternal)Android.openExternal(u);else location.href=u}
function go(tab){state.tab=tab;document.querySelectorAll('.page').forEach(p=>p.classList.toggle('active',p.id===tab));document.querySelectorAll('.nav button').forEach(b=>b.classList.toggle('active',b.dataset.tab===tab));renderTab(tab);scrollTo({top:0,behavior:'smooth'})}
function render(){document.getElementById('nav').innerHTML=navs.map(n=>`<button data-tab="${n[0]}" class="${state.tab===n[0]?'active':''}" onclick="go('${n[0]}')"><span>${n[1]}</span>${n[2]}</button>`).join('');document.getElementById('quickFilters').innerHTML=quick.map(q=>`<button class="qf ${state.filter===q?'active':''}" onclick="state.filter='${q}';go('news')">${q}</button>`).join('');document.getElementById('countTop').textContent=(state.news.length||fallbackNews.length)+' tin';renderTab(state.tab)}
function renderTab(t){if(t==='home')renderHome();if(t==='news')renderNews();if(t==='check')renderCheck();if(t==='areas')renderAreas();if(t==='legal')renderLegal();if(t==='saved')renderSaved();document.getElementById('countTop').textContent=(state.news.length||fallbackNews.length)+' tin'}
function renderHome(){const news=getFilteredNews('Tất cả').slice(0,4);document.getElementById('home').innerHTML=`<div class="heroCompact"><div class="ctaGrid"><button class="cta" onclick="go('news')"><span>📰</span><b>Xem tin mới</b><small>Tin có ảnh báo chí và phân tích tác động.</small></button><button class="cta" onclick="go('check')"><span>🛡️</span><b>Kiểm tra đất</b><small>Lưu kết quả vào sổ tay cá nhân.</small></button><button class="cta" onclick="go('saved')"><span>⭐</span><b>Sổ tay</b><small>Theo dõi lô đất, tin và khu vực.</small></button></div></div><div class="card" style="background:linear-gradient(135deg,#fff,#f6fbfd)"><h2>Sổ tay đầu tư cá nhân</h2><p>Lưu lô đất đang xem, tin quan trọng, khu vực quan tâm và ghi chú pháp lý để theo dõi lâu dài.</p><div class="dashGrid"><div class="dashBox"><b>${state.deals.length}</b><span>Lô đất</span></div><div class="dashBox"><b>${state.saved.length}</b><span>Tin đã lưu</span></div><div class="dashBox"><b>${state.areasSaved.length}</b><span>Khu vực</span></div><div class="dashBox"><b>${state.notes.length}</b><span>Ghi chú</span></div></div><button class="primary gold" onclick="go('saved')">Mở sổ tay</button><div class="footerCredit">Tác giả sản phẩm: <b>Vũ Hoàng</b></div></div><div class="sectionTitle"><h2>Tin đáng chú ý</h2><span>${state.news.length||fallbackNews.length} tin đang theo dõi</span></div><div class="newsGrid">${news.map((n,i)=>newsCard(n,i)).join('')}</div><div class="sectionTitle"><h2>Khu vực nổi bật</h2><span>lọc tin theo vùng</span></div><div class="areaDeck">${areaProfiles.slice(0,3).map(areaCard).join('')}</div>`}
function getAllNews(){const by={};[...state.news,...fallbackNews].forEach(n=>{if(n&&n.title&&!by[n.title])by[n.title]=normalizeNews(n)});return Object.values(by)}
function normalizeNews(n){n.category=n.category||categoryOf(n.title+' '+n.summary);n.area=n.area||deriveAreas(n.title+' '+n.summary+' '+n.category);n.impactScore=n.impactScore||scoreImpact(n.title+' '+n.summary+' '+n.category);return n}
function getFilteredNews(filter=state.filter){let list=getAllNews();if(filter&&filter!=='Tất cả'){const f=filter.toLowerCase();list=list.filter(n=>(n.category||'').toLowerCase().includes(f)||(n.title||'').toLowerCase().includes(f)||(n.summary||'').toLowerCase().includes(f)||(n.area||[]).join(' ').toLowerCase().includes(f))}if(state.area&&state.area!=='Tất cả'){const a=areaProfiles.find(x=>x.name===state.area);if(a){list=list.filter(n=>matchesArea(n,a))}}return list.sort((a,b)=>(b.impactScore||0)-(a.impactScore||0))}
function matchesArea(n,a){const text=(n.title+' '+n.summary+' '+(n.area||[]).join(' ')).toLowerCase();return a.keys.some(k=>text.includes(k.toLowerCase()))}
function renderNews(){const cats=['Tất cả','Hạ tầng','Quy hoạch','Pháp lý','Vân Phong','Ninh Hòa','Dốc Lết'];const areas=['Tất cả',...areaProfiles.map(a=>a.name)];const list=getFilteredNews();const lead=list[0];document.getElementById('news').innerHTML=`<div class="chips">${cats.map(c=>`<button class="chip ${state.filter===c?'active':''}" onclick="state.filter='${c}';state.area='Tất cả';renderNews()">${c}</button>`).join('')}</div><div class="chips">${areas.map(a=>`<button class="chip ${state.area===a?'active':''}" onclick="state.area='${a}';renderNews()">${a}</button>`).join('')}</div>${lead?leadCard(lead):''}<div class="sectionTitle"><h2>${state.area==='Tất cả'?'Bảng tin đầu tư':'Tin quanh '+state.area}</h2><span>${list.length} kết quả</span></div><div class="newsGrid">${list.slice(1,80).map(newsCard).join('')}</div>`}
function leadCard(n){return `<article class="leadNews"><div class="leadImg" style="background-image:linear-gradient(180deg,rgba(6,27,44,.05),rgba(6,27,44,.28)),url('${imgFor(n)}')"><span class="sourceImgBadge ${imgBadgeClass(n)}">${imgBadge(n)}</span></div><div class="leadBody"><div class="tags"><span class="tag impact-high">Tác động ${n.impactScore}/100</span><span class="tag area">${esc((n.area||[])[0]||'Khánh Hòa')}</span><span class="tag verified">${esc(n.category||'Tin')}</span></div><h3>${esc(n.title)}</h3><p>${esc(n.summary)}</p><div class="actions"><button class="mini gold" onclick='briefNews(${JSON.stringify(n).replace(/'/g,"&#039;")})'>Phân tích</button><button class="mini" onclick='quickRead(${JSON.stringify(n).replace(/'/g,"&#039;")})'>Đọc nhanh</button><button class="mini" onclick="openUrl('${esc(n.url||'https://news.google.com/search?q=Ninh%20H%C3%B2a%20Kh%C3%A1nh%20H%C3%B2a&hl=vi&gl=VN&ceid=VN:vi')}')">Mở nguồn</button></div></div></article>`}
function newsCard(n){return `<article class="newsCard"><div class="thumb" style="background-image:url('${imgFor(n)}')"><span class="sourceImgBadge ${imgBadgeClass(n)}">${imgBadge(n)}</span></div><div class="newsBody"><div class="tags"><span class="tag ${n.impactScore>=80?'impact-high':n.impactScore>=65?'impact-mid':'hot'}">${n.impactScore}/100</span><span class="tag area">${esc((n.area||[])[0]||'Khánh Hòa')}</span><span class="tag">${esc(n.category||'Tin')}</span></div><h3>${esc(n.title)}</h3><p>${esc(n.summary||'Tin cần đọc kèm nguồn chính thức trước khi ra quyết định.')}</p><div class="actions"><button class="mini gold" onclick='briefNews(${JSON.stringify(n).replace(/'/g,"&#039;")})'>Phân tích</button><button class="mini" onclick='saveNews(${JSON.stringify(n).replace(/'/g,"&#039;")})'>Lưu</button></div></div></article>`}
function scoreImpact(t){t=(t||'').toLowerCase();let s=45;if(/cao tốc|quy hoạch|công báo|vân phong|khu kinh tế|phân khu|cảng|bảng giá đất/.test(t))s+=28;if(/ninh hòa|ninh diêm|dốc lết|ninh hải|ninh xuân|ninh an/.test(t))s+=14;if(/khởi công|phê duyệt|ban hành|nghiệm thu|đưa vào hoạt động/.test(t))s+=10;if(/tin đồn|đề xuất|dự kiến|nghe nói/.test(t))s-=8;return Math.max(30,Math.min(96,s))}
function categoryOf(t){t=(t||'').toLowerCase();if(/công báo|pháp|luật|sổ|giá đất|sử dụng đất/.test(t))return 'Pháp lý';if(/quy hoạch|phân khu|đô thị|chung 2040/.test(t))return 'Quy hoạch';if(/cao tốc|hạ tầng|đường|giao thông|khởi công|nghiệm thu/.test(t))return 'Hạ tầng';if(/vân phong|cảng|logistics|khu kinh tế|công nghiệp/.test(t))return 'Vân Phong';if(/biển|dốc lết|du lịch|nghỉ dưỡng/.test(t))return 'Khu vực';return 'Thị trường'}
function deriveAreas(t){t=(t||'').toLowerCase();const res=[];for(const a of areaProfiles){if(a.keys.some(k=>t.includes(k.toLowerCase())))res.push(a.name)}if(t.includes('ninh hòa')&&!res.includes('Ninh Hòa'))res.push('Ninh Hòa');if(t.includes('khánh hòa')&&!res.length)res.push('Khánh Hòa');return res.length?res:['Khánh Hòa']}
function analysisFor(n){const t=(n.title+' '+n.summary).toLowerCase();const score=n.impactScore||scoreImpact(t);let level=score>=82?'Rất cao':score>=70?'Cao':score>=55?'Trung bình':'Thấp';let action=score>=82?'Theo dõi sát, nhưng không xuống tiền nếu pháp lý chưa rõ.':score>=70?'Có thể nghiên cứu khu vực liên quan và so sánh giá.':'Chỉ nên xem như tín hiệu tham khảo.';let risk=[];if(/quy hoạch|pháp|công báo|sử dụng đất/.test(t))risk.push('Cần đối chiếu số tờ, số thửa và văn bản gốc.');if(/cao tốc|hạ tầng|vân phong|cảng/.test(t))risk.push('Không mua chỉ vì kỳ vọng hạ tầng; cần kiểm tra tiến độ thực tế.');if(/du lịch|biển|dốc lết/.test(t))risk.push('Cần kiểm tra hành lang biển, mục đích sử dụng đất và khả năng khai thác thật.');if(!risk.length)risk.push('Cần kiểm tra nguồn tin, giá khu vực và khả năng bán lại.');return {score,level,action,risk,areas:n.area||deriveAreas(t),category:n.category||categoryOf(t)}}
function briefNews(n){n=normalizeNews(n);const a=analysisFor(n);showSheet(`<h2>Phân tích tác động tin</h2><h3>${esc(n.title)}</h3><p>${esc(n.summary)}</p><div class="impactBox"><div class="impactScore"><div class="ring"><b>${a.score}</b></div><div><b>Mức tác động: ${a.level}</b><p>Nhóm tin: ${esc(a.category)}<br>Khu vực ảnh hưởng: ${esc(a.areas.join(', '))}</p></div></div></div><div class="card" style="box-shadow:none;background:#fff8eb"><h3>Góc nhìn đầu tư</h3><p>${esc(a.action)}</p></div><div class="card" style="box-shadow:none"><h3>Rủi ro cần kiểm tra</h3>${a.risk.map(x=>`<p>• ${esc(x)}</p>`).join('')}<p>• Luôn mở nguồn gốc, đối chiếu pháp lý và không đặt cọc chỉ dựa trên tin tức.</p></div><div class="actions"><button class="primary gold" onclick="openUrl('${esc(n.url)}')">Mở nguồn</button><button class="primary soft" onclick='saveNews(${JSON.stringify(n).replace(/'/g,"&#039;")})'>Lưu tin</button></div>`)}
function quickRead(n){showSheet(`<h2>Đọc nhanh</h2><h3>${esc(n.title)}</h3><p><b>Nguồn:</b> ${esc(n.source||'')}</p><p>${esc(n.summary||'Tin cần mở nguồn để đọc chi tiết.')}</p><button class="primary gold" onclick="openUrl('${esc(n.url)}')">Mở nguồn gốc</button>`)}
function renderAreas(){const selected=state.area==='Tất cả'?'Ninh Diêm':state.area;const prof=areaProfiles.find(a=>a.name===selected)||areaProfiles[0];const list=getAllNews().filter(n=>matchesArea(n,prof)).sort((a,b)=>(b.impactScore||0)-(a.impactScore||0)).slice(0,36);const top=list[0];document.getElementById('areas').innerHTML=`<div class="chips">${areaProfiles.map(a=>`<button class="chip ${prof.name===a.name?'active':''}" onclick="state.area='${a.name}';renderAreas()">${a.name}</button>`).join('')}</div><div class="areaHeroPro ${prof.img}"><div class="areaHeroTop"><span class="tag hot">Hồ sơ khu vực</span><span class="areaScore">${prof.score}/100</span></div><div class="areaHeroBody"><h2>${esc(prof.name)}</h2><p>${esc(prof.type)} · Tin tức, rủi ro và cơ hội được gom riêng cho khu vực này.</p><div class="areaStats"><span>${list.length} tin liên quan</span><span>${top?'Tác động cao nhất '+top.impactScore+'/100':'Đang chờ tin mới'}</span></div><div class="actions"><button class="mini gold" onclick="saveArea('${esc(prof.name)}')">Theo dõi khu vực</button><button class="mini" onclick="state.area='${esc(prof.name)}';go('news')">Mở bảng tin</button></div></div></div><div class="areaInsightGrid"><div class="areaInsight"><b>${list.length}</b><small>Tin liên quan trực tiếp/gián tiếp đến ${esc(prof.name)}</small></div><div class="areaInsight"><b>${top?top.impactScore:'--'}</b><small>Điểm tác động cao nhất trong nhóm tin khu vực</small></div></div><div class="areaNewsSection"><div class="sectionTitle"><h2>Tin riêng khu vực</h2><span>khác với bảng tin tổng</span></div>${list.length?list.map(areaNewsCard).join(''):'<div class="saveEmpty">Chưa có tin phù hợp, bấm làm mới để quét thêm.</div>'}</div>`}
function areaNewsCard(n){n=normalizeNews(n);const a=analysisFor(n);return `<article class="areaMiniNews"><div class="thumb" style="background-image:url('${imgFor(n)}')"><span class="sourceImgBadge ${imgBadgeClass(n)}">${imgBadge(n)}</span></div><div><div class="tags"><span class="tag ${n.impactScore>=80?'impact-high':n.impactScore>=65?'impact-mid':'hot'}">${n.impactScore}/100</span><span class="tag area">${esc((n.area||[])[0]||'Khánh Hòa')}</span></div><h3>${esc(n.title)}</h3><p>${esc(a.action)}</p><div class="actions"><button class="mini gold" onclick='briefNews(${JSON.stringify(n).replace(/'/g,"&#039;")})'>Phân tích</button><button class="mini" onclick='saveNews(${JSON.stringify(n).replace(/'/g,"&#039;")})'>Lưu</button></div></div></article>`}
function areaCard(a){return `<div class="areaCard ${a.img}"><span class="tag hot" style="width:max-content">${esc(a.type)}</span><h3>${esc(a.name)}</h3><p>Tin tức và rủi ro được khoanh vùng theo khu vực bạn chọn.</p><div class="areaStats"><span>Tiềm năng ${a.score}/100</span><span>lọc theo khu vực</span><span>đọc góc nhìn đầu tư</span></div><div class="actions"><button class="mini gold" onclick="saveArea('${esc(a.name)}')">Theo dõi khu vực</button><button class="mini" onclick="state.area='${esc(a.name)}';go('news')">Xem tin</button></div></div>`}
function renderCheck(){document.getElementById('check').innerHTML=`<div class="card"><h2>Kiểm tra một lô đất</h2><p>Nhập thông tin đang có. App sẽ cho kết luận dễ hiểu: nên xem tiếp, hỏi thêm hay tạm dừng.</p><div class="formGrid"><div class="field"><label>Khu vực</label><select id="c_area">${areaProfiles.map(a=>`<option>${a.name}</option>`).join('')}<option>Khác</option></select></div><div class="field"><label>Giai đoạn</label><select id="c_stage"><option>Mới xem cơ hội</option><option>Đang hỏi thêm</option><option>Đang chuẩn bị đi xem</option><option>Đang đàm phán</option></select></div><div class="field"><label>Diện tích (m²)</label><input id="c_size" class="input" inputmode="decimal" placeholder="120"></div><div class="field"><label>Giá bán (tỷ)</label><input id="c_price" class="input" inputmode="decimal" placeholder="1.8"></div><div class="field"><label>Giấy tờ</label><select id="c_doc"><option>Chưa rõ</option><option>Có sổ riêng</option><option>Sổ chung</option><option>Chưa có sổ</option><option>Giấy tay</option></select></div><div class="field"><label>Đường vào</label><select id="c_road"><option>Chưa rõ</option><option>Đường công rõ ràng</option><option>Đường bê tông nhỏ</option><option>Đường đất</option><option>Đi nhờ/lối đi chưa rõ</option></select></div></div><div class="field" style="margin-top:12px"><label>Ghi chú thêm</label><textarea id="c_note" placeholder="Gần cao tốc, gần biển, gần Vân Phong, nghe môi giới nói..."></textarea></div><button class="primary gold" style="width:100%;margin-top:12px" onclick="analyzeDeal()">Phân tích lô đất</button></div><div class="card result" id="dealResult"></div>`}
function analyzeDeal(){const area=document.getElementById('c_area').value, size=parseFloat(document.getElementById('c_size').value||0), price=parseFloat(document.getElementById('c_price').value||0), doc=document.getElementById('c_doc').value, road=document.getElementById('c_road').value, note=document.getElementById('c_note').value;let score=55;if(doc==='Có sổ riêng')score+=18;if(/Chưa|Giấy tay|Sổ chung/.test(doc))score-=18;if(/Đường công/.test(road))score+=10;if(/Đi nhờ|Đường đất|Chưa rõ/.test(road))score-=10;if(note.toLowerCase().includes('vân phong')||note.toLowerCase().includes('cao tốc')||note.toLowerCase().includes('biển'))score+=8;if(price&&size){let m2=price*1000/size;if(m2>30)score-=8;if(m2<8)score-=3}score=Math.max(15,Math.min(92,score));const decision=score>=75?'Có thể xem tiếp, chưa nên đặt cọc':score>=55?'Hỏi thêm trước khi đi xem':'Tạm dừng, thiếu dữ liệu quan trọng';window.__lastDeal={area,score,decision,date:new Date().toLocaleString('vi-VN')};document.getElementById('dealResult').style.display='block';document.getElementById('dealResult').innerHTML=`<h2>Kết quả kiểm tra</h2><div class="resultGrid"><div class="scoreBig"><b>${score}</b></div><div><h3>${decision}</h3><p>Mức điểm này chỉ dùng để sàng lọc ban đầu. Không thay thế kiểm tra pháp lý thực tế.</p></div></div><div class="impactBox"><b>Việc cần làm tiếp</b><p>1. Yêu cầu sổ, số tờ, số thửa.<br>2. Kiểm tra quy hoạch/lộ giới qua nguồn chính thức.<br>3. So sánh ít nhất 3 lô cùng khu.<br>4. Không đặt cọc nếu giấy tờ hoặc đường vào chưa rõ.</p></div><button class="primary gold" style="width:100%" onclick="saveDeal()">Lưu hồ sơ</button>`;document.getElementById('dealResult').scrollIntoView({behavior:'smooth'})}
function saveDeal(){if(!window.__lastDeal)return toast('Chưa có hồ sơ để lưu');const d=Object.assign({id:Date.now(),status:'Đang theo dõi',note:''},window.__lastDeal);state.deals.unshift(d);store('deals',state.deals);toast('Đã lưu vào Sổ tay');renderSaved()}
const legalAnswers={'Đất chưa có sổ có nên mua không?':'Rủi ro cao. Chỉ nên nghiên cứu nếu hiểu rõ nguồn gốc đất, điều kiện sang tên và rủi ro không hoàn tất pháp lý.','Trước khi đặt cọc cần kiểm tra gì?':'Cần kiểm tra sổ, chủ sở hữu, quy hoạch, lộ giới, tranh chấp, thế chấp, đường vào và điều khoản hoàn cọc.','Làm sao biết đất có vướng quy hoạch?':'Cần đối chiếu số tờ/số thửa tại nguồn chính thức và xác minh tại cơ quan có thẩm quyền. App chỉ hỗ trợ mở đúng nguồn.','Đường vào hợp pháp là gì?':'Đường vào nên là đường công hoặc có quyền sử dụng rõ ràng. Đường tự mở, đi nhờ hoặc hứa miệng đều cần kiểm tra kỹ.','Khi nào nên dừng thương vụ?':'Dừng nếu không cho xem sổ, giấy tờ mơ hồ, đường vào không rõ, dính quy hoạch xấu hoặc điều khoản cọc bất lợi.'};
function renderLegal(){const qs=Object.keys(legalAnswers);document.getElementById('legal').innerHTML=`<div class="card"><h2>Pháp lý dễ hiểu</h2><p>Tập trung vào câu hỏi thực tế trước khi xuống tiền. Mục này không dùng bản đồ và không cần quyền vị trí.</p><div class="locationNotice">App đã bỏ quyền truy cập vị trí. Nếu cần định vị lô đất, hãy dùng Google Maps hoặc nguồn chính thức bên ngoài.</div>${qs.map(q=>`<button class="question" onclick="showLegal('${esc(q)}')"><span>${esc(q)}</span><b>›</b></button>`).join('')}<div class="answerBox" id="legalAnswer"></div></div><div class="card"><h2>Checklist trước khi đặt cọc</h2>${['Có sổ hoặc giấy tờ rõ ràng','Đúng chủ sở hữu','Không tranh chấp/thế chấp bất thường','Đã kiểm tra quy hoạch/lộ giới','Đường vào hợp pháp','Giá đã so sánh khu vực','Điều khoản hoàn cọc rõ ràng'].map(x=>`<label class="checkItem"><input type="checkbox"><span>${x}</span></label>`).join('')}</div><div class="card"><h2>Nguồn chính thức</h2><div class="actions">${sources.map(s=>`<button class="primary soft" onclick="openUrl('${s.url}')">${s.name}</button>`).join('')}</div></div>`}
function showLegal(q){const box=document.getElementById('legalAnswer');box.style.display='block';box.innerHTML=`<b>${q}</b><br>${legalAnswers[q]}`;box.scrollIntoView({behavior:'smooth',block:'nearest'})}
function renderSaved(){const tabs=['Tổng quan','Lô đất','Tin đã lưu','Khu vực','Ghi chú'];const box=document.getElementById('saved');box.innerHTML=`<div class="sectionTitle"><h2>Sổ tay đầu tư cá nhân</h2><span>Tác giả sản phẩm: Vũ Hoàng</span></div><div class="notebookTabs">${tabs.map(t=>`<button class="${state.book===t?'active':''}" onclick="state.book='${t}';renderSaved()">${t}</button>`).join('')}</div><div id="notebookBody"></div>`;renderNotebookBody()}
function renderNotebookBody(){const b=document.getElementById('notebookBody');if(!b)return;if(state.book==='Tổng quan'){b.innerHTML=`<div class="card"><h2>Tổng quan sổ tay</h2><p>Nơi lưu mọi thứ quan trọng trước khi xuống tiền: lô đất, tin tức, khu vực và ghi chú pháp lý.</p><div class="dashGrid"><div class="dashBox"><b>${state.deals.length}</b><span>Lô đất đang theo dõi</span></div><div class="dashBox"><b>${state.saved.length}</b><span>Tin tức đã lưu</span></div><div class="dashBox"><b>${state.areasSaved.length}</b><span>Khu vực quan tâm</span></div><div class="dashBox"><b>${state.notes.length}</b><span>Ghi chú cá nhân</span></div></div><div class="actions"><button class="primary gold" onclick="go('check')">Thêm lô đất</button><button class="primary soft" onclick="state.book='Ghi chú';renderSaved()">Viết ghi chú</button></div></div><div class="card"><h2>Việc nên kiểm tra tiếp</h2><p>□ Sổ/số tờ/số thửa · □ Quy hoạch/lộ giới · □ Đường vào · □ Giá khu vực · □ Điều khoản cọc.</p></div>`;return}if(state.book==='Lô đất'){b.innerHTML=`<div class="card"><h2>Lô đất đã lưu</h2>${state.deals.length?state.deals.map((d,i)=>dealCard(d,i)).join(''):'<div class="emptyHint">Chưa có lô đất nào. Vào mục Kiểm tra để tạo hồ sơ đầu tiên.</div>'}<button class="primary gold" style="width:100%;margin-top:10px" onclick="go('check')">Thêm lô đất mới</button></div>`;return}if(state.book==='Tin đã lưu'){b.innerHTML=`<div class="card"><h2>Tin tức đã lưu</h2><p>Lưu các tin có tác động đến khu vực bạn đang theo dõi.</p>${state.saved.length?state.saved.map(savedNewsCard).join(''):'<div class="emptyHint">Chưa lưu tin nào. Bấm Lưu ở mỗi tin để đưa vào sổ tay.</div>'}</div>`;return}if(state.book==='Khu vực'){b.innerHTML=`<div class="card"><h2>Khu vực quan tâm</h2>${state.areasSaved.length?state.areasSaved.map((a,i)=>`<div class="portfolioItem"><div><b>${esc(a.name||a)}</b><small>Theo dõi tin, rủi ro và cơ hội quanh khu vực này</small></div><button class="statusPill" onclick="state.area='${esc(a.name||a)}';go('areas')">Mở</button></div>`).join(''):'<div class="emptyHint">Chưa theo dõi khu vực nào. Vào mục Khu vực và bấm Theo dõi.</div>'}</div>`;return}if(state.book==='Ghi chú'){b.innerHTML=`<div class="card"><h2>Ghi chú đầu tư</h2><textarea class="noteInput" id="noteText" placeholder="Ví dụ: Lô Ninh Diêm giá hơi cao, cần hỏi thêm số thửa và kiểm tra quy hoạch..."></textarea><button class="primary gold" style="width:100%;margin-top:10px" onclick="addNote()">Lưu ghi chú</button></div><div class="card"><h2>Ghi chú đã lưu</h2>${state.notes.length?state.notes.map((n,i)=>`<div class="portfolioItem"><div><b>${esc(n.date)}</b><small>${esc(n.text)}</small></div><button class="statusPill" onclick="deleteNote(${i})">Xóa</button></div>`).join(''):'<div class="emptyHint">Chưa có ghi chú.</div>'}</div>`;return}}
function dealCard(d,i){const next=['Đang theo dõi','Cần hỏi thêm','Đi xem thực địa','Đang đàm phán','Tạm dừng','Đã loại bỏ'];return `<div class="portfolioItem"><div><b>${esc(d.area)} • ${d.score}/100</b><small>${esc(d.decision)}<br>${esc(d.date||'')} · Trạng thái: <b>${esc(d.status||'Đang theo dõi')}</b></small></div><select class="statusPill" onchange="updateDealStatus(${i},this.value)">${next.map(x=>`<option ${x===(d.status||'Đang theo dõi')?'selected':''}>${x}</option>`).join('')}</select></div>`}
function savedNewsCard(n){n=normalizeNews(n);return `<div class="savedNewsCard"><div class="thumb" style="background-image:url('${imgFor(n)}')"><span class="sourceImgBadge">ảnh</span></div><div><b>${esc(n.title)}</b><small style="display:block;color:#5d707d;margin-top:5px;font-weight:800">${esc(n.source||'Nguồn tin')} · ${esc((n.area||[])[0]||'Khánh Hòa')} · Tác động ${n.impactScore}/100</small><div class="actions"><button class="mini gold" onclick='briefNews(${JSON.stringify(n).replace(/'/g,"&#039;")})'>Phân tích</button><button class="mini" onclick="openUrl('${esc(n.url||'')}')">Mở nguồn</button></div></div></div>`}
function updateDealStatus(i,v){if(!state.deals[i])return;state.deals[i].status=v;store('deals',state.deals);toast('Đã cập nhật trạng thái')}
function saveArea(name){if(!state.areasSaved.find(a=>(a.name||a)===name)){state.areasSaved.unshift({name,date:new Date().toLocaleDateString('vi-VN')});store('areasSaved',state.areasSaved);toast('Đã theo dõi khu vực')}else toast('Khu vực đã có trong sổ tay')}
function addNote(){const el=document.getElementById('noteText');const text=(el&&el.value||'').trim();if(!text)return toast('Hãy nhập ghi chú');state.notes.unshift({text,date:new Date().toLocaleString('vi-VN')});store('notes',state.notes);state.book='Ghi chú';renderSaved();toast('Đã lưu ghi chú')}
function deleteNote(i){state.notes.splice(i,1);store('notes',state.notes);renderSaved()}
function saveNews(n){n=normalizeNews(n);n.savedAt=new Date().toLocaleString('vi-VN');n.note=n.note||'';if(!state.saved.find(x=>x.title===n.title))state.saved.unshift(n);store('saved',state.saved);toast('Đã lưu tin vào Sổ tay')}
function showGuide(){showSheet(`<h2>Hướng dẫn sử dụng</h2><p style='margin-top:-4px;color:#607481;font-weight:800'>Tác giả sản phẩm: <b>Vũ Hoàng</b></p><div class="card" style="box-shadow:none"><h3>1. Xem tin theo khu vực</h3><p>Vào Tin tức hoặc Khu vực, chọn vùng bạn quan tâm như Ninh Diêm, Dốc Lết, Vân Phong.</p></div><div class="card" style="box-shadow:none"><h3>2. Đọc phân tích tác động</h3><p>Bấm Phân tích trên mỗi tin để xem mức tác động, khu vực ảnh hưởng, rủi ro và việc nên làm tiếp.</p></div><div class="card" style="box-shadow:none"><h3>3. Kiểm tra lô đất</h3><p>Nhập khu vực, diện tích, giá, giấy tờ, đường vào. App cho kết luận sàng lọc ban đầu.</p></div><div class="card" style="box-shadow:none;background:#fff8eb"><h3>Lưu ý pháp lý</h3><p>App không thay thế cơ quan nhà nước, luật sư hoặc văn bản pháp lý gốc. Trước khi đặt cọc cần kiểm tra sổ, quy hoạch, lộ giới và tranh chấp.</p></div>`)}
function showSheet(html){document.getElementById('sheet').innerHTML=html+'<button class="primary soft" style="width:100%;margin-top:8px" onclick="hideSheet()">Đóng</button>';document.getElementById('modal').classList.add('show')}
function hideSheet(){document.getElementById('modal').classList.remove('show')}

function globalSearch(q){q=(q||'').trim();if(!q)return;const area=areaProfiles.find(a=>a.name.toLowerCase().includes(q.toLowerCase()));if(area){state.area=area.name;go('areas');return}if(q.toLowerCase().includes('pháp')||q.toLowerCase().includes('sổ')||q.toLowerCase().includes('cọc'))go('legal');else{state.filter=q;go('news')}}
function toggleDark(){document.body.classList.toggle('dark');localStorage.setItem('v22_dark',document.body.classList.contains('dark')?'1':'0')}
if(localStorage.getItem('v22_dark')==='1')document.body.classList.add('dark');
function nativeFetch(url){return new Promise((resolve,reject)=>{const id='r'+Math.random().toString(36).slice(2);window.__nativeFetchDone=(rid,payload)=>{if(rid!==id)return;if(String(payload).startsWith('__ERROR__'))reject(new Error(payload));else resolve(payload)};if(window.Android&&Android.fetchUrl){Android.fetchUrl(id,url)}else{fetch(url).then(r=>r.text()).then(resolve).catch(reject)}})}
async function refreshNews(){toast('Đang quét thêm tin...');let found=[];for(const q of queries){const url='https://news.google.com/rss/search?q='+encodeURIComponent(q)+'&hl=vi&gl=VN&ceid=VN:vi';try{const xml=await nativeFetch(url);found=found.concat(parseRss(xml,q))}catch(e){}}
 const by={};found.concat(fallbackNews).forEach(n=>{if(n.title&&!by[n.title])by[n.title]=normalizeNews(n)});state.news=Object.values(by).slice(0,220);store('news',state.news);state.filter='Tất cả';state.area='Tất cả';render();hydrateNewsImages();toast('Đã cập nhật '+state.news.length+' tin')}
function parseRss(xml,q){const doc=new DOMParser().parseFromString(xml,'text/xml');return [...doc.querySelectorAll('item')].slice(0,30).map(item=>{const title=item.querySelector('title')?.textContent||'';const link=item.querySelector('link')?.textContent||'';const desc=item.querySelector('description')?.textContent||'';const source=item.querySelector('source')?.textContent||'Google News';let image='';const media=item.getElementsByTagName('media:content')[0]||item.getElementsByTagName('media:thumbnail')[0];if(media)image=media.getAttribute('url')||'';const enc=item.querySelector('enclosure');if(!image&&enc)image=enc.getAttribute('url')||'';if(!image){const m=desc.match(/<img[^>]+src=["']([^"']+)["']/i);if(m)image=m[1].replace(/&amp;/g,'&')}const clean=desc.replace(/<[^>]*>/g,' ').replace(/&nbsp;/g,' ').replace(/\s+/g,' ').trim();return normalizeNews({title,source,url:link,image,summary:clean||'Tin liên quan cần mở nguồn để đọc chi tiết.',category:categoryOf(title+' '+q),area:deriveAreas(title+' '+clean+' '+q),impactScore:scoreImpact(title+' '+clean+' '+q)})}).filter(x=>x.title)}
window.__appBack=function(){if(document.getElementById('modal').classList.contains('show')){hideSheet();return}if(state.tab!=='home')go('home')};

// ===== V24 Professional News Feed overrides =====
function categoryIcon(n){
  const c=String((n&&n.category)||categoryOf((n&&n.title)||'')).toLowerCase();
  const t=String(((n&&n.title)||'')+' '+((n&&n.summary)||'')).toLowerCase();
  if(c.includes('hạ tầng')||/cao tốc|đường|giao thông|cầu/.test(t)) return '🛣️';
  if(c.includes('quy hoạch')||/quy hoạch|phân khu|đô thị/.test(t)) return '🗺️';
  if(c.includes('pháp')||/công báo|luật|sổ|giấy tờ/.test(t)) return '⚖️';
  if(c.includes('vân phong')||/cảng|logistics|vân phong|công nghiệp/.test(t)) return '⚓';
  if(/biển|dốc lết|du lịch|nghỉ dưỡng/.test(t)) return '🌊';
  return '📊';
}
function categoryClass(n){
  const c=String((n&&n.category)||'').toLowerCase();
  const t=String(((n&&n.title)||'')+' '+((n&&n.summary)||'')).toLowerCase();
  if(c.includes('hạ tầng')||/cao tốc|đường|giao thông/.test(t)) return 'infra';
  if(c.includes('quy hoạch')||/quy hoạch|phân khu|đô thị/.test(t)) return 'planning';
  if(c.includes('pháp')||/công báo|luật|sổ/.test(t)) return 'legal';
  if(c.includes('vân phong')||/cảng|logistics|vân phong|công nghiệp/.test(t)) return 'vanphong';
  return 'market';
}
function impactText(score){score=Number(score||0);return score>=85?'Rất cao':score>=72?'Cao':score>=58?'Trung bình':'Thấp'}
function impactClass(score){score=Number(score||0);return score>=82?'high':score>=65?'mid':'low'}
function cleanSourceName(s){return String(s||'Nguồn tin').replace(/\s+-\s+Google Tin tức/gi,'').replace(/Google News/gi,'Google Tin tức').trim()}
function safeBg(url){return String(url||'').replace(/\\/g,'').replace(/"/g,'%22').replace(/'/g,'%27')}
function newsVisual(n,mode){n=normalizeNews(n);if(isRealImage(n)){return `<div class="newsPhoto ${mode||''}" style="background-image:url('${safeBg(n.image)}')"><span class="sourceImgBadge real">Ảnh bài báo</span></div>`}return `<div class="signalTile ${categoryClass(n)} ${mode||''}"><span>${categoryIcon(n)}</span><b>${esc(n.category||'Tin')}</b><small>${n.impactScore||scoreImpact(n.title)}/100</small></div>`}

// ===== V25 AI Đọc Sổ & Chấm Điểm Lô Đất =====
state.certReports = load('certReports', []);
window.__lastCertReport = null;

function parseViNumber(v){
  if(!v) return 0;
  let x=String(v).replace(/\s/g,'').replace(/m2|m²/gi,'');
  if(x.includes(',')){ x=x.replace(/\./g,'').replace(',', '.'); }
  else { x=x.replace(/,/g,''); }
  const n=parseFloat(x); return isNaN(n)?0:n;
}
function fmtNum(n){ return Number(n||0).toLocaleString('vi-VN',{maximumFractionDigits:1}); }
function normalizeVN(s){return String(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/đ/g,'d').replace(/\s+/g,' ').trim();}
function extractBetween(raw, labels){
  const line=String(raw||'').split(/\n|\r/).map(x=>x.trim()).filter(Boolean);
  for(const l of line){ const n=normalizeVN(l); if(labels.some(k=>n.includes(k))) return l.replace(/^.*?:\s*/,'').trim(); }
  return '';
}
function extractCertificateFields(text){
  const raw=String(text||''); const one=raw.replace(/\s+/g,' '); const norm=normalizeVN(one);
  const out={};
  let m=one.match(/thửa\s*(?:đất)?\s*số\s*[:\.]?\s*([0-9A-Za-z\/-]+)/i) || one.match(/thửa\s*[:\.]?\s*([0-9A-Za-z\/-]+)/i);
  if(m) out.parcel=m[1];
  m=one.match(/tờ\s*bản\s*đồ\s*số\s*[:\.]?\s*([0-9A-Za-z\/-]+)/i) || one.match(/bản\s*đồ\s*số\s*[:\.]?\s*([0-9A-Za-z\/-]+)/i);
  if(m) out.mapSheet=m[1];
  m=one.match(/diện\s*tích\s*[:\.]?\s*([0-9\.\,]+)\s*m/i) || one.match(/([0-9\.\,]+)\s*m[²2]/i);
  if(m) out.area=parseViNumber(m[1]);
  const landLine=extractBetween(raw,['loai dat','muc dich su dung']);
  if(landLine) out.landType=landLine.replace(/^.*(Loại đất|Mục đích sử dụng)\s*[:\.]?/i,'').trim();
  m=one.match(/thời\s*hạn\s*sử\s*dụng\s*[:\.]?\s*([^\.\n]+)/i);
  if(m) out.expiry=m[1].trim();
  m=one.match(/địa\s*chỉ\s*[:\.]?\s*([^\.\n]+)/i);
  if(m) out.address=m[1].trim();
  if(norm.includes('quy hoach giao thong')) out.planningNote='Có ghi chú thuộc quy hoạch giao thông';
  m=one.match(/([0-9\.\,]+)\s*m[²2]?\s*(?:thuộc|thuoc)\s*(?:quy\s*hoạch|quy hoach)\s*giao\s*thông/i) || one.match(/quy\s*hoạch\s*giao\s*thông[^0-9]{0,30}([0-9\.\,]+)\s*m/i);
  if(m) out.planningArea=parseViNumber(m[1]);
  const coords=[];
  const coordRegex=/([0-9]{6,8}[\.,][0-9]+)\s*[,;\s]+([0-9]{5,8}[\.,][0-9]+)/g;
  let cm; while((cm=coordRegex.exec(one))){coords.push([cm[1],cm[2]]); if(coords.length>12)break;}
  if(coords.length) out.coords=coords;
  return out;
}
function fillCertFields(data){
  const set=(id,v)=>{const el=document.getElementById(id); if(el&&v!==undefined&&v!==null&&v!=='') el.value=v;};
  set('cert_parcel',data.parcel); set('cert_sheet',data.mapSheet); set('cert_area',data.area?fmtNum(data.area):''); set('cert_landtype',data.landType); set('cert_expiry',data.expiry); set('cert_address',data.address); set('cert_planning',data.planningNote); set('cert_planarea',data.planningArea?fmtNum(data.planningArea):'');
  if(data.coords&&data.coords.length){ set('cert_note','Đã phát hiện bảng tọa độ ranh: '+data.coords.length+' điểm. Cần đối chiếu lại bằng bản trích lục/Google Maps.'); }
}
function startCertificateOcr(){
  document.getElementById('cert_images')?.click();
  toast('Đã mở chọn ảnh. Sau khi xem ảnh, hãy nhập/dán thông tin sổ vào ô chữ để app bóc thông tin.');
}
window.__certificateOcrDone=function(text){
  if(text==='__CANCELLED__') return toast('Đã hủy chọn ảnh');
  if(String(text||'').startsWith('__ERROR__')){ toast('Chưa đọc được ảnh. Hãy nhập tay thông tin chính.'); return; }
  const box=document.getElementById('cert_ocr'); if(box) box.value=((box.value?box.value+'\n\n':'')+text).trim();
  const data=extractCertificateFields(text); fillCertFields(data); toast('Đã đọc chữ và điền thông tin chính');
}
function previewCertImages(ev){
  const files=[...(ev.target.files||[])]; const grid=document.getElementById('cert_previews'); if(!grid)return; grid.innerHTML='';
  files.slice(0,4).forEach(f=>{ const img=document.createElement('img'); img.src=URL.createObjectURL(f); grid.appendChild(img); });
}
function parseMapsLink(){
  const link=(document.getElementById('cert_maps')?.value||'').trim();
  if(!link) return '';
  let m=link.match(/@(-?\d+\.\d+),\s*(-?\d+\.\d+)/)||link.match(/[?&]q=(-?\d+\.\d+),\s*(-?\d+\.\d+)/);
  if(m) return m[1]+', '+m[2];
  return 'Đã lưu link Google Maps; cần mở nguồn để xác định tọa độ chính xác.';
}
function analyzeCertificateDeal(){
  const data={
    parcel:document.getElementById('cert_parcel')?.value.trim(),
    mapSheet:document.getElementById('cert_sheet')?.value.trim(),
    area:parseViNumber(document.getElementById('cert_area')?.value),
    landType:document.getElementById('cert_landtype')?.value.trim(),
    expiry:document.getElementById('cert_expiry')?.value.trim(),
    address:document.getElementById('cert_address')?.value.trim(),
    planningNote:document.getElementById('cert_planning')?.value.trim(),
    planningArea:parseViNumber(document.getElementById('cert_planarea')?.value),
    price:parseViNumber(document.getElementById('cert_price')?.value),
    maps:document.getElementById('cert_maps')?.value.trim(),
    note:document.getElementById('cert_note')?.value.trim(),
    ocrText:document.getElementById('cert_ocr')?.value.trim()
  };
  const all=normalizeVN([data.landType,data.planningNote,data.note,data.ocrText].join(' '));
  let legal=60, planning=65, position=55, liquidity=55, investment=55; const warns=[]; const strengths=[];
  if(data.parcel&&data.mapSheet){legal+=12;strengths.push('Có số thửa/tờ bản đồ để đối chiếu tại nguồn chính thức.');}
  if(data.area){legal+=5;strengths.push('Có diện tích rõ: '+fmtNum(data.area)+' m².');}
  if(data.landType){legal+=5;} else warns.push('Chưa nhập/đọc được loại đất, cần xem kỹ mục đích sử dụng đất trên sổ.');
  if(/dat o|o do thi|o nong thon|odt|ont|đất ở/i.test(all)){investment+=12;liquidity+=10;}
  if(/lua|trong lua|nong nghiep|cln|hnk/i.test(all)){legal-=18;investment-=14;liquidity-=8;warns.push('Loại đất có dấu hiệu là đất nông nghiệp/đất trồng lúa, không phải đất ở. Cần kiểm tra khả năng chuyển mục đích.');}
  if(/quy hoach giao thong|giao thong|lo gioi/i.test(all)){planning-=28;investment-=18;warns.push('Có dấu hiệu/ghi chú liên quan quy hoạch giao thông hoặc lộ giới. Cần xác minh trước khi đặt cọc.');}
  let affectedPct=0; if(data.area&&data.planningArea){affectedPct=data.planningArea/data.area*100; planning-=affectedPct>=20?16:9; warns.push('Khoảng '+fmtNum(affectedPct)+'% diện tích có thể bị ảnh hưởng theo ghi chú quy hoạch.');}
  if(data.maps){position+=10; strengths.push('Có link Google Maps để lưu và kiểm tra thực địa.');}
  if(data.price&&data.area){ const trm2=data.price*1000/data.area; data.pricePerM2=trm2; if(trm2>25){investment-=8;warns.push('Giá/m² khá cao, cần so sánh với ít nhất 3 lô cùng khu.');} if(trm2<5){investment-=4;warns.push('Giá/m² thấp bất thường, cần kiểm tra kỹ pháp lý và khả năng sử dụng.');} }
  legal=Math.max(15,Math.min(95,legal)); planning=Math.max(10,Math.min(95,planning)); position=Math.max(20,Math.min(90,position)); liquidity=Math.max(15,Math.min(90,liquidity)); investment=Math.max(15,Math.min(92,investment));
  const total=Math.round(legal*.26+planning*.28+position*.16+liquidity*.14+investment*.16);
  const verdict= total>=75?'Có thể nghiên cứu sâu, vẫn phải kiểm tra pháp lý':total>=58?'Có thể xem tiếp nhưng chưa nên đặt cọc':total>=42?'Rủi ro cao, chỉ hỏi thêm nếu giá rất tốt':'Nên tạm dừng, chưa đủ an toàn';
  const report={id:Date.now(),area:data.address||'Lô đất từ sổ',score:total,decision:verdict,date:new Date().toLocaleString('vi-VN'),status:'Cần hỏi thêm',source:'AI Đọc sổ',data,scores:{legal,planning,position,liquidity,investment,total},warnings:warns,strengths};
  window.__lastCertReport=report; renderCertReport(report);
}
function renderCertReport(r){
  const d=r.data, s=r.scores; const box=document.getElementById('certResult'); if(!box)return; box.style.display='block';
  const rows=[['Pháp lý',s.legal],['Quy hoạch',s.planning],['Vị trí',s.position],['Thanh khoản',s.liquidity],['Đầu tư',s.investment]];
  const pct=d.area&&d.planningArea?fmtNum(d.planningArea/d.area*100)+'%':'--';
  box.innerHTML=`<div class="reportTitle"><div><h2>Báo cáo lô đất</h2><p class="smallMuted">Kết quả sàng lọc từ ảnh sổ/thông tin người dùng nhập. Không thay thế xác minh pháp lý.</p></div><span class="reportBadge">${r.score}/100</span></div><div class="resultGrid"><div class="scoreBig"><b>${r.score}</b></div><div><h3>${esc(r.decision)}</h3><p>${r.score>=58?'Có thể xem tiếp theo quy trình kiểm chứng.':'Chưa nên đi sâu nếu thiếu giấy tờ hoặc quy hoạch rõ ràng.'}</p></div></div><div class="extractedBox"><h3>Tóm tắt đọc được</h3><p><b>Số thửa:</b> ${esc(d.parcel||'--')} · <b>Tờ bản đồ:</b> ${esc(d.mapSheet||'--')}<br><b>Diện tích:</b> ${d.area?fmtNum(d.area)+' m²':'--'} · <b>Loại đất:</b> ${esc(d.landType||'--')}<br><b>Thời hạn:</b> ${esc(d.expiry||'--')}<br><b>Vị trí:</b> ${esc(d.address||parseMapsLink()||'--')}</p>${d.planningArea?`<p><b>Diện tích liên quan quy hoạch:</b> ${fmtNum(d.planningArea)} m² · khoảng ${pct}</p>`:''}</div>${r.warnings.length?`<div class="dangerCard"><h3>Cảnh báo cần chú ý</h3><ul class="questionList">${r.warnings.map(w=>`<li>${esc(w)}</li>`).join('')}</ul></div>`:''}<div class="scoreRows">${rows.map(([k,v])=>`<div class="scoreRow"><span>${k}</span><div class="bar"><i style="width:${v}%"></i></div><b>${v}</b></div>`).join('')}</div><div class="warningCard" style="margin-top:14px"><h3>Câu hỏi nên hỏi chủ đất/môi giới</h3><ol class="questionList"><li>Phần đất vướng quy hoạch/lộ giới nằm ở đâu trên thực địa?</li><li>Loại đất hiện tại có chuyển mục đích được không, điều kiện và chi phí ra sao?</li><li>Đường vào là đường công hay đường tự mở/đi nhờ?</li><li>Giá bán đã trừ rủi ro quy hoạch và loại đất chưa?</li><li>Nếu đặt cọc, điều khoản hoàn cọc khi pháp lý/quy hoạch không đúng là gì?</li></ol></div><div class="actions"><button class="primary gold" onclick="saveCertificateReport()">Lưu vào Sổ tay</button>${d.maps?`<button class="primary soft" onclick="openUrl('${esc(d.maps)}')">Mở Google Maps</button>`:''}</div>`;
  box.scrollIntoView({behavior:'smooth'});
}

function parseCoordNumber(v){
  if(v===undefined||v===null) return NaN;
  let x=String(v).trim().replace(/\s/g,'').replace(',', '.');
  const n=parseFloat(x); return isNaN(n)?NaN:n;
}
function extractParcelCoordinates(text){
  const raw=String(text||''); const pts=[];
  const lines=raw.split(/\n|\r/).map(x=>x.trim()).filter(Boolean);
  for(const line of lines){
    let nums=line.match(/-?\d{5,9}[\.,]\d+/g)||[];
    if(nums.length>=2){
      const x=parseCoordNumber(nums[0]), y=parseCoordNumber(nums[1]);
      if(isFinite(x)&&isFinite(y)) pts.push({x,y,raw:line});
    }
  }
  if(!pts.length){
    const re=/(-?\d{5,9}[\.,]\d+)\s*[,;\s]+(-?\d{5,9}[\.,]\d+)/g; let m;
    while((m=re.exec(raw))){ const x=parseCoordNumber(m[1]), y=parseCoordNumber(m[2]); if(isFinite(x)&&isFinite(y)) pts.push({x,y,raw:m[0]}); }
  }
  const unique=[]; const seen=new Set();
  for(const p of pts){const k=p.x.toFixed(2)+','+p.y.toFixed(2); if(!seen.has(k)){seen.add(k); unique.push(p)}}
  return unique.slice(0,40);
}
function shoelaceArea(pts){
  if(!pts||pts.length<3)return 0; let s=0;
  for(let i=0;i<pts.length;i++){const a=pts[i], b=pts[(i+1)%pts.length]; s += a.x*b.y - b.x*a.y;}
  return Math.abs(s)/2;
}
function perimeterLength(pts){
  if(!pts||pts.length<2)return 0; let s=0;
  for(let i=0;i<pts.length;i++){const a=pts[i], b=pts[(i+1)%pts.length]; s += Math.hypot(a.x-b.x,a.y-b.y);}
  return s;
}
function detectMapsCoordinates(link){
  link=String(link||'');
  let m=link.match(/@(-?\d+\.\d+),\s*(-?\d+\.\d+)/)||link.match(/[?&]q=(-?\d+\.\d+),\s*(-?\d+\.\d+)/)||link.match(/!3d(-?\d+\.\d+)!4d(-?\d+\.\d+)/);
  if(m) return {lat:parseFloat(m[1]), lng:parseFloat(m[2])};
  return null;
}
function renderParcelSvg(pts){
  if(!pts||pts.length<3) return `<div class="parcelSvgBox"><div class="emptyHint">Nhập ít nhất 3 điểm tọa độ để app vẽ sơ đồ thửa sơ bộ.</div></div>`;
  const xs=pts.map(p=>p.x), ys=pts.map(p=>p.y), minX=Math.min(...xs), maxX=Math.max(...xs), minY=Math.min(...ys), maxY=Math.max(...ys);
  const pad=28, W=360, H=250; const dx=maxX-minX||1, dy=maxY-minY||1;
  const scale=Math.min((W-pad*2)/dx,(H-pad*2)/dy); const poly=pts.map(p=>`${pad+(p.x-minX)*scale},${H-(pad+(p.y-minY)*scale)}`).join(' ');
  const labels=pts.map((p,i)=>{const x=pad+(p.x-minX)*scale, y=H-(pad+(p.y-minY)*scale);return `<circle cx="${x}" cy="${y}" r="4" fill="#d6a02d"/><text x="${x+6}" y="${y-6}" font-size="11" font-weight="800" fill="#082236">${i+1}</text>`}).join('');
  return `<div class="parcelSvgBox"><svg class="parcelSvg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet"><polygon points="${poly}" fill="rgba(215,165,49,.22)" stroke="#083554" stroke-width="3"/><polyline points="${poly}" fill="none" stroke="#0a6d91" stroke-width="1.5" stroke-dasharray="5 5"/>${labels}</svg><p class="smallMuted">Sơ đồ chỉ để hình dung ranh theo tọa độ người dùng nhập, không thay thế trích lục địa chính.</p></div>`;
}
function readParcelInputs(){
  const coordsText=document.getElementById('parcel_coords')?.value||'';
  const pts=extractParcelCoordinates(coordsText);
  const sArea=parseViNumber(document.getElementById('parcel_cert_area')?.value);
  const planArea=parseViNumber(document.getElementById('parcel_plan_area')?.value);
  const price=parseViNumber(document.getElementById('parcel_price')?.value);
  const maps=document.getElementById('parcel_maps')?.value.trim()||'';
  const data={
    name:document.getElementById('parcel_name')?.value.trim()||'Hồ sơ thửa đất',
    areaName:document.getElementById('parcel_area_name')?.value.trim()||'',
    parcel:document.getElementById('parcel_number')?.value.trim()||'',
    sheet:document.getElementById('parcel_sheet')?.value.trim()||'',
    landType:document.getElementById('parcel_landtype')?.value.trim()||'',
    certArea:sArea,
    planArea,
    price,
    maps,
    mapsCoord:detectMapsCoordinates(maps),
    note:document.getElementById('parcel_note')?.value.trim()||'',
    coordsText,
    pts
  };
  data.coordArea=shoelaceArea(pts); data.perimeter=perimeterLength(pts);
  data.pricePerM2=(price&&sArea)?price*1000/sArea:0;
  data.areaDiff=(sArea&&data.coordArea)?Math.abs(data.coordArea-sArea)/sArea*100:0;
  data.planPct=(sArea&&planArea)?planArea/sArea*100:0;
  return data;
}
function scoreParcelProfile(d){
  const txt=normalizeVN([d.landType,d.note,d.areaName].join(' ')); let legal=55, geometry=50, planning=65, location=55, value=55; const warnings=[], strengths=[];
  if(d.parcel&&d.sheet){legal+=15; strengths.push('Có số thửa và tờ bản đồ để đối chiếu.');} else warnings.push('Thiếu số thửa/tờ bản đồ, nên bổ sung để kiểm tra chính xác hơn.');
  if(d.certArea){legal+=7; strengths.push('Có diện tích trên giấy: '+fmtNum(d.certArea)+' m².');}
  if(d.pts.length>=3){geometry+=25; strengths.push('Có '+d.pts.length+' điểm tọa độ để vẽ ranh sơ bộ.');} else warnings.push('Chưa có đủ tọa độ góc ranh để vẽ sơ đồ thửa.');
  if(d.coordArea&&d.certArea){ if(d.areaDiff<=5){geometry+=15; strengths.push('Diện tích tính từ tọa độ khá gần diện tích trên giấy.');} else {geometry-=18; warnings.push('Diện tích tính từ tọa độ lệch khoảng '+fmtNum(d.areaDiff)+'% so với diện tích trên giấy. Cần kiểm tra thứ tự điểm/tọa độ.');}}
  if(/dat o|o do thi|o nong thon|odt|ont|đất ở/i.test(txt)){legal+=12; value+=10; location+=5;}
  if(/lua|trong lua|nong nghiep|cln|hnk/i.test(txt)){legal-=16; value-=12; warnings.push('Loại đất có dấu hiệu là đất nông nghiệp/đất lúa, chưa phải đất ở.');}
  if(/giao thong|lo gioi|quy hoach|thu hoi/i.test(txt)||d.planArea){planning-=28; value-=10; warnings.push('Có dấu hiệu liên quan quy hoạch/lộ giới/diện tích bị ảnh hưởng. Cần xác minh trước khi đặt cọc.');}
  if(d.planPct){ warnings.push('Diện tích bị ghi chú ảnh hưởng khoảng '+fmtNum(d.planPct)+'% tổng diện tích.'); if(d.planPct>20) planning-=12; }
  if(d.mapsCoord){location+=15; strengths.push('Có tọa độ Google Maps để đi thực địa và lưu hồ sơ.');}
  if(d.pricePerM2){ if(d.pricePerM2>25){value-=10; warnings.push('Giá/m² cao, cần so sánh nhiều lô cùng khu.');} if(d.pricePerM2<5){value-=4; warnings.push('Giá/m² thấp bất thường, cần kiểm tra pháp lý và khả năng sử dụng.');} }
  legal=Math.max(10,Math.min(95,legal)); geometry=Math.max(10,Math.min(95,geometry)); planning=Math.max(8,Math.min(95,planning)); location=Math.max(15,Math.min(95,location)); value=Math.max(10,Math.min(92,value));
  const total=Math.round(legal*.22+geometry*.18+planning*.25+location*.17+value*.18);
  const verdict=total>=78?'Hồ sơ khá tốt, có thể nghiên cứu sâu':total>=62?'Có thể xem tiếp nhưng phải kiểm chứng thêm':total>=45?'Rủi ro cao, chỉ tiếp tục nếu giá phản ánh rủi ro':'Nên tạm dừng hoặc loại khỏi danh sách';
  return {legal,geometry,planning,location,value,total,verdict,warnings,strengths};
}

<script>
(function(){
  const V29_MAX_NEWS=160;
  const V29_DISPLAY_MAX=120;
  const V29_DIRECT=/ninh\s*h[oòóỏõọoaàáảãạ]\b|ninh\s+di[eê]m|ninh\s+h[aả]i|d[oô]c\s+l[eê]t|ninh\s+xu[aâ]n|ninh\s+an|ninh\s+th[oọ]|ninh\s+th[uủ]y|ninh\s+ph[uụ]ng|ninh\s+ph[uư][oơ]c|ninh\s+[ií]ch|ninh\s+sim|t[aâ]n\s+[dđ]ịnh|bắc\s+hòn\s+h[eè]o|đông\s+bắc\s+ninh\s+h[oòóỏõọoaàáảãạ]/i;
  const V29_STRATEGIC=/v[aâ]n\s+phong|nam\s+v[aâ]n\s+phong|khu\s+kinh\s+t[eế]\s+v[aâ]n\s+phong|cao\s+t[oố]c\s+kh[aá]nh\s+h[oòóỏõọoaàáảãạ]\s*[-–]\s*bu[oô]n\s+ma\s+thu[oộ]t|cao\s+t[oố]c\s+v[aâ]n\s+phong|ph[aâ]n\s+khu\s+1[679]|logistics|c[aả]ng|bắc\s+hòn\s+h[eè]o/i;
  const V29_BAD=/ninh\s+b[iì]nh|bắc\s+ninh|t[aâ]y\s+ninh|ninh\s+thu[aậ]n|ninh\s+b[iì]nh|h[oò]a\s+b[iì]nh|qu[aả]ng\s+ninh/i;
  const V29_KHANHHOA=/kh[aá]nh\s+h[oòóỏõọoaàáảãạ]/i;
  const v29Filters=['Mới nhất','Tác động cao','Ninh Hòa','Vân Phong','Hạ tầng','Quy hoạch','Pháp lý'];
  const v29AreaFilters=['Ninh Hòa','Ninh Diêm','Dốc Lết / Ninh Hải','Ninh Xuân','Ninh An','Vân Phong'];
  if(Array.isArray(areaProfiles)&&!areaProfiles.some(a=>a.name==='Ninh Hòa')){
    areaProfiles.unshift({id:'ninhhoa',name:'Ninh Hòa',img:'center',type:'Trọng tâm chính',score:90,keys:['ninh hòa','ninh hoà','thị xã ninh hòa','phường ninh hòa','tân định','ninh diêm','dốc lết','ninh hải','ninh xuân','ninh an','vân phong']});
  }
  function v29Raw(n){return (((n&&n.title)||'')+' '+((n&&n.summary)||'')+' '+((n&&n.source)||'')+' '+((n&&n.category)||'')+' '+((n&&n.area)||[]).join(' ')).toLowerCase()}
  function v29Text(n){return normalizeVN(v29Raw(n))}
  function v29IsRelevant(n){
    const raw=v29Raw(n), txt=normalizeVN(raw);
    if(V29_BAD.test(raw)) return false;
    if(V29_DIRECT.test(raw)) return true;
    if(V29_STRATEGIC.test(raw) && V29_KHANHHOA.test(raw)) return true;
    if(/van phong|bac hon heo|nam van phong|phan khu 16|phan khu 17|phan khu 19|doc let/.test(txt)) return true;
    return false;
  }
  function v29SourceScore(n){
    const s=normalizeVN(String(n?.source||''));
    if(/cong bao|cong tinh|ninh hoa|khanh hoa|bao khanh hoa|ipa|chinh phu/.test(s)) return 22;
    if(/tuoi tre|vnexpress|plo|vov|nhan dan|vietnamnet|dan tri|thanh nien/.test(s)) return 16;
    if(/cafeland|cafef/.test(s)) return 9;
    return 5;
  }
  function v29FocusScore(n){
    n=normalizeNews(n); const raw=v29Raw(n), txt=normalizeVN(raw);
    let s=0;
    if(/ninh hoa|ninh hoà/.test(txt)) s+=34;
    if(/ninh diem|ninh hai|doc let|ninh xuan|ninh an|ninh tho|ninh thuy|ninh phuoc|tan dinh/.test(txt)) s+=30;
    if(/van phong|bac hon heo|nam van phong|dong bac ninh hoa|phan khu 16|phan khu 17|phan khu 19/.test(txt)) s+=24;
    if(/quy hoach|su dung dat|cong bao|phe duyet|phap ly|bang gia dat/.test(txt)) s+=18;
    if(/cao toc|ha tang|do thi|cang|logistics|khu cong nghiep|du lich|doc let/.test(txt)) s+=15;

    if(newsTs(n)){const h=(Date.now()-newsTs(n))/36e5; if(h<24)s+=18; else if(h<168)s+=14; else if(h<720)s+=7;}

  }
  function v29Reason(n){
    const txt=v29Text(n), r=[];
    if(/ninh hoa|ninh hoà/.test(txt)) r.push('trực tiếp Ninh Hòa');

    if(newsTs(n)){const h=(Date.now()-newsTs(n))/36e5;if(h<24)r.unshift('tin trong 24h'); else if(h<168)r.unshift('tin trong 7 ngày')}
    return r.slice(0,3).join(' · ')||'được giữ vì có liên quan rõ đến Ninh Hòa';
  }
  function v29Merge(items){

    (items||[]).map(normalizeNews).forEach(n=>{
      if(!v29IsRelevant(n)) return;
      n.qualityScore=v29FocusScore(n); n.qualityLevel=n.qualityScore>=86?'Trọng tâm cao':n.qualityScore>=74?'Đáng đọc':n.qualityScore>=62?'Theo dõi':'Tham khảo'; n.qualityReason=v29Reason(n);
      if(n.qualityScore<58) return;
      const k=(typeof v28DedupeKey==='function'?v28DedupeKey(n):normalizeVN(n.title||'').slice(0,90));
      if(!by[k] || n.qualityScore>by[k].qualityScore || (n.qualityScore===by[k].qualityScore && (n.impactScore||0)>(by[k].impactScore||0))) by[k]=n;
    });
    return Object.values(by).sort((a,b)=>(b.qualityScore-a.qualityScore)||((b.impactScore||0)-(a.impactScore||0))).slice(0,V29_MAX_NEWS);
  }
  window.mergeNewsItems=function(items){return v29Merge(items)};
  window.getAllNews=function(){return v29Merge([...(state.news||[]),...fallbackNews])};
  window.getFilteredNews=function(filter=state.filter){
    let list=getAllNews(); const f=filter||'Mới nhất'; const ff=normalizeVN(f);
    if(f==='Tác động cao') list=list.filter(n=>(n.impactScore||0)>=75 || (n.qualityScore||0)>=78);
    else if(f==='Ninh Hòa') list=list.filter(n=>/ninh hoa|ninh hoà|ninh diem|ninh hai|doc let|ninh xuan|ninh an|tan dinh/.test(v29Text(n)));
    else if(f==='Vân Phong') list=list.filter(n=>/van phong|bac hon heo|nam van phong|phan khu 16|phan khu 17|phan khu 19|logistics|cang/.test(v29Text(n)));

    if(state.area&&state.area!=='Tất cả'){

  };

<script>
// ===== V29.1 Thổ cư Value Fix: nhận diện quy hoạch đất ở/thổ cư và mô phỏng hệ số x5 =====
(function(){
  function landPlanSignals(parts){
    const raw=(Array.isArray(parts)?parts.join(' '):String(parts||''));
    const txt=normalizeVN(raw);
    const isAgri=/lua|trong lua|dat lua|nong nghiep|cln|hnk|dat cay lau nam|dat hang nam/.test(txt);
    const isResidentialNow=/dat o|dat tho cu|tho cu|o do thi|o nong thon|odt|ont/.test(txt) && !/quy hoach/.test(txt);
    const plannedResidential=/quy hoach[^\.\n]*(tho cu|dat o|o do thi|o nong thon|odt|ont|khu dan cu)|quy hoach th[oơ] cu|quy hoach dat o|len tho cu|chuyen muc dich[^\.\n]*(dat o|tho cu)|dat o theo quy hoach|du kien dat o/.test(txt);
    const badPlanning=/giao thong|lo gioi|thu hoi|cong vien|cay xanh|hanh lang|duong quy hoach|dgt|dkv/.test(txt);
    return {txt,isAgri,isResidentialNow,plannedResidential,badPlanning,raw};
  }
  function upliftBox(d,s){
    if(!s || !s.upside) return '';
    const u=s.upside;
    return `<div class="goodStrong upliftBox"><h3>Cơ hội quy hoạch thổ cư</h3><p><b>Kịch bản:</b> đất hiện tại có dấu hiệu là đất nông nghiệp/đất lúa nhưng thông tin quy hoạch ghi nhận theo hướng đất ở/thổ cư.</p><div class="coordTools"><div class="coordBox"><b>x5</b><span>hệ số người dùng giả định</span></div><div class="coordBox"><b>${u.currentM2?fmtNum(u.currentM2)+' tr/m²':'--'}</b><span>giá hiện tại ước tính</span></div><div class="coordBox"><b>${u.targetM2?fmtNum(u.targetM2)+' tr/m²':'--'}</b><span>giá sau x5 ước tính</span></div><div class="coordBox"><b>${u.targetTotal?fmtNum(u.targetTotal)+' tỷ':'--'}</b><span>giá trị mô phỏng</span></div></div><p class="smallMuted">Đây chỉ là mô phỏng cơ hội. Giá trị thật còn phụ thuộc khả năng chuyển mục đích, nghĩa vụ tài chính, chỉ tiêu/kế hoạch sử dụng đất, đường vào và thanh khoản thực tế.</p></div>`;
  }
  window.scoreParcelProfile=function(d){
    const sig=landPlanSignals([d.landType,d.note,d.areaName]); let legal=58, geometry=50, planning=62, location=55, value=55; const warnings=[], strengths=[];
    if(d.parcel&&d.sheet){legal+=15; strengths.push('Có số thửa và tờ bản đồ để đối chiếu.');} else warnings.push('Thiếu số thửa/tờ bản đồ, nên bổ sung để kiểm tra chính xác hơn.');

    if(d.pts.length>=3){geometry+=25; strengths.push('Có '+d.pts.length+' điểm tọa độ để vẽ ranh sơ bộ.');} else warnings.push('Chưa có đủ tọa độ góc ranh để vẽ sơ đồ thửa.');

    let upside=null;
    if(sig.isAgri && sig.plannedResidential){
      const currentM2=d.pricePerM2||0; const targetM2=currentM2?currentM2*5:0; const targetTotal=(targetM2&&d.certArea)?targetM2*d.certArea/1000:0;
      upside={currentM2,targetM2,targetTotal,multiplier:5};
    }
    legal=Math.max(10,Math.min(95,legal)); geometry=Math.max(10,Math.min(95,geometry)); planning=Math.max(8,Math.min(95,planning)); location=Math.max(15,Math.min(95,location)); value=Math.max(10,Math.min(95,value));
    const total=Math.round(legal*.20+geometry*.16+planning*.26+location*.16+value*.22);
    const verdict=total>=80?'Cơ hội tốt nếu xác minh quy hoạch và chuyển mục đích rõ ràng':total>=64?'Có thể nghiên cứu tiếp, trọng tâm là kiểm chứng quy hoạch thổ cư':total>=48?'Có cơ hội nhưng rủi ro còn lớn, cần hỏi thêm trước khi đi sâu':'Nên tạm dừng hoặc chỉ theo dõi thêm';
    return {legal,geometry,planning,location,value,total,verdict,warnings,strengths,upside};
  };
  const oldParcelReport=window.renderParcelReport;
  window.renderParcelReport=function(r){oldParcelReport(r); const box=document.getElementById('parcelResult'); if(box && r && r.scores && r.scores.upside){box.insertAdjacentHTML('afterbegin', upliftBox(r.data,r.scores));}};

  window.analyzeCertificateDeal=function(){

    };

    let legal=60, planning=62, position=55, liquidity=55, investment=55; const warns=[], strengths=[];
    if(data.parcel&&data.mapSheet){legal+=12;strengths.push('Có số thửa/tờ bản đồ để đối chiếu tại nguồn chính thức.');}
    if(data.area){legal+=5;strengths.push('Có diện tích rõ: '+fmtNum(data.area)+' m².');}
    if(data.landType){legal+=5;} else warns.push('Chưa nhập/đọc được loại đất, cần xem kỹ mục đích sử dụng đất trên sổ.');
    if(sig.isResidentialNow){investment+=12;liquidity+=10;planning+=6;strengths.push('Loại đất hiện tại có dấu hiệu là đất ở/thổ cư.');}
    if(sig.isAgri){legal-=10;investment-=4;liquidity-=4;warns.push('Hiện trạng có dấu hiệu là đất nông nghiệp/đất trồng lúa, chưa phải đất ở.');}

    let affectedPct=0; if(data.area&&data.planningArea){affectedPct=data.planningArea/data.area*100; planning-=sig.plannedResidential?6:(affectedPct>=20?16:9); warns.push('Khoảng '+fmtNum(affectedPct)+'% diện tích có thể bị ảnh hưởng theo ghi chú quy hoạch.');}
    if(data.maps){position+=10; strengths.push('Có link Google Maps để lưu và kiểm tra thực địa.');}
    if(data.price&&data.area){ const trm2=data.price*1000/data.area; data.pricePerM2=trm2; if(trm2>25){investment-=6;warns.push('Giá/m² khá cao, cần so sánh với ít nhất 3 lô cùng khu.');} if(trm2<5){investment-=2;warns.push('Giá/m² thấp bất thường, cần kiểm tra kỹ pháp lý và khả năng sử dụng.');} }
    let upside=null; if(sig.isAgri && sig.plannedResidential){const currentM2=data.pricePerM2||0; const targetM2=currentM2?currentM2*5:0; const targetTotal=(targetM2&&data.area)?targetM2*data.area/1000:0; upside={currentM2,targetM2,targetTotal,multiplier:5};}
    legal=Math.max(15,Math.min(95,legal)); planning=Math.max(10,Math.min(95,planning)); position=Math.max(20,Math.min(90,position)); liquidity=Math.max(15,Math.min(90,liquidity)); investment=Math.max(15,Math.min(95,investment));
    const total=Math.round(legal*.22+planning*.30+position*.14+liquidity*.12+investment*.22);
    const verdict= total>=78?'Cơ hội đáng nghiên cứu nếu xác minh quy hoạch thổ cư rõ ràng':total>=60?'Có thể xem tiếp, trọng tâm là kiểm chứng chuyển mục đích':total>=44?'Có cơ hội nhưng rủi ro còn cao, chưa nên đặt cọc':'Nên tạm dừng, chưa đủ dữ liệu an toàn';
    const report={id:Date.now(),area:data.address||'Lô đất từ sổ',score:total,decision:verdict,date:new Date().toLocaleString('vi-VN'),status:'Cần hỏi thêm',source:'AI Đọc sổ',data,scores:{legal,planning,position,liquidity,investment,total,upside},warnings:warns,strengths};
    window.__lastCertReport=report; renderCertReport(report);
  };
  const oldCertReport=window.renderCertReport;
  window.renderCertReport=function(r){oldCertReport(r); const box=document.getElementById('certResult'); if(box && r && r.scores && r.scores.upside){box.insertAdjacentHTML('afterbegin', upliftBox(r.data,r.scores));}};
  const css=document.createElement('style'); css.textContent=`.upliftBox{border:1px solid #8bd6b1;background:linear-gradient(135deg,#eefbf4,#ffffff);margin-bottom:14px}.upliftBox .smallMuted{color:#526878}`; document.head.appendChild(css);

<script>
// ===== V29.2 Yếu tố tăng/giảm giá trị lô đất: lô góc, hai mặt tiền, gần mộ, quy hoạch trường/công viên/đường =====
(function(){
  function normVN(v){
    return String(v||'').toLowerCase()
      .normalize('NFD').replace(/[\u0300-\u036f]/g,'')
      .replace(/đ/g,'d');
  }
  function joinText(parts){return normVN((parts||[]).filter(Boolean).join(' '));}
  function riskValueSignals(parts, d){
    const t=joinText(parts);
    const planPct = Number(d && d.planPct || d && d.planningArea && d.area ? d.planningArea/d.area*100 : 0);
    const hasCorner = /\blo goc\b|dat goc|thua goc|goc duong|nga ba|nga tu|goc nga/.test(t);
    const hasTwoFront = /hai mat tien|2 mat tien|2mt|hai mt|hai duong|2 duong|hai mat duong|hai canh duong/.test(t);
    const hasOneFront = /mot mat tien|1 mat tien|1mt|mat tien duong/.test(t) && !hasTwoFront;
    const nearGrave = /gan mo|gan ma|mo ma|nghia trang|nghia dia|dat gan mo|canh mo|sat mo|gan khu mo|dat co mo/.test(t);
    const badRoad = /quy hoach[^\n\.]{0,45}(duong|giao thong|lo gioi|dgt)|duong quy hoach|lo gioi|vach duong|mo duong|giao thong/.test(t);
    const badSchool = /quy hoach[^\n\.]{0,45}(truong hoc|giao duc|dgd)|truong hoc|dat giao duc|khu giao duc/.test(t);
    const badPark = /quy hoach[^\n\.]{0,45}(cong vien|cay xanh|dkv|cx)|cong vien|cay xanh|khu vui choi|dat cong cong/.test(t);
    const publicPlan = badRoad || badSchool || badPark || /cong trinh cong cong|hanh lang|thu hoi|dat cong/.test(t);
    const fullPlan = /quy hoach het|dinh het quy hoach|toan bo.*quy hoach|quy hoach toan bo|100%|mat trang/.test(t) || planPct >= 70;
    const partialPlan = !!planPct || /dinh mot phan|vuong mot phan|mot phan.*quy hoach|co phan.*quy hoach|dinh.*quy hoach/.test(t);
    const narrowRoad = /hem nho|duong nho|duong dat|duong chua ro|loi di nho|duong rieng|di nho/.test(t);
    return {t,hasCorner,hasTwoFront,hasOneFront,nearGrave,badRoad,badSchool,badPark,publicPlan,fullPlan,partialPlan,narrowRoad,planPct};
  }
  function fmt(v){try{return (typeof fmtNum==='function')?fmtNum(v):Number(v||0).toFixed(1)}catch(e){return Number(v||0).toFixed(1)}}
  function applyValueRules(base, d, parts){
    const s=riskValueSignals(parts,d||{});
    const notes=[];
    base.valueFactors={positive:[],negative:[],critical:[],signals:s};
    function plus(msg){base.strengths.push(msg);base.valueFactors.positive.push(msg);}
    function minus(msg){base.warnings.push(msg);base.valueFactors.negative.push(msg);}
    function critical(msg){base.warnings.unshift(msg);base.valueFactors.critical.push(msg);}
    if(s.hasCorner || s.hasTwoFront){
      base.location+=18; base.value+=20; if('liquidity' in base) base.liquidity+=16; if('investment' in base) base.investment+=16;
      plus('Lô góc/hai mặt tiền là yếu tố tăng giá trị mạnh: dễ nhận diện, dễ kinh doanh hơn và thanh khoản thường tốt hơn lô một mặt tiền nếu đường vào hợp pháp.');
    } else if(s.hasOneFront){
      base.location+=5; base.value+=4; plus('Có mặt tiền đường là điểm cộng, nhưng giá trị thường thấp hơn đáng kể so với lô góc/hai mặt tiền.');
    }
    if(s.narrowRoad){
      base.location-=10; if('liquidity' in base) base.liquidity-=8; base.value-=8; minus('Đường nhỏ/đường đất/lối đi chưa rõ làm giảm thanh khoản và cần kiểm tra quyền sử dụng đường.');
    }
    if(s.nearGrave){
      base.location-=28; base.value-=30; if('liquidity' in base) base.liquidity-=35; if('investment' in base) base.investment-=26;
      critical('Gần mộ/nghĩa trang là điểm trừ rất lớn: nhiều người mua kiêng, khó bán lại và thường phải chiết khấu mạnh.');
    }
    if(s.publicPlan){
      let target=[]; if(s.badRoad)target.push('đường/giao thông/lộ giới'); if(s.badSchool)target.push('trường học/giáo dục'); if(s.badPark)target.push('công viên/cây xanh/công cộng'); if(!target.length)target.push('công trình công cộng');
      const targetText=target.join(', ');
      if(s.fullPlan){
        base.planning-=55; base.value-=45; if('liquidity' in base) base.liquidity-=35; if('investment' in base) base.investment-=45;
        critical('Có dấu hiệu quy hoạch gần như toàn bộ vào '+targetText+'. Trường hợp này không nên định giá như đất ở/đất thương mại; nên loại hoặc chỉ xem nếu giá đã trừ rủi ro rất mạnh.');
      } else if(s.partialPlan){
        const pct=s.planPct?(' khoảng '+fmt(s.planPct)+'% diện tích'):'';
        base.planning-=22; base.value-=18; if('liquidity' in base) base.liquidity-=14; if('investment' in base) base.investment-=16;
        critical('Một phần lô đất có dấu hiệu vướng quy hoạch '+targetText+pct+'. Phần bị quy hoạch gần như không nên tính giá như phần sử dụng bình thường.');
      } else {
        base.planning-=18; base.value-=12; if('liquidity' in base) base.liquidity-=10;
        minus('Có tín hiệu liên quan '+targetText+'. Cần xác định rõ ranh quy hoạch trước khi đặt cọc.');
      }
    }
    if(s.hasCorner || s.hasTwoFront || s.nearGrave || s.publicPlan){
      notes.push('Giá trị thật không chỉ phụ thuộc diện tích/m²; cần điều chỉnh mạnh theo mặt tiền, góc đường, yếu tố tâm linh và phần diện tích bị quy hoạch.');
    }
    base.valueFactors.notes=notes;
    return base;
  }
  function clampAllParcel(x){
    x.legal=Math.max(10,Math.min(95,Math.round(x.legal)));
    x.geometry=Math.max(10,Math.min(95,Math.round(x.geometry)));
    x.planning=Math.max(5,Math.min(95,Math.round(x.planning)));
    x.location=Math.max(5,Math.min(95,Math.round(x.location)));
    x.value=Math.max(5,Math.min(95,Math.round(x.value)));
    return x;
  }
  function clampAllCert(x){
    x.legal=Math.max(10,Math.min(95,Math.round(x.legal)));
    x.planning=Math.max(5,Math.min(95,Math.round(x.planning)));
    x.position=Math.max(5,Math.min(95,Math.round(x.position)));
    x.liquidity=Math.max(5,Math.min(95,Math.round(x.liquidity)));
    x.investment=Math.max(5,Math.min(95,Math.round(x.investment)));
    return x;
  }
  function valueFactorBox(f){
    if(!f || (!f.positive.length && !f.negative.length && !f.critical.length)) return '';
    return `<div class="valueFactorBox"><h3>Yếu tố làm tăng/giảm giá trị</h3>${f.critical.length?`<div class="vfDanger"><b>Điểm trừ mạnh</b><ul>${f.critical.map(x=>`<li>${esc(x)}</li>`).join('')}</ul></div>`:''}${f.positive.length?`<div class="vfGood"><b>Điểm cộng</b><ul>${f.positive.map(x=>`<li>${esc(x)}</li>`).join('')}</ul></div>`:''}${f.negative.length?`<div class="vfWarn"><b>Cần trừ vào giá</b><ul>${f.negative.map(x=>`<li>${esc(x)}</li>`).join('')}</ul></div>`:''}<p class="smallMuted">Gợi ý định giá: lô góc/hai mặt tiền có thể đáng giá hơn nhiều nếu đường hợp pháp; ngược lại gần mộ hoặc vướng trường học/công viên/đường thì cần chiết khấu mạnh, thậm chí nên loại nếu ảnh hưởng lớn.</p></div>`;
  }
  const prevScoreParcel=window.scoreParcelProfile;
  if(prevScoreParcel){
    window.scoreParcelProfile=function(d){
      let r=prevScoreParcel(d);
      r=applyValueRules(r,d,[d.landType,d.note,d.areaName,d.name,d.maps,d.rawText]);
      r=clampAllParcel(r);
      r.total=Math.round(r.legal*.18+r.geometry*.14+r.planning*.28+r.location*.18+r.value*.22);
      const sig=r.valueFactors?.signals||{};
      if(sig.nearGrave || sig.fullPlan || (sig.publicPlan&&sig.planPct>=45)) r.verdict='Nên tạm dừng hoặc loại khỏi danh sách nếu giá chưa trừ mạnh rủi ro';
      else if((sig.hasCorner||sig.hasTwoFront) && r.total>=60) r.verdict='Có điểm cộng lớn về vị trí, nhưng vẫn phải kiểm chứng pháp lý/quy hoạch';
      else if(r.total>=80) r.verdict='Cơ hội tốt nếu xác minh pháp lý và quy hoạch rõ ràng';
      else if(r.total>=64) r.verdict='Có thể nghiên cứu tiếp, cần định giá lại theo rủi ro thực tế';
      else if(r.total>=48) r.verdict='Có cơ hội nhưng rủi ro còn lớn, cần hỏi thêm trước khi đi sâu';
      else r.verdict='Nên tạm dừng hoặc chỉ theo dõi thêm';
      return r;
    };
  }
  const prevRenderParcel=window.renderParcelReport;
  if(prevRenderParcel){
    window.renderParcelReport=function(r){prevRenderParcel(r); const box=document.getElementById('parcelResult'); if(box&&r?.scores?.valueFactors){box.insertAdjacentHTML('afterbegin',valueFactorBox(r.scores.valueFactors));}}
  }
  const prevAnalyzeCert=window.analyzeCertificateDeal;
  if(prevAnalyzeCert){
    window.analyzeCertificateDeal=function(){
      prevAnalyzeCert();
      const r=window.__lastCertReport; if(!r) return;
      let base={legal:r.scores.legal,planning:r.scores.planning,position:r.scores.position,liquidity:r.scores.liquidity,investment:r.scores.investment,value:r.scores.investment,location:r.scores.position,warnings:r.warnings||[],strengths:r.strengths||[]};
      const d=r.data||{};
      base=applyValueRules(base,{...d,planPct:d.area&&d.planningArea?d.planningArea/d.area*100:0},[d.landType,d.planningNote,d.note,d.ocrText,d.address,d.maps]);
      base=clampAllCert(base);
      r.scores.legal=base.legal; r.scores.planning=base.planning; r.scores.position=base.position; r.scores.liquidity=base.liquidity; r.scores.investment=base.investment; r.warnings=base.warnings; r.strengths=base.strengths; r.scores.valueFactors=base.valueFactors;
      r.score=Math.round(r.scores.legal*.20+r.scores.planning*.30+r.scores.position*.16+r.scores.liquidity*.16+r.scores.investment*.18);
      const sig=base.valueFactors?.signals||{};
      r.decision=(sig.nearGrave||sig.fullPlan||(sig.publicPlan&&sig.planPct>=45))?'Nên tạm dừng/loại nếu giá chưa trừ mạnh rủi ro':(sig.hasCorner||sig.hasTwoFront)?'Có điểm cộng lớn về vị trí, nhưng phải kiểm tra pháp lý/quy hoạch':'Cần kiểm chứng thêm trước khi đặt cọc';
      window.__lastCertReport=r; renderCertReport(r);
    }
  }
  const prevCertRender=window.renderCertReport;
  if(prevCertRender){
    window.renderCertReport=function(r){prevCertRender(r); const box=document.getElementById('certResult'); if(box&&r?.scores?.valueFactors){box.insertAdjacentHTML('afterbegin',valueFactorBox(r.scores.valueFactors));}}
  }
  window.addRiskNote=function(txt){
    const ids=['parcel_note','cert_note','c_note','parcel_raw','cert_ocr'];
    const el=ids.map(id=>document.getElementById(id)).find(Boolean);
    if(!el) return;
    const prefix=el.value&& !el.value.endsWith('\n')?'\n':'';
    el.value+=prefix+txt;
    el.focus();
  }
  const prevRenderCheck=window.renderCheck;
  if(prevRenderCheck){
    window.renderCheck=function(){
      prevRenderCheck();
      const note=document.getElementById('parcel_note')||document.getElementById('c_note');
      if(note){
        note.placeholder='Ví dụ: lô góc hai mặt tiền; gần mộ/nghĩa trang; dính một phần quy hoạch đường; quy hoạch trường học/công viên; đất lúa quy hoạch thổ cư...';
        const wrap=document.createElement('div');
        wrap.className='quickValueRules';
        wrap.innerHTML=`<b>Gợi ý ghi chú để app chấm đúng hơn</b><div class="chipGrid"><button onclick="addRiskNote('Lô góc hai mặt tiền')">Lô góc 2 mặt tiền</button><button onclick="addRiskNote('Một mặt tiền')">Một mặt tiền</button><button onclick="addRiskNote('Gần mộ/nghĩa trang')">Gần mộ</button><button onclick="addRiskNote('Dính một phần quy hoạch đường/lộ giới')">Dính đường</button><button onclick="addRiskNote('Một phần quy hoạch trường học')">Dính trường học</button><button onclick="addRiskNote('Một phần quy hoạch công viên/cây xanh')">Dính công viên</button></div>`;
        note.parentElement.insertAdjacentElement('afterend',wrap);
      }
    }
  }
  const css=document.createElement('style');
  css.textContent=`
  .valueFactorBox{border:1px solid rgba(198,145,31,.35);background:linear-gradient(135deg,#fff9e9,#ffffff);border-radius:28px;padding:18px;margin:0 0 14px;box-shadow:0 14px 35px rgba(9,41,59,.08)}
  .valueFactorBox h3{margin:0 0 10px;color:#082d45}.vfDanger,.vfWarn,.vfGood{border-radius:20px;padding:12px 14px;margin:10px 0}.vfDanger{background:#fff0f0;color:#7a1e1e}.vfWarn{background:#fff8e5;color:#654311}.vfGood{background:#eefbf4;color:#105034}.valueFactorBox ul{margin:8px 0 0 18px;padding:0}.valueFactorBox li{margin:6px 0;line-height:1.45}.quickValueRules{margin:12px 0;padding:14px;border-radius:22px;background:#f5fbff;border:1px solid rgba(8,45,69,.12)}.quickValueRules b{display:block;margin-bottom:10px;color:#082d45}.chipGrid{display:flex;gap:8px;flex-wrap:wrap}.chipGrid button{border:0;border-radius:999px;background:#e8f2f8;color:#082d45;padding:10px 12px;font-weight:800}`;
  document.head.appendChild(css);
})();
</script>
